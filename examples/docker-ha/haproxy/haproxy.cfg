global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option forwardfor
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend librenms_http
    bind *:80
    default_backend librenms_web

backend librenms_web
    balance roundrobin
    option httpchk GET /
    server lnms1 192.168.1.116:8000 check
    server lnms2 192.168.1.117:8000 check
    server lnms3 192.168.1.118:8000 check
