---
- name: Install GlusterFS packages
  package:
    name: "{{ librenms_gluster_packages }}"
    state: present
  when: librenms_rrd_mode == 'glusterfs'

- name: Configure Gluster daemon transport address family
  lineinfile:
    path: "{{ librenms_glusterd_vol_path }}"
    regexp: '^\s*option\s+transport\.address-family\s+'
    line: "    option transport.address-family {{ librenms_gluster_transport_address_family }}"
    insertbefore: '^\s*end-volume\s*$'
  register: glusterd_transport_address_family
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_transport_address_family | length > 0

- name: Ensure Gluster daemon is enabled and started
  service:
    name: "{{ librenms_glusterd_service_name }}"
    state: >-
      {{
        'restarted'
        if (
          glusterd_transport_address_family is defined and
          glusterd_transport_address_family.changed
        )
        else 'started'
      }}
    enabled: true
  when: librenms_rrd_mode == 'glusterfs'

- name: Verify Gluster management port is listening locally
  when: librenms_rrd_mode == 'glusterfs'
  block:
    - name: Wait for Gluster management port locally
      wait_for:
        host: 127.0.0.1
        port: 24007
        state: started
        timeout: 60
  rescue:
    - name: Capture Gluster service status
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_glusterd_service_name }}"
          - --no-pager
      register: glusterd_status
      changed_when: false
      failed_when: false

    - name: Capture Gluster service journal
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_glusterd_service_name }}"
          - -n
          - "50"
          - --no-pager
      register: glusterd_journal
      changed_when: false
      failed_when: false

    - name: Capture listening TCP sockets for diagnostics
      command:
        argv:
          - ss
          - -ltnp
      register: glusterd_sockets
      changed_when: false
      failed_when: false

    - name: Fail with Gluster startup diagnostics
      fail:
        msg: |-
          Gluster service {{ librenms_glusterd_service_name }} did not open tcp/24007 on {{ inventory_hostname }}.

          systemctl status:
          {{ glusterd_status.stdout | default('') }}

          journalctl:
          {{ glusterd_journal.stdout | default('') }}

          listening sockets:
          {{ glusterd_sockets.stdout | default('') }}

- name: Prepare Gluster brick filesystem when explicitly allowed
  filesystem:
    fstype: "{{ librenms_gluster_brick_fstype }}"
    dev: "{{ librenms_gluster_brick_device }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_manage_brick_device | bool
    - librenms_gluster_brick_device | length > 0

- name: Ensure Gluster brick parent directory exists
  file:
    path: "{{ librenms_gluster_brick_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: librenms_rrd_mode == 'glusterfs'

- name: Ensure Gluster brick directory exists
  file:
    path: "{{ librenms_gluster_brick_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: librenms_rrd_mode == 'glusterfs'

- name: Probe Gluster peers from bootstrap host
  command:
    argv:
      - gluster
      - peer
      - probe
      - "{{ hostvars[item].ansible_host | default(item) }}"
  register: gluster_peer_probe
  failed_when: false
  changed_when: "'peer probe: success' in (gluster_peer_probe.stdout | lower)"
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Fail on unexpected Gluster peer probe errors from bootstrap host
  fail:
    msg: |-
      Gluster peer probe failed for {{ item.item }}.

      rc: {{ item.rc }}
      stdout: {{ item.stdout | default('') }}
      stderr: {{ item.stderr | default('') }}
  loop: "{{ gluster_peer_probe.results | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - >-
      item.rc != 0 or (
        'peer probe: success' not in (item.stdout | default('') | lower) and
        'already in peer list' not in (item.stdout | default('') | lower) and
        'already in peer list' not in (item.stderr | default('') | lower)
      )

- name: Wait for Gluster peers to reach cluster state from bootstrap host
  command:
    argv:
      - gluster
      - peer
      - status
  register: gluster_peer_status
  changed_when: false
  until:
    - gluster_peer_status.rc == 0
    - >-
      (
        gluster_peer_status.stdout | default('')
        | regex_search(
            'Hostname:\\s+(' ~
            (
              hostvars[item].ansible_host | default(item) | regex_escape()
            ) ~
            '|' ~
            (item | regex_escape()) ~
            ')' ~
            '[\\s\\S]*?State:\\s+Peer in Cluster \\(Connected\\)'
          )
      ) is not none
  retries: 20
  delay: 3
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Check Gluster volume state
  command:
    argv:
      - gluster
      - volume
      - info
      - "{{ librenms_gluster_volume_name }}"
  register: gluster_volume_info
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Create Gluster replicated volume
  command: >
    gluster volume create {{ librenms_gluster_volume_name }}
    replica {{ librenms_gluster_replica_count }}
    {% for host in librenms_active_gluster_nodes %}
    {{ hostvars[host].ansible_host | default(host) }}:{{ librenms_gluster_brick_path }}
    {% endfor %}
    force
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - gluster_volume_info.rc != 0

- name: Start Gluster volume
  command:
    argv:
      - gluster
      - volume
      - start
      - "{{ librenms_gluster_volume_name }}"
  failed_when: false
  changed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Ensure RRD mountpoint exists on LibreNMS nodes
  file:
    path: "{{ librenms_gluster_mountpoint }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0775"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname in groups.get('librenms_nodes', [])

- name: Mount GlusterFS volume on LibreNMS nodes
  ansible.posix.mount:
    path: "{{ librenms_gluster_mountpoint }}"
    src: >-
      {{
        hostvars[librenms_gluster_bootstrap_host].ansible_host
        | default(librenms_gluster_bootstrap_host)
      }}:/{{ librenms_gluster_volume_name }}
    fstype: glusterfs
    opts: defaults,_netdev
    state: mounted
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname in groups.get('librenms_nodes', [])
