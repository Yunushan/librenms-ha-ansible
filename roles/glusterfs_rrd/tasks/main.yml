---
- name: Install GlusterFS packages
  package:
    name: "{{ librenms_gluster_packages }}"
    state: present
  when: librenms_rrd_mode == 'glusterfs'

- name: Gather service facts for Gluster firewall detection
  service_facts:
  when: librenms_rrd_mode == 'glusterfs'

- name: Detect UFW availability on Debian Gluster nodes
  command:
    argv:
      - ufw
      - status
  register: gluster_ufw_status
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_manage_firewall | bool
    - ansible_os_family == 'Debian'

- name: Ensure Gluster peer name resolution entries exist
  blockinfile:
    path: /etc/hosts
    insertbefore: BOF
    marker: "# {mark} LIBRENMS GLUSTER NODES"
    block: |-
      {% for host in librenms_active_gluster_nodes %}
      {{ hostvars[host].ansible_host | default(host) }} {{ host }}
      {% endfor %}
  register: gluster_hosts_entries
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_manage_gluster_hosts_entries | bool
    - inventory_hostname in ((groups.get('gluster_nodes', []) + groups.get('librenms_nodes', [])) | unique)

- name: Configure Gluster daemon transport address family
  lineinfile:
    path: "{{ librenms_glusterd_vol_path }}"
    regexp: '^\s*option\s+transport\.address-family\s+'
    line: "    option transport.address-family {{ librenms_gluster_transport_address_family }}"
    insertbefore: '^\s*end-volume\s*$'
  register: glusterd_transport_address_family
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_transport_address_family | length > 0

- name: Configure Gluster daemon bind address
  lineinfile:
    path: "{{ librenms_glusterd_vol_path }}"
    regexp: '^\s*option\s+transport\.socket\.bind-address\s+'
    line: >-
      option transport.socket.bind-address
      {{
        librenms_gluster_bind_address
        if librenms_gluster_bind_address | length > 0
        else (ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname)))
      }}
    insertbefore: '^\s*end-volume\s*$'
  register: glusterd_socket_bind_address
  when: librenms_rrd_mode == 'glusterfs'

- name: Ensure Gluster daemon is enabled and started
  service:
    name: "{{ librenms_glusterd_service_name }}"
    state: >-
      {{
        'restarted'
        if (
          (gluster_hosts_entries is defined and gluster_hosts_entries.changed) or
          glusterd_transport_address_family is defined and
          glusterd_transport_address_family.changed or
          (glusterd_socket_bind_address is defined and glusterd_socket_bind_address.changed)
        )
        else 'started'
      }}
    enabled: true
  when: librenms_rrd_mode == 'glusterfs'

- name: Verify Gluster management port is listening locally
  when: librenms_rrd_mode == 'glusterfs'
  block:
    - name: Wait for Gluster management port locally
      wait_for:
        host: >-
          {{
            librenms_gluster_bind_address
            if librenms_gluster_bind_address | length > 0
            else (ansible_host | default(ansible_default_ipv4.address | default('127.0.0.1')))
          }}
        port: 24007
        state: started
        timeout: 60
  rescue:
    - name: Capture Gluster service status
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_glusterd_service_name }}"
          - --no-pager
      register: glusterd_status
      changed_when: false
      failed_when: false

    - name: Capture Gluster service journal
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_glusterd_service_name }}"
          - -n
          - "50"
          - --no-pager
      register: glusterd_journal
      changed_when: false
      failed_when: false

    - name: Capture listening TCP sockets for diagnostics
      command:
        argv:
          - ss
          - -ltnp
      register: glusterd_sockets
      changed_when: false
      failed_when: false

    - name: Fail with Gluster startup diagnostics
      fail:
        msg: |-
          Gluster service {{ librenms_glusterd_service_name }} did not open tcp/24007 on
          {{
            librenms_gluster_bind_address
            if librenms_gluster_bind_address | length > 0
            else (ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname)))
          }}
          for {{ inventory_hostname }}.

          systemctl status:
          {{ glusterd_status.stdout | default('') }}

          journalctl:
          {{ glusterd_journal.stdout | default('') }}

          listening sockets:
          {{ glusterd_sockets.stdout | default('') }}

- name: Allow Gluster TCP ports with UFW when available
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: >-
    {{
      librenms_gluster_firewall_ports
      + librenms_gluster_firewall_port_ranges
    }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_manage_firewall | bool
    - ansible_os_family == 'Debian'
    - gluster_ufw_status is defined
    - gluster_ufw_status.rc == 0

- name: Allow Gluster TCP ports with firewalld when active
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - 24007/tcp
    - 24008/tcp
    - 24009/tcp
    - 49152-49251/tcp
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_manage_firewall | bool
    - ansible_os_family == 'RedHat'
    - "'firewalld.service' in ansible_facts.services"
    - ansible_facts.services['firewalld.service'].state == 'running'

- name: Wait for Gluster management port on peer nodes from bootstrap host
  wait_for:
    host: "{{ hostvars[item].ansible_host | default(item) }}"
    port: 24007
    state: started
    timeout: 60
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  register: gluster_peer_port_wait
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Record Gluster peer reachability failures from bootstrap host
  set_fact:
    gluster_unreachable_peers: >-
      {{
        gluster_peer_port_wait.results
        | default([])
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | map(attribute='item')
        | list
      }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Capture Gluster peer service status for diagnostics
  command:
    argv:
      - systemctl
      - status
      - "{{ librenms_glusterd_service_name }}"
      - --no-pager
  register: gluster_peer_service_status
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_unreachable_peers | default([]) | length) > 0

- name: Capture Gluster peer journal for diagnostics
  command:
    argv:
      - journalctl
      - -u
      - "{{ librenms_glusterd_service_name }}"
      - -n
      - "50"
      - --no-pager
  register: gluster_peer_service_journal
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_unreachable_peers | default([]) | length) > 0

- name: Capture Gluster peer listening sockets for diagnostics
  command:
    argv:
      - ss
      - -ltnp
  register: gluster_peer_sockets
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_unreachable_peers | default([]) | length) > 0

- name: Capture UFW status on failing Gluster peers
  command:
    argv:
      - ufw
      - status
      - verbose
  register: gluster_peer_ufw_status
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - ansible_os_family == 'Debian'
    - (gluster_unreachable_peers | default([]) | length) > 0

- name: Fail with Gluster peer reachability diagnostics
  fail:
    msg: |-
      Bootstrap host {{ inventory_hostname }} could not reach tcp/24007 on one or more Gluster peers.

      wait_for results:
      {{
        gluster_peer_port_wait.results
        | default([])
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | to_nice_yaml(indent=2)
      }}

      peer systemctl status:
      {{ gluster_peer_service_status.results | default([]) | to_nice_yaml(indent=2) }}

      peer journalctl:
      {{ gluster_peer_service_journal.results | default([]) | to_nice_yaml(indent=2) }}

      peer listening sockets:
      {{ gluster_peer_sockets.results | default([]) | to_nice_yaml(indent=2) }}

      peer ufw status:
      {{ gluster_peer_ufw_status.results | default([]) | to_nice_yaml(indent=2) }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_unreachable_peers | default([]) | length) > 0

- name: Prepare Gluster brick filesystem when explicitly allowed
  filesystem:
    fstype: "{{ librenms_gluster_brick_fstype }}"
    dev: "{{ librenms_gluster_brick_device }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - librenms_gluster_manage_brick_device | bool
    - librenms_gluster_brick_device | length > 0

- name: Ensure Gluster brick parent directory exists
  file:
    path: "{{ librenms_gluster_brick_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: librenms_rrd_mode == 'glusterfs'

- name: Ensure Gluster brick directory exists
  file:
    path: "{{ librenms_gluster_brick_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: librenms_rrd_mode == 'glusterfs'

- name: Probe Gluster peers from bootstrap host
  command:
    argv:
      - gluster
      - peer
      - probe
      - "{{ item }}"
  register: gluster_peer_probe
  failed_when: false
  changed_when: "'peer probe: success' in (gluster_peer_probe.stdout | lower)"
  until: >-
    gluster_peer_probe.rc == 0 or
    'peer probe: success' in (gluster_peer_probe.stdout | default('') | lower) or
    'already in peer list' in (gluster_peer_probe.stdout | default('') | lower) or
    'already in peer list' in (gluster_peer_probe.stderr | default('') | lower)
  retries: 10
  delay: 6
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Record Gluster peers that returned transport endpoint probe errors
  set_fact:
    gluster_transport_error_peers: >-
      {{
        gluster_peer_probe.results
        | default([])
        | selectattr('rc', 'defined')
        | selectattr('rc', 'ne', 0)
        | selectattr('stderr', 'defined')
        | selectattr('stderr', 'search', 'Transport endpoint is not connected')
        | map(attribute='item')
        | list
      }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Reset failed Gluster daemon state on peers with transport endpoint probe errors
  command:
    argv:
      - systemctl
      - reset-failed
      - "{{ librenms_glusterd_service_name }}"
  register: gluster_transport_restart_reset
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_error_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_error_peers | default([]) | length) > 0

- name: Restart Gluster daemon on peers with transport endpoint probe errors
  command:
    argv:
      - systemctl
      - restart
      - "{{ librenms_glusterd_service_name }}"
  register: gluster_transport_restart_result
  changed_when: "gluster_transport_restart_result.rc == 0"
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_error_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_error_peers | default([]) | length) > 0

- name: Wait for restarted Gluster peers to reopen management port
  wait_for:
    host: "{{ hostvars[item].ansible_host | default(item) }}"
    port: 24007
    state: started
    timeout: 60
  register: gluster_transport_restart_wait
  changed_when: false
  failed_when: false
  loop: "{{ gluster_transport_error_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_error_peers | default([]) | length) > 0

- name: Record Gluster peers that did not reopen port 24007 after restart
  set_fact:
    gluster_transport_restart_unreachable_peers: >-
      {{
        gluster_transport_restart_wait.results
        | default([])
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | map(attribute='item')
        | list
      }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_error_peers | default([]) | length) > 0

- name: Capture Gluster peer service status after failed restart recovery
  command:
    argv:
      - systemctl
      - status
      - "{{ librenms_glusterd_service_name }}"
      - --no-pager
  register: gluster_transport_restart_service_status
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_restart_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_restart_unreachable_peers | default([]) | length) > 0

- name: Capture Gluster peer journal after failed restart recovery
  command:
    argv:
      - journalctl
      - -u
      - "{{ librenms_glusterd_service_name }}"
      - -n
      - "50"
      - --no-pager
  register: gluster_transport_restart_service_journal
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_restart_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_restart_unreachable_peers | default([]) | length) > 0

- name: Capture Gluster peer listening sockets after failed restart recovery
  command:
    argv:
      - ss
      - -ltnp
  register: gluster_transport_restart_sockets
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_restart_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_restart_unreachable_peers | default([]) | length) > 0

- name: Capture UFW status after failed restart recovery
  command:
    argv:
      - ufw
      - status
      - verbose
  register: gluster_transport_restart_ufw_status
  changed_when: false
  failed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ gluster_transport_restart_unreachable_peers | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - ansible_os_family == 'Debian'
    - (gluster_transport_restart_unreachable_peers | default([]) | length) > 0

- name: Fail with Gluster restart recovery diagnostics
  fail:
    msg: |-
      Gluster peers did not reopen tcp/24007 after restart recovery from bootstrap host {{ inventory_hostname }}.

      restart wait results:
      {{
        gluster_transport_restart_wait.results
        | default([])
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | to_nice_yaml(indent=2)
      }}

      peer systemctl status:
      {{ gluster_transport_restart_service_status.results | default([]) | to_nice_yaml(indent=2) }}

      peer journalctl:
      {{ gluster_transport_restart_service_journal.results | default([]) | to_nice_yaml(indent=2) }}

      peer listening sockets:
      {{ gluster_transport_restart_sockets.results | default([]) | to_nice_yaml(indent=2) }}

      peer ufw status:
      {{ gluster_transport_restart_ufw_status.results | default([]) | to_nice_yaml(indent=2) }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_transport_restart_unreachable_peers | default([]) | length) > 0

- name: Re-check Gluster peer probes from bootstrap host
  command:
    argv:
      - gluster
      - peer
      - probe
      - "{{ item }}"
  register: gluster_peer_probe_final
  failed_when: false
  changed_when: "'peer probe: success' in (gluster_peer_probe_final.stdout | lower)"
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Record final unexpected Gluster peer probe failures
  set_fact:
    gluster_failed_peer_probe_results: >-
      {{
        gluster_peer_probe_final.results
        | default([])
        | selectattr('rc', 'defined')
        | selectattr('rc', 'ne', 0)
        | rejectattr('stdout', 'search', 'already in peer list')
        | rejectattr('stderr', 'search', 'already in peer list')
        | list
      }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Capture Gluster peer service status for failed peer probes
  command:
    argv:
      - systemctl
      - status
      - "{{ librenms_glusterd_service_name }}"
      - --no-pager
  register: gluster_failed_peer_service_status
  changed_when: false
  failed_when: false
  delegate_to: "{{ item.item }}"
  loop: "{{ gluster_failed_peer_probe_results | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_failed_peer_probe_results | default([]) | length) > 0

- name: Capture Gluster peer journal for failed peer probes
  command:
    argv:
      - journalctl
      - -u
      - "{{ librenms_glusterd_service_name }}"
      - -n
      - "50"
      - --no-pager
  register: gluster_failed_peer_service_journal
  changed_when: false
  failed_when: false
  delegate_to: "{{ item.item }}"
  loop: "{{ gluster_failed_peer_probe_results | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_failed_peer_probe_results | default([]) | length) > 0

- name: Capture Gluster peer listening sockets for failed peer probes
  command:
    argv:
      - ss
      - -ltnp
  register: gluster_failed_peer_sockets
  changed_when: false
  failed_when: false
  delegate_to: "{{ item.item }}"
  loop: "{{ gluster_failed_peer_probe_results | default([]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_failed_peer_probe_results | default([]) | length) > 0

- name: Capture bootstrap host Gluster peer status for failed peer probes
  command:
    argv:
      - gluster
      - peer
      - status
  register: gluster_bootstrap_peer_status
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_failed_peer_probe_results | default([]) | length) > 0

- name: Fail on unexpected Gluster peer probe errors from bootstrap host
  fail:
    msg: |-
      Gluster peer probe still failed from bootstrap host {{ inventory_hostname }} after retry.

      final probe results:
      {{ gluster_failed_peer_probe_results | default([]) | to_nice_yaml(indent=2) }}

      bootstrap peer status:
      {{ gluster_bootstrap_peer_status.stdout | default('') }}

      peer systemctl status:
      {{ gluster_failed_peer_service_status.results | default([]) | to_nice_yaml(indent=2) }}

      peer journalctl:
      {{ gluster_failed_peer_service_journal.results | default([]) | to_nice_yaml(indent=2) }}

      peer listening sockets:
      {{ gluster_failed_peer_sockets.results | default([]) | to_nice_yaml(indent=2) }}
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - (gluster_failed_peer_probe_results | default([]) | length) > 0

- name: Wait for Gluster peers to reach cluster state from bootstrap host
  command:
    argv:
      - gluster
      - peer
      - status
  register: gluster_peer_status
  changed_when: false
  until:
    - gluster_peer_status.rc == 0
    - >-
      (
        gluster_peer_status.stdout | default('')
        | regex_search(
            'Hostname:\\s+(' ~
            (
              hostvars[item].ansible_host | default(item) | regex_escape()
            ) ~
            '|' ~
            (item | regex_escape()) ~
            ')' ~
            '[\\s\\S]*?State:\\s+Peer in Cluster \\(Connected\\)'
          )
      ) is not none
  retries: 20
  delay: 3
  loop: "{{ librenms_active_gluster_nodes | difference([inventory_hostname]) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Check Gluster volume state
  command:
    argv:
      - gluster
      - volume
      - info
      - "{{ librenms_gluster_volume_name }}"
  register: gluster_volume_info
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Create Gluster replicated volume
  command: >
    gluster volume create {{ librenms_gluster_volume_name }}
    replica {{ librenms_gluster_replica_count }}
    {% for host in librenms_active_gluster_nodes %}
    {{ host }}:{{ librenms_gluster_brick_path }}
    {% endfor %}
    force
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - gluster_volume_info.rc != 0

- name: Start Gluster volume
  command:
    argv:
      - gluster
      - volume
      - start
      - "{{ librenms_gluster_volume_name }}"
  failed_when: false
  changed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Ensure RRD mountpoint exists on LibreNMS nodes
  file:
    path: "{{ librenms_gluster_mountpoint }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname in groups.get('librenms_nodes', [])

- name: Mount GlusterFS volume on LibreNMS nodes
  ansible.posix.mount:
    path: "{{ librenms_gluster_mountpoint }}"
    src: >-
      {{
        hostvars[librenms_gluster_bootstrap_host].ansible_host
        | default(librenms_gluster_bootstrap_host)
      }}:/{{ librenms_gluster_volume_name }}
    fstype: glusterfs
    opts: defaults,_netdev
    state: mounted
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname in groups.get('librenms_nodes', [])
