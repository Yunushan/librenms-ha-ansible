---
- name: Ensure SNMP config directory exists
  file:
    path: "{{ librenms_snmpd_conf_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy snmpd configuration
  template:
    src: snmpd.conf.j2
    dest: "{{ librenms_snmpd_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart snmpd

- name: Check candidate SNMP persistent config files
  stat:
    path: "{{ item }}"
  loop: "{{ librenms_snmp_persistent_config_candidates }}"
  register: librenms_snmp_persistent_candidates

- name: Pick SNMP persistent config path
  set_fact:
    librenms_snmp_persistent_config_path: >-
      {{
        (
          librenms_snmp_persistent_candidates.results
          | selectattr('stat.exists', 'equalto', true)
          | map(attribute='stat.path')
          | list
          | first
        )
        | default(librenms_snmp_persistent_config_candidates | first, true)
      }}

- name: Ensure SNMP persistent config directory exists
  file:
    path: "{{ librenms_snmp_persistent_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure SNMP persistent config file exists
  file:
    path: "{{ librenms_snmp_persistent_config_path }}"
    state: touch
    owner: root
    group: root
    mode: "0600"
  when: (librenms_snmp_v3_users | length) > 0

- name: Check existing SNMPv3 users in persistent config
  command:
    argv:
      - grep
      - -F
      - "{{ item.username }}"
      - "{{ librenms_snmp_persistent_config_path }}"
  register: librenms_snmp_v3_user_checks
  changed_when: false
  failed_when: false
  when:
    - item.username is defined
    - item.auth_password is defined
    - item.priv_password is defined
    - (librenms_snmp_v3_users | length) > 0
  loop: "{{ librenms_snmp_v3_users }}"
  loop_control:
    label: "{{ item.username | default('snmpv3-user') }}"

- name: Create SNMPv3 bootstrap directives in persistent config
  lineinfile:
    path: "{{ librenms_snmp_persistent_config_path }}"
    line: >-
      createUser {{ item.item.username }}
      {{ item.item.auth_protocol | default('SHA') }}
      "{{ item.item.auth_password }}"
      {{ item.item.priv_protocol | default('AES') }}
      "{{ item.item.priv_password }}"
    insertafter: EOF
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - item.item.username is defined
    - item.item.auth_password is defined
    - item.item.priv_password is defined
    - item.rc != 0
  loop: "{{ librenms_snmp_v3_user_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.username | default('snmpv3-user') }}"
  notify: Restart snmpd

- name: Download LibreNMS distro helper script
  get_url:
    url: https://raw.githubusercontent.com/librenms/librenms-agent/master/snmp/distro
    dest: /usr/bin/distro
    mode: "0755"
  failed_when: false

- name: Enable and start snmpd
  service:
    name: "{{ librenms_snmpd_service_name }}"
    state: started
    enabled: true
