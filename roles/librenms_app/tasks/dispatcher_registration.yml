---
- name: Determine expected LibreNMS dispatcher nodes
  set_fact:
    librenms_dispatcher_registration_nodes_effective: >-
      {{
        librenms_dispatcher_registration_nodes_input
        | default(librenms_dispatcher_registration_nodes)
      }}

- name: Ensure LibreNMS dispatcher service is enabled and running
  service:
    name: librenms.service
    state: started
    enabled: true
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"
  delegate_to: "{{ item }}"

- name: Restart LibreNMS dispatcher service before heartbeat validation
  command:
    argv:
      - systemctl
      - restart
      - librenms.service
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"
  delegate_to: "{{ item }}"
  register: librenms_dispatcher_registration_restart
  retries: 5
  delay: 3
  until: librenms_dispatcher_registration_restart.rc == 0
  when: librenms_dispatcher_restart_before_registration | bool

- name: Wait for LibreNMS dispatcher service to be active
  command:
    argv:
      - systemctl
      - is-active
      - librenms.service
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"
  delegate_to: "{{ item }}"
  register: librenms_dispatcher_active_check
  changed_when: false
  retries: "{{ librenms_dispatcher_registration_retries | int }}"
  delay: "{{ librenms_dispatcher_registration_delay | int }}"
  until: librenms_dispatcher_active_check.stdout == 'active'

- name: Initialize expected LibreNMS dispatcher node SQL entries
  set_fact:
    librenms_dispatcher_registration_node_ids_sql_entries: []

- name: Collect expected LibreNMS dispatcher node SQL entries
  set_fact:
    librenms_dispatcher_registration_node_ids_sql_entries: >-
      {{
        librenms_dispatcher_registration_node_ids_sql_entries
        + [
            "'" ~ (
              hostvars[item].librenms_node_id
              | default(item)
              | replace("'", "''")
            ) ~ "'"
          ]
      }}
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"

- name: Build expected LibreNMS dispatcher node SQL list
  set_fact:
    librenms_dispatcher_registration_node_ids_sql: >-
      {{ librenms_dispatcher_registration_node_ids_sql_entries | join(', ') }}

- name: Prune unmanaged LibreNMS dispatcher stats rows
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        DELETE `poller_cluster_stats`
        FROM `poller_cluster_stats`
        LEFT JOIN `poller_cluster`
        ON `poller_cluster`.`id` = `poller_cluster_stats`.`parent_poller`
        WHERE `poller_cluster`.`id` IS NULL
        OR `poller_cluster`.`node_id`
        NOT IN ({{ librenms_dispatcher_registration_node_ids_sql }})
  no_log: true
  changed_when: false
  when: librenms_dispatcher_prune_unmanaged_nodes | bool

- name: Prune unmanaged LibreNMS dispatcher rows
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        DELETE FROM `poller_cluster`
        WHERE `node_id` NOT IN ({{ librenms_dispatcher_registration_node_ids_sql }})
  no_log: true
  changed_when: false
  when: librenms_dispatcher_prune_unmanaged_nodes | bool

- name: Refresh LibreNMS dispatcher poller registrations
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        INSERT INTO `poller_cluster`
        (`node_id`, `poller_name`, `poller_version`, `poller_groups`,
        `last_report`, `master`, `poller_frequency`)
        VALUES
        ('{{ hostvars[item].librenms_node_id | default(item) | replace("'", "''") }}',
        '{{ item | replace("'", "''") }}',
        'librenms-service', '0', NOW(), 0,
        {{ librenms_dispatcher_poller_frequency | int }})
        ON DUPLICATE KEY UPDATE
        `poller_name` = VALUES(`poller_name`),
        `poller_version` = VALUES(`poller_version`),
        `poller_groups` = VALUES(`poller_groups`),
        `poller_frequency` = VALUES(`poller_frequency`)
  no_log: true
  changed_when: false
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"

- name: Verify LibreNMS dispatcher poller registrations are active
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        SELECT COUNT(*) AS active_pollers
        FROM `poller_cluster`
        WHERE `node_id` =
        '{{ hostvars[item].librenms_node_id | default(item) | replace("'", "''") }}'
        AND `last_report` >= DATE_SUB(
          NOW(),
          INTERVAL COALESCE(
            `poller_frequency`,
            {{ librenms_dispatcher_poller_frequency | int }}
          ) SECOND
        )
  register: librenms_dispatcher_registration_check
  no_log: true
  changed_when: false
  retries: "{{ librenms_dispatcher_registration_retries | int }}"
  delay: "{{ librenms_dispatcher_registration_delay | int }}"
  until:
    - >-
      (
        librenms_dispatcher_registration_check.query_result[0][0].active_pollers
        | default(0)
        | int
      ) > 0
  loop: "{{ librenms_dispatcher_registration_nodes_effective }}"

- name: Verify no inactive LibreNMS dispatcher rows remain
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        SELECT COUNT(*) AS inactive_pollers
        FROM `poller_cluster`
        WHERE `last_report` < DATE_SUB(
          NOW(),
          INTERVAL COALESCE(
            `poller_frequency`,
            {{ librenms_dispatcher_poller_frequency | int }}
          ) SECOND
        )
  register: librenms_dispatcher_inactive_check
  no_log: true
  changed_when: false
  retries: "{{ librenms_dispatcher_registration_retries | int }}"
  delay: "{{ librenms_dispatcher_registration_delay | int }}"
  until:
    - >-
      (
        librenms_dispatcher_inactive_check.query_result[0][0].inactive_pollers
        | default(1)
        | int
      ) == 0
