---
- name: Determine effective app URL
  set_fact:
    librenms_app_url_effective: >-
      {{
        librenms_app_url
        if librenms_app_url | length > 0
        else
        (
          (
            'https'
            if librenms_haproxy_tls_enabled | bool
            else 'http'
          ) ~ '://' ~ (
            librenms_fqdn
            if librenms_fqdn | length > 0 and librenms_fqdn != librenms_default_fqdn_placeholder
            else (
              librenms_vip_ip
              if librenms_vip_enabled and librenms_vip_ip | length > 0
              else inventory_hostname
            )
          )
        )
      }}

- name: Determine effective app host
  set_fact:
    librenms_app_host_effective: >-
      {{
        librenms_app_url_effective
        | regex_replace('^[A-Za-z]+://', '')
        | regex_replace('/.*$', '')
        | regex_replace(':.*$', '')
      }}

- name: Determine effective nginx server names
  set_fact:
    librenms_nginx_server_names_effective: >-
      {{
        (
          [
            (
              librenms_fqdn
              if librenms_fqdn | length > 0 and librenms_fqdn != librenms_default_fqdn_placeholder
              else ''
            ),
            librenms_app_host_effective,
            (
              librenms_vip_ip
              if librenms_vip_enabled and librenms_vip_ip | length > 0
              else ''
            )
          ]
          + librenms_nginx_server_aliases
        )
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | unique
        | join(' ')
      }}

- name: Determine effective trusted proxy list
  set_fact:
    librenms_trusted_proxies_effective: >-
      {%- for host in librenms_active_lb_nodes -%}
      {{ hostvars[host].ansible_host | default(host) }}{%- if not loop.last -%},{%- endif -%}
      {%- endfor -%}

- name: Determine effective app key
  set_fact:
    librenms_app_key_effective: >-
      {{
        librenms_app_key
        if librenms_app_key.startswith('base64:')
        else
        (
          'base64:' ~ librenms_app_key
          if (librenms_app_key | regex_search('^[A-Za-z0-9+/]{43}=$'))
          else librenms_app_key
        )
      }}

- name: Determine effective runtime DB host
  set_fact:
    librenms_db_host_effective: >-
      {{
        librenms_db_host
        if librenms_db_host | length > 0
        else
        (
          '127.0.0.1'
          if librenms_db_mode == 'local'
          else
          (
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
            if (
              librenms_db_mode == 'galera'
              and librenms_runtime_db_prefer_local_galera | bool
              and inventory_hostname in librenms_active_db_nodes
            )
            else
            (
              librenms_vip_ip
              if librenms_db_mode == 'galera' and librenms_vip_enabled and librenms_vip_ip | length > 0
              else
              (
                hostvars[(librenms_active_lb_nodes | first)].ansible_host | default(librenms_active_lb_nodes | first)
                if librenms_db_mode == 'galera' and (librenms_active_lb_nodes | length > 0)
                else
                (
                  hostvars[(librenms_active_db_nodes | first)].ansible_host | default(librenms_active_db_nodes | first)
                  if (librenms_active_db_nodes | length > 0)
                  else '127.0.0.1'
                )
              )
            )
          )
        )
      }}

- name: Probe Galera nodes for an install-time database endpoint
  command:
    argv:
      - mysql
      - --protocol=socket
      - "--socket={{ librenms_mariadb_socket }}"
      - -Nse
      - "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready');"
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_install_db_probe
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - librenms_db_mode == 'galera'
    - librenms_db_host | length == 0

- name: Initialize live Galera install-time database host list
  set_fact:
    librenms_galera_install_db_hosts: []
  when:
    - librenms_db_mode == 'galera'
    - librenms_db_host | length == 0

- name: Collect live Galera install-time database hosts
  set_fact:
    librenms_galera_install_db_hosts: "{{ librenms_galera_install_db_hosts + [item.item] }}"
  loop: "{{ librenms_galera_install_db_probe.results | default([]) }}"
  when:
    - librenms_db_mode == 'galera'
    - librenms_db_host | length == 0
    - (item.stdout | default('')) is search('wsrep_cluster_status[ \t]+Primary')
    - (item.stdout | default('')) is search('wsrep_ready[ \t]+ON')

- name: Determine live Galera install-time database host
  set_fact:
    librenms_galera_install_db_host: >-
      {{
        (librenms_galera_install_db_hosts | default([]))
        | first
        | default('')
      }}
  when:
    - librenms_db_mode == 'galera'
    - librenms_db_host | length == 0

- name: Fail when no live Galera install-time database host was found
  fail:
    msg: |-
      No live Galera install-time database host was found.

      At least one Galera node must report:
      wsrep_cluster_status Primary
      wsrep_ready ON

      Probe results:
      {{ librenms_galera_install_db_probe.results | default([]) }}
  when:
    - librenms_db_mode == 'galera'
    - librenms_db_host | length == 0
    - librenms_galera_install_db_host | default('') | length == 0

- name: Determine effective install-time DB host
  set_fact:
    librenms_db_host_install_effective: >-
      {{
        librenms_db_host
        if librenms_db_host | length > 0
        else
        (
          '127.0.0.1'
          if librenms_db_mode == 'local'
          else
          (
            hostvars[librenms_galera_install_db_host].ansible_host | default(librenms_galera_install_db_host)
            if librenms_db_mode == 'galera'
            else librenms_db_host_effective
          )
        )
      }}

- name: Determine effective Redis host
  set_fact:
    librenms_redis_host_effective: >-
      {{
        '127.0.0.1'
        if librenms_redis_mode == 'local'
        else
        (
          librenms_redis_external_host
          if librenms_redis_mode == 'external' and librenms_redis_external_host | length > 0
          else
          (
            hostvars[(librenms_active_redis_nodes | first)].ansible_host | default(librenms_active_redis_nodes | first)
            if (librenms_active_redis_nodes | length > 0)
            else '127.0.0.1'
          )
        )
      }}

- name: Determine effective Redis Sentinel host list
  no_log: true
  set_fact:
    librenms_redis_sentinel_hosts_effective: >-
      {%- set sentinel_nodes =
        (
          [inventory_hostname]
          if inventory_hostname in librenms_active_redis_nodes
          else []
        )
        + (
          librenms_active_redis_nodes
          | difference([inventory_hostname, librenms_redis_master_host])
        )
        + (
          [librenms_redis_master_host]
          if (
            librenms_redis_master_host in librenms_active_redis_nodes
            and librenms_redis_master_host != inventory_hostname
          )
          else []
        )
      -%}
      {%- set ns = namespace(urls=[]) -%}
      {%- for host in sentinel_nodes -%}
      {%- set ns.urls = ns.urls + [
        'redis://'
        ~ (hostvars[host].ansible_host | default(host))
        ~ ':26379?password='
        ~ (librenms_redis_sentinel_password | urlencode)
        ~ (
          '&username=' ~ (librenms_redis_sentinel_username | urlencode)
          if librenms_redis_sentinel_username | length > 0
          else ''
        )
      ] -%}
      {%- endfor -%}
      {{ ns.urls | join(',') }}

- name: Determine effective Redis Sentinel poller list
  set_fact:
    librenms_redis_sentinel_effective: >-
      {%- set sentinel_nodes =
        (
          [inventory_hostname]
          if inventory_hostname in librenms_active_redis_nodes
          else []
        )
        + (
          librenms_active_redis_nodes
          | difference([inventory_hostname, librenms_redis_master_host])
        )
        + (
          [librenms_redis_master_host]
          if (
            librenms_redis_master_host in librenms_active_redis_nodes
            and librenms_redis_master_host != inventory_hostname
          )
          else []
        )
      -%}
      {%- for host in sentinel_nodes -%}
      {{ hostvars[host].ansible_host | default(host) }}:26379{%- if not loop.last -%},{%- endif -%}
      {%- endfor -%}

- name: Determine effective primary LibreNMS node
  set_fact:
    librenms_primary_node_effective: >-
      {{
        groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname]))
        | first
      }}

- name: Determine effective runtime config node
  set_fact:
    librenms_runtime_config_node_effective: "{{ ansible_play_hosts | first }}"

- name: Determine whether rrdcached should run on this node
  set_fact:
    librenms_rrdcached_runs_on_host: >-
      {{
        librenms_rrdcached_scope == 'all'
        or inventory_hostname == librenms_primary_node_effective
      }}

- name: Determine effective rrdcached network bind address
  set_fact:
    librenms_rrdcached_network_bind_address_effective: >-
      {{
        ansible_host
        | default(ansible_default_ipv4.address | default(inventory_hostname))
        if (
          librenms_rrdcached_endpoint_strategy == 'vip_tcp'
          and (
            librenms_rrdcached_network_bind_address | string | trim
          ) in ['', '0.0.0.0', '::', '*']
        )
        else librenms_rrdcached_network_bind_address
      }}

- name: Determine effective rrdcached TCP host
  set_fact:
    librenms_rrdcached_tcp_host_effective: >-
      {{
        librenms_vip_ip
        if (
          librenms_rrdcached_endpoint_strategy == 'vip_tcp'
          and librenms_vip_enabled | bool
          and librenms_vip_ip | length > 0
        )
        else
        (
          hostvars[(librenms_active_lb_nodes | first)].ansible_host
          | default(librenms_active_lb_nodes | first)
          if (
            librenms_rrdcached_endpoint_strategy == 'vip_tcp'
            and (librenms_active_lb_nodes | length > 0)
          )
          else
          (
            hostvars[librenms_primary_node_effective].ansible_host
            | default(librenms_primary_node_effective)
          )
        )
      }}

- name: Determine effective rrdcached endpoint TCP port
  set_fact:
    librenms_rrdcached_endpoint_port_effective: >-
      {{
        librenms_haproxy_rrdcached_port
        if (
          librenms_rrdcached_endpoint_strategy == 'vip_tcp'
          and librenms_haproxy_rrdcached_enabled | bool
        )
        else librenms_rrdcached_bind_port
      }}

- name: Determine effective rrdcached endpoint
  set_fact:
    librenms_rrdcached_endpoint_effective: >-
      {{
        librenms_rrdcached_endpoint
        if librenms_rrdcached_endpoint | length > 0
        else
        (
          'unix:' ~ librenms_rrdcached_socket
          if librenms_rrdcached_endpoint_strategy == 'unix'
          else
          (
            librenms_rrdcached_tcp_host_effective
            ~ ':'
            ~ (librenms_rrdcached_endpoint_port_effective | string)
          )
        )
      }}

- name: Determine effective schema maintenance host
  set_fact:
    librenms_schema_fix_host_effective: >-
      {{
        librenms_runtime_config_node_effective
        if librenms_db_mode in ['local', 'galera']
        else (
          groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname]))
          | first
        )
      }}

- name: Create LibreNMS group
  group:
    name: "{{ librenms_group }}"
    system: true

- name: Create LibreNMS user
  user:
    name: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    system: true
    home: "{{ librenms_install_dir }}"
    create_home: false
    shell: "{{ librenms_shell }}"

- name: Ensure install directory parent exists
  file:
    path: "{{ librenms_install_dir | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure LibreNMS install directory exists and is writable by LibreNMS user
  file:
    path: "{{ librenms_install_dir }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0755"

- name: Ensure LibreNMS Ansible remote temp directory exists
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ librenms_ansible_remote_tmp | dirname }}"
      mode: "0700"
    - path: "{{ librenms_ansible_remote_tmp }}"
      mode: "0700"

- name: Check whether LibreNMS install directory already exists
  stat:
    path: "{{ librenms_install_dir }}"
  register: librenms_install_dir_stat

- name: Check whether LibreNMS install directory is already a Git checkout
  stat:
    path: "{{ librenms_install_dir }}/.git"
  register: librenms_install_git_dir_stat

- name: Ensure existing LibreNMS Git metadata is owned by LibreNMS user
  file:
    path: "{{ librenms_install_dir }}/.git"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    recurse: true
  when: librenms_install_git_dir_stat.stat.exists

- name: Ensure pre-existing LibreNMS writable paths are writable before Git checkout
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0775"
  loop:
    - "{{ librenms_install_dir }}/rrd"
    - "{{ librenms_install_dir }}/logs"
    - "{{ librenms_install_dir }}/bootstrap"
    - "{{ librenms_install_dir }}/bootstrap/cache"
    - "{{ librenms_install_dir }}/storage"
  when: librenms_install_dir_stat.stat.exists

- name: Initialize Git repository in pre-existing LibreNMS install directory
  command:
    argv:
      - git
      - -C
      - "{{ librenms_install_dir }}"
      - init
  become: true
  become_user: "{{ librenms_user }}"
  environment:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ librenms_install_dir }}"
  when:
    - librenms_install_dir_stat.stat.exists
    - not librenms_install_git_dir_stat.stat.exists

- name: Detect existing origin remote in LibreNMS checkout
  command:
    argv:
      - git
      - -C
      - "{{ librenms_install_dir }}"
      - remote
      - get-url
      - origin
  register: librenms_origin_remote
  become: true
  become_user: "{{ librenms_user }}"
  environment:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ librenms_install_dir }}"
  changed_when: false
  failed_when: false
  when:
    - librenms_install_dir_stat.stat.exists
    - not librenms_install_git_dir_stat.stat.exists

- name: Add origin remote to bootstrapped LibreNMS checkout
  command:
    argv:
      - git
      - -C
      - "{{ librenms_install_dir }}"
      - remote
      - add
      - origin
      - "{{ librenms_repo_url }}"
  become: true
  become_user: "{{ librenms_user }}"
  environment:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ librenms_install_dir }}"
  when:
    - librenms_install_dir_stat.stat.exists
    - not librenms_install_git_dir_stat.stat.exists
    - librenms_origin_remote.rc != 0

- name: Update origin remote URL in bootstrapped LibreNMS checkout
  command:
    argv:
      - git
      - -C
      - "{{ librenms_install_dir }}"
      - remote
      - set-url
      - origin
      - "{{ librenms_repo_url }}"
  become: true
  become_user: "{{ librenms_user }}"
  environment:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ librenms_install_dir }}"
  when:
    - librenms_install_dir_stat.stat.exists
    - not librenms_install_git_dir_stat.stat.exists
    - librenms_origin_remote.rc == 0
    - librenms_origin_remote.stdout != librenms_repo_url

- name: Remove runtime placeholder files that can block first LibreNMS checkout
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ librenms_install_dir }}/rrd/.gitignore"
    - "{{ librenms_install_dir }}/logs/.gitignore"
    - "{{ librenms_install_dir }}/bootstrap/.gitignore"
    - "{{ librenms_install_dir }}/bootstrap/cache/.gitignore"
    - "{{ librenms_install_dir }}/storage/.gitignore"
  when:
    - librenms_install_dir_stat.stat.exists
  throttle: 1

- name: Resolve latest stable LibreNMS release tag
  shell: >-
    set -o pipefail &&
    git ls-remote --tags --refs {{ librenms_repo_url | quote }} |
    awk -F/ '/refs\/tags\/[0-9]+\.[0-9]+(\.[0-9]+)?$/ { print $NF }' |
    sort -V |
    tail -n 1
  args:
    executable: /bin/bash
  register: librenms_latest_stable_tag
  changed_when: false
  when: librenms_version | lower in ['latest-stable', 'latest_stable', 'latest']

- name: Determine effective LibreNMS checkout version
  set_fact:
    librenms_version_effective: >-
      {{
        librenms_latest_stable_tag.stdout | trim
        if librenms_version | lower in ['latest-stable', 'latest_stable', 'latest']
        else librenms_version
      }}

- name: Verify LibreNMS checkout version was resolved
  assert:
    that:
      - librenms_version_effective | length > 0
    fail_msg: >-
      Unable to resolve a stable LibreNMS release tag from {{ librenms_repo_url }}.
      Set librenms_version to an explicit tag such as "26.4.0" if the managed
      node cannot query GitHub tags during deployment.

- name: Checkout LibreNMS repository
  git:
    repo: "{{ librenms_repo_url }}"
    dest: "{{ librenms_install_dir }}"
    version: "{{ librenms_version_effective }}"
    update: true
    force: true
  become: true
  become_user: "{{ librenms_user }}"
  environment:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ librenms_install_dir }}"
  register: librenms_git_checkout
  throttle: 1

- name: Detect PHP version on Debian-family systems
  command:
    argv:
      - php
      - -r
      - "echo PHP_MAJOR_VERSION . '.' . PHP_MINOR_VERSION;"
  register: librenms_php_version_cmd
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Set effective PHP paths on Debian-family systems
  set_fact:
    librenms_php_cli_ini_effective: "/etc/php/{{ librenms_php_version_cmd.stdout }}/cli/php.ini"
    librenms_php_fpm_ini_effective: "/etc/php/{{ librenms_php_version_cmd.stdout }}/fpm/php.ini"
    librenms_php_fpm_pool_dir_effective: "/etc/php/{{ librenms_php_version_cmd.stdout }}/fpm/pool.d"
    librenms_php_fpm_service_effective: "php{{ librenms_php_version_cmd.stdout }}-fpm"
    librenms_php_fpm_binary_effective: "/usr/sbin/php-fpm{{ librenms_php_version_cmd.stdout }}"
  when: ansible_os_family == 'Debian'

- name: Set effective PHP paths on non-Debian systems
  set_fact:
    librenms_php_cli_ini_effective: "{{ librenms_php_cli_ini_path }}"
    librenms_php_fpm_ini_effective: "{{ librenms_php_fpm_ini_path }}"
    librenms_php_fpm_pool_dir_effective: "{{ librenms_php_fpm_pool_dir }}"
    librenms_php_fpm_service_effective: "{{ librenms_php_fpm_service_name }}"
    librenms_php_fpm_binary_effective: "{{ librenms_php_fpm_service_name }}"
  when: ansible_os_family != 'Debian'

- name: Ensure LibreNMS writable directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0775"
  loop:
    - "{{ librenms_install_dir }}/rrd"
    - "{{ librenms_install_dir }}/logs"
    - "{{ librenms_install_dir }}/bootstrap/cache"
    - "{{ librenms_install_dir }}/storage"

- name: Ensure LibreNMS install tree ownership is correct
  file:
    path: "{{ librenms_install_dir }}"
    state: directory
    recurse: true
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"

- name: Grant ACLs to LibreNMS writable directories
  ansible.posix.acl:
    path: "{{ item }}"
    entity: "{{ librenms_group }}"
    etype: group
    permissions: rwx
    default: true
    state: present
  loop:
    - "{{ librenms_install_dir }}/rrd"
    - "{{ librenms_install_dir }}/logs"
    - "{{ librenms_install_dir }}/bootstrap/cache"
    - "{{ librenms_install_dir }}/storage"
  when:
    - not (librenms_rrd_mode == 'glusterfs' and item == (librenms_install_dir ~ '/rrd'))

- name: Discover stale LibreNMS bootstrap cache files before Composer
  find:
    paths: "{{ librenms_install_dir }}/bootstrap/cache"
    file_type: file
    excludes: ".gitignore"
  register: librenms_pre_composer_bootstrap_cache_files

- name: Remove stale LibreNMS bootstrap cache files before Composer
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ librenms_pre_composer_bootstrap_cache_files.files | default([]) }}"

- name: Install LibreNMS PHP dependencies
  command:
    argv:
      - timeout
      - "{{ librenms_composer_install_timeout | int }}s"
      - ./scripts/composer_wrapper.php
      - install
      - --no-dev
      - --no-interaction
      - --no-scripts
  args:
    chdir: "{{ librenms_install_dir }}"
  environment:
    COMPOSER_PROCESS_TIMEOUT: "{{ librenms_composer_process_timeout | string }}"
    COMPOSER_MEMORY_LIMIT: "-1"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_composer
  changed_when: "'Nothing to install' not in (librenms_composer.stdout | default(''))"

- name: Set PHP timezone
  lineinfile:
    path: "{{ item }}"
    regexp: '^;?date.timezone ='
    line: "date.timezone = {{ librenms_timezone }}"
    create: false
  loop: >-
    {{
      [
        librenms_php_cli_ini_effective | default(''),
        librenms_php_fpm_ini_effective | default('')
      ]
      | reject('equalto', '')
      | unique
      | list
    }}
  when:
    - item | length > 0

- name: Ensure LibreNMS PHP-FPM support directory exists
  file:
    path: "{{ librenms_web_validation_json_filter_path | dirname }}"
    state: directory
    owner: root
    group: "{{ librenms_group }}"
    mode: "0750"
  when:
    - librenms_manage_php_fpm | bool
    - librenms_manage_web_validation_json_filter | bool

- name: Deploy LibreNMS web validation JSON output filter
  template:
    src: web-validation-json-filter.php.j2
    dest: "{{ librenms_web_validation_json_filter_path }}"
    owner: root
    group: "{{ librenms_group }}"
    mode: "0640"
  when:
    - librenms_manage_php_fpm | bool
    - librenms_manage_web_validation_json_filter | bool
  notify: Restart PHP-FPM

- name: Deploy LibreNMS PHP-FPM pool
  template:
    src: php-fpm-librenms.conf.j2
    dest: "{{ librenms_php_fpm_pool_dir_effective }}/librenms.conf"
    owner: root
    group: root
    mode: "0644"
  when: librenms_manage_php_fpm | bool
  notify: Restart PHP-FPM

- name: Remove default PHP-FPM pool on Debian-family systems when present
  file:
    path: "{{ librenms_php_fpm_pool_dir_effective }}/www.conf"
    state: absent
  notify: Restart PHP-FPM
  when:
    - librenms_manage_php_fpm | bool
    - ansible_os_family == 'Debian'

- name: Deploy LibreNMS nginx site
  template:
    src: nginx-librenms.conf.j2
    dest: "{{ librenms_nginx_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  when: librenms_manage_nginx | bool
  notify: Restart nginx

- name: Remove default nginx site on Debian-family systems
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
    - /etc/nginx/conf.d/default.conf
    - /etc/nginx/conf.d/default
  notify: Restart nginx
  when:
    - librenms_manage_nginx | bool
    - ansible_os_family == 'Debian'

- name: Remove legacy LibreNMS nginx site paths
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/librenms
    - /etc/nginx/sites-enabled/librenms.conf
    - /etc/nginx/sites-available/librenms
    - /etc/nginx/sites-available/librenms.conf
  notify: Restart nginx
  when:
    - librenms_manage_nginx | bool
    - ansible_os_family == 'Debian'

- name: Discover enabled Debian nginx site entries
  find:
    paths: /etc/nginx/sites-enabled
    file_type: any
  register: librenms_nginx_sites_enabled_entries
  when:
    - librenms_manage_nginx | bool
    - ansible_os_family == 'Debian'

- name: Remove unmanaged Debian nginx site entries
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ librenms_nginx_sites_enabled_entries.files | default([]) }}"
  notify: Restart nginx
  when:
    - librenms_manage_nginx | bool
    - ansible_os_family == 'Debian'

- name: Deploy LibreNMS install-time environment file
  template:
    src: librenms.env.j2
    dest: "{{ librenms_install_dir }}/.env"
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0640"
  vars:
    librenms_env_db_host_effective: "{{ librenms_db_host_install_effective }}"

- name: Wait for LibreNMS install-time database endpoint
  when:
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)
  block:
    - name: Wait for install-time database TCP endpoint
      wait_for:
        host: "{{ librenms_db_host_install_effective }}"
        port: "{{ librenms_db_port }}"
        timeout: "{{ librenms_runtime_db_wait_timeout | int }}"
      register: librenms_install_db_wait
      retries: "{{ librenms_runtime_db_wait_retries | int }}"
      delay: "{{ librenms_runtime_db_wait_delay | int }}"
      until: librenms_install_db_wait is succeeded

    - name: Verify install-time database login
      community.mysql.mysql_query:
        login_host: "{{ librenms_db_host_install_effective }}"
        login_port: "{{ librenms_db_port }}"
        login_user: "{{ librenms_db_user }}"
        login_password: "{{ librenms_db_password }}"
        login_db: "{{ librenms_db_name }}"
        query:
          - "SELECT 1 AS ok"
      register: librenms_install_db_login_check
      changed_when: false
      no_log: true
  rescue:
    - name: Capture install-time Galera node status
      shell: |-
        set -o pipefail
        {
          echo "--- {{ item }} systemctl ---"
          systemctl status "{{ librenms_mariadb_service_name }}" --no-pager -l || true
          echo "--- {{ item }} listeners ---"
          ss -ltnp || true
          echo "--- {{ item }} wsrep ---"
          mysql --protocol=socket --socket="{{ librenms_mariadb_socket }}" -Nse \
            "SHOW GLOBAL STATUS WHERE Variable_name LIKE 'wsrep_%';" || true
          echo "--- {{ item }} journal ---"
          journalctl -u "{{ librenms_mariadb_service_name }}" -n 80 --no-pager || true
        }
      args:
        executable: /bin/bash
      loop: "{{ librenms_active_db_nodes }}"
      delegate_to: "{{ item }}"
      register: librenms_install_db_galera_diagnostics
      changed_when: false
      failed_when: false
      ignore_unreachable: true

    - name: Fail with LibreNMS install-time database diagnostics
      fail:
        msg: |-
          LibreNMS install-time database endpoint is not reachable before migrations.

          endpoint:
          {{ librenms_db_host_install_effective }}:{{ librenms_db_port }}

          Galera install DB probe:
          {{ librenms_galera_install_db_probe.results | default([]) }}

          Diagnostics:
          {{ librenms_install_db_galera_diagnostics.results | default([]) }}

- name: Run LibreNMS database migrations on primary node
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - migrate
      - --force
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_db_migrate
  changed_when: >-
    'Nothing to migrate' not in
    (
      (librenms_db_migrate.stdout | default(''))
      ~
      (librenms_db_migrate.stderr | default(''))
    )
  when:
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Read LibreNMS schema column definitions from database
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_install_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - "SET TIME_ZONE='+00:00'"
      - >-
        SELECT LOWER(DATA_TYPE) AS data_type, UPPER(IS_NULLABLE) AS is_nullable,
        COALESCE(DATE_FORMAT(COLUMN_DEFAULT, '%Y-%m-%d %H:%i:%s'), COLUMN_DEFAULT, '')
        AS column_default
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = '{{ librenms_db_name }}'
        AND TABLE_NAME = 'notifications'
        AND COLUMN_NAME = 'datetime'
      - >-
        SELECT LOWER(DATA_TYPE) AS data_type, UPPER(IS_NULLABLE) AS is_nullable,
        COALESCE(DATE_FORMAT(COLUMN_DEFAULT, '%Y-%m-%d %H:%i:%s'), COLUMN_DEFAULT, '')
        AS column_default
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = '{{ librenms_db_name }}'
        AND TABLE_NAME = 'users'
        AND COLUMN_NAME = 'created_at'
  register: librenms_schema_columns
  become: true
  changed_when: false
  no_log: true
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Normalize LibreNMS schema column query results
  set_fact:
    librenms_notifications_datetime_schema: >-
      {{
        (librenms_schema_columns.query_result[-2] | default([]))
        | first
        | default({})
      }}
    librenms_users_created_at_schema: >-
      {{
        (librenms_schema_columns.query_result[-1] | default([]))
        | first
        | default({})
      }}
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Normalize LibreNMS notifications.datetime schema default
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_install_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - "SET TIME_ZONE='+00:00'"
      - "ALTER TABLE `notifications` CHANGE `datetime` `datetime` timestamp NOT NULL DEFAULT '1970-01-02 00:00:00'"
  become: true
  no_log: true
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Normalize LibreNMS users.created_at schema default
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_install_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - "SET TIME_ZONE='+00:00'"
      - "ALTER TABLE `users` CHANGE `created_at` `created_at` timestamp NOT NULL DEFAULT '1970-01-02 00:00:01'"
  become: true
  no_log: true
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Verify LibreNMS validation schema columns after normalization
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_install_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - "SET TIME_ZONE='+00:00'"
      - >-
        SELECT LOWER(DATA_TYPE) AS data_type, UPPER(IS_NULLABLE) AS is_nullable,
        COALESCE(DATE_FORMAT(COLUMN_DEFAULT, '%Y-%m-%d %H:%i:%s'), COLUMN_DEFAULT, '')
        AS column_default
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = '{{ librenms_db_name }}'
        AND TABLE_NAME = 'notifications'
        AND COLUMN_NAME = 'datetime'
      - >-
        SELECT LOWER(DATA_TYPE) AS data_type, UPPER(IS_NULLABLE) AS is_nullable,
        COALESCE(DATE_FORMAT(COLUMN_DEFAULT, '%Y-%m-%d %H:%i:%s'), COLUMN_DEFAULT, '')
        AS column_default
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = '{{ librenms_db_name }}'
        AND TABLE_NAME = 'users'
        AND COLUMN_NAME = 'created_at'
  register: librenms_schema_columns_after_fix
  become: true
  changed_when: false
  no_log: true
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Normalize LibreNMS validation schema verification results
  set_fact:
    librenms_notifications_datetime_schema_after_fix: >-
      {{
        (librenms_schema_columns_after_fix.query_result[-2] | default([]))
        | first
        | default({})
      }}
    librenms_users_created_at_schema_after_fix: >-
      {{
        (librenms_schema_columns_after_fix.query_result[-1] | default([]))
        | first
        | default({})
      }}
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Fail when LibreNMS validation schema columns remain incorrect
  assert:
    that:
      - (librenms_notifications_datetime_schema_after_fix.data_type | default('') | lower) == 'timestamp'
      - (librenms_notifications_datetime_schema_after_fix.is_nullable | default('') | upper) == 'NO'
      - (librenms_notifications_datetime_schema_after_fix.column_default | default('')) == '1970-01-02 00:00:00'
      - (librenms_users_created_at_schema_after_fix.data_type | default('') | lower) == 'timestamp'
      - (librenms_users_created_at_schema_after_fix.is_nullable | default('') | upper) == 'NO'
      - (librenms_users_created_at_schema_after_fix.column_default | default('')) == '1970-01-02 00:00:01'
    fail_msg: |-
      LibreNMS schema normalization ran, but validation columns are still not
      in the expected shape.

      notifications.datetime:
      {{ librenms_notifications_datetime_schema_after_fix | default({}) }}

      users.created_at:
      {{ librenms_users_created_at_schema_after_fix | default({}) }}
  when:
    - librenms_manage_validation_schema_fixes | bool
    - inventory_hostname == librenms_schema_fix_host_effective

- name: Check if the initial LibreNMS admin user already exists
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_install_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - "SELECT COUNT(*) AS user_count FROM `users` WHERE `username` = '{{ librenms_initial_admin_username | replace(\"'\", \"''\") }}'"
  register: librenms_initial_admin_lookup
  changed_when: false
  no_log: true
  when:
    - librenms_manage_initial_admin | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Create initial LibreNMS admin user
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - user:add
      - "--password={{ librenms_initial_admin_password }}"
      - "--role={{ librenms_initial_admin_role }}"
      - >-
        --email={{ (
          librenms_initial_admin_email
          if librenms_initial_admin_email | length > 0
          else (librenms_initial_admin_username ~ '@localhost')
        ) }}
      - "{{ librenms_initial_admin_username }}"
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  no_log: true
  when:
    - librenms_manage_initial_admin | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)
    - (librenms_initial_admin_lookup.query_result[0][0].user_count | default(0) | int) == 0

- name: Create lnms symlink
  file:
    src: "{{ librenms_install_dir }}/lnms"
    dest: /usr/bin/lnms
    state: link
  when: librenms_manage_lnms_symlink | bool

- name: Ensure bash completion directory exists
  file:
    path: "{{ librenms_bash_completion_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: librenms_manage_bash_completion | bool

- name: Install LibreNMS bash completion
  copy:
    remote_src: true
    src: "{{ librenms_install_dir }}/misc/lnms-completion.bash"
    dest: "{{ librenms_bash_completion_dir }}/lnms-completion.bash"
    owner: root
    group: root
    mode: "0644"
  when: librenms_manage_bash_completion | bool

- name: Install LibreNMS logrotate config
  copy:
    remote_src: true
    src: "{{ librenms_install_dir }}/misc/librenms.logrotate"
    dest: "{{ librenms_logrotate_path }}"
    owner: root
    group: root
    mode: "0644"
  when: librenms_manage_logrotate | bool

- name: Ensure rrdcached journal directory exists on Debian-family systems
  file:
    path: "{{ librenms_rrdcached_journal_path }}"
    state: directory
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0755"
  when:
    - librenms_manage_rrdcached | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Deploy rrdcached defaults on Debian-family systems
  template:
    src: rrdcached.default.j2
    dest: "{{ librenms_rrdcached_default_config_path }}"
    owner: root
    group: root
    mode: "0644"
  register: librenms_rrdcached_defaults_deploy
  notify: Restart rrdcached
  when:
    - librenms_manage_rrdcached | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Ensure rrdcached systemd override directory exists
  file:
    path: "{{ librenms_rrdcached_systemd_override_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - librenms_manage_rrdcached | bool
    - librenms_manage_rrdcached_systemd_override | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Deploy rrdcached systemd override
  template:
    src: rrdcached.systemd-override.conf.j2
    dest: "{{ librenms_rrdcached_systemd_override_path }}"
    owner: root
    group: root
    mode: "0644"
  register: librenms_rrdcached_systemd_override_deploy
  notify: Restart rrdcached
  when:
    - librenms_manage_rrdcached | bool
    - librenms_manage_rrdcached_systemd_override | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Reload systemd after rrdcached override change
  systemd:
    daemon_reload: true
  when:
    - librenms_manage_rrdcached | bool
    - librenms_manage_rrdcached_systemd_override | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool
    - librenms_rrdcached_systemd_override_deploy.changed | default(false)

- name: Enable and start rrdcached on eligible nodes
  service:
    name: "{{ librenms_rrdcached_service_name }}"
    state: started
    enabled: true
  when:
    - librenms_manage_rrdcached | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Restart rrdcached after managed config changes
  service:
    name: "{{ librenms_rrdcached_service_name }}"
    state: restarted
  when:
    - librenms_manage_rrdcached | bool
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool
    - >-
      (librenms_rrdcached_defaults_deploy.changed | default(false))
      or (librenms_rrdcached_systemd_override_deploy.changed | default(false))

- name: Check for wildcard rrdcached TCP listener in VIP mode
  command:
    argv:
      - sh
      - -lc
      - >-
        ss -H -ltn | awk -v port='{{ librenms_rrdcached_bind_port }}'
        '$4 == "0.0.0.0:" port || $4 == "[::]:" port || $4 == "*:" port
        { found=1 } END { exit(found ? 0 : 1) }'
  register: librenms_rrdcached_wildcard_listener
  changed_when: false
  failed_when: false
  when:
    - librenms_manage_rrdcached | bool
    - librenms_haproxy_rrdcached_enabled | bool
    - librenms_haproxy_rrdcached_port | int == librenms_rrdcached_bind_port | int
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Restart rrdcached when wildcard listener would block HAProxy VIP bind
  service:
    name: "{{ librenms_rrdcached_service_name }}"
    state: restarted
  when:
    - librenms_manage_rrdcached | bool
    - librenms_haproxy_rrdcached_enabled | bool
    - librenms_haproxy_rrdcached_port | int == librenms_rrdcached_bind_port | int
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool
    - librenms_rrdcached_wildcard_listener.rc | default(1) == 0

- name: Recheck wildcard rrdcached TCP listener after recovery
  command:
    argv:
      - sh
      - -lc
      - >-
        ss -H -ltn | awk -v port='{{ librenms_rrdcached_bind_port }}'
        '$4 == "0.0.0.0:" port || $4 == "[::]:" port || $4 == "*:" port
        { found=1 } END { exit(found ? 0 : 1) }'
  register: librenms_rrdcached_wildcard_listener_recheck
  changed_when: false
  failed_when: false
  when:
    - librenms_manage_rrdcached | bool
    - librenms_haproxy_rrdcached_enabled | bool
    - librenms_haproxy_rrdcached_port | int == librenms_rrdcached_bind_port | int
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Validate rrdcached is not wildcard-bound in VIP mode
  assert:
    that:
      - librenms_rrdcached_wildcard_listener_recheck.rc | default(1) != 0
    fail_msg: >-
      rrdcached is still listening on a wildcard address for port
      {{ librenms_rrdcached_bind_port }}. In VIP TCP mode it must bind only to
      {{ librenms_rrdcached_network_bind_address_effective }} so HAProxy can bind
      the VIP listener.
  when:
    - librenms_manage_rrdcached | bool
    - librenms_haproxy_rrdcached_enabled | bool
    - librenms_haproxy_rrdcached_port | int == librenms_rrdcached_bind_port | int
    - ansible_os_family == 'Debian'
    - librenms_rrdcached_runs_on_host | bool

- name: Disable rrdcached on ineligible Debian-family nodes
  service:
    name: "{{ librenms_rrdcached_service_name }}"
    state: stopped
    enabled: false
  failed_when: false
  when:
    - librenms_manage_rrdcached | bool
    - ansible_os_family == 'Debian'
    - not (librenms_rrdcached_runs_on_host | bool)

- name: Enable nginx
  service:
    name: "{{ librenms_nginx_service_name }}"
    state: started
    enabled: true
  when: librenms_manage_nginx | bool

- name: Enable PHP-FPM
  service:
    name: "{{ librenms_php_fpm_service_effective }}"
    state: started
    enabled: true
  when: librenms_manage_php_fpm | bool

- name: Flush web service handlers before validating LibreNMS web nodes
  meta: flush_handlers

- name: Check for LibreNMS PHP-FPM socket after handler flush
  stat:
    path: "{{ librenms_php_fpm_socket }}"
  register: librenms_php_fpm_socket_stat
  when: librenms_manage_php_fpm | bool

- name: Restart PHP-FPM when LibreNMS socket is missing
  service:
    name: "{{ librenms_php_fpm_service_effective }}"
    state: restarted
  when:
    - librenms_manage_php_fpm | bool
    - not librenms_php_fpm_socket_stat.stat.exists

- name: Wait for LibreNMS PHP-FPM socket
  when: librenms_manage_php_fpm | bool
  block:
    - name: Wait for LibreNMS PHP-FPM socket
      wait_for:
        path: "{{ librenms_php_fpm_socket }}"
        state: present
        timeout: 30
  rescue:
    - name: Capture PHP-FPM service status after missing socket
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_php_fpm_service_effective }}"
          - --no-pager
      register: librenms_php_fpm_socket_status
      changed_when: false
      failed_when: false

    - name: Capture PHP-FPM journal after missing socket
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_php_fpm_service_effective }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_php_fpm_socket_journal
      changed_when: false
      failed_when: false

    - name: Capture generated LibreNMS PHP-FPM pool config after missing socket
      command:
        argv:
          - cat
          - "{{ librenms_php_fpm_pool_dir_effective }}/librenms.conf"
      register: librenms_php_fpm_socket_pool_config
      changed_when: false
      failed_when: false

    - name: Capture PHP-FPM configuration test after missing socket
      command:
        argv:
          - "{{ librenms_php_fpm_binary_effective }}"
          - -t
      register: librenms_php_fpm_socket_config_test
      changed_when: false
      failed_when: false

    - name: Fail with PHP-FPM socket diagnostics
      fail:
        msg: |-
          LibreNMS PHP-FPM socket {{ librenms_php_fpm_socket }} was not created on {{ inventory_hostname }}.

          service name:
          {{ librenms_php_fpm_service_effective }}

          systemctl status:
          {{ librenms_php_fpm_socket_status.stdout | default('') }}
          {{ librenms_php_fpm_socket_status.stderr | default('') }}

          journal:
          {{ librenms_php_fpm_socket_journal.stdout | default('') }}

          pool config:
          {{ librenms_php_fpm_socket_pool_config.stdout | default('') }}

          php-fpm config test:
          {{ librenms_php_fpm_socket_config_test.stdout | default('') }}
          {{ librenms_php_fpm_socket_config_test.stderr | default('') }}

- name: Deploy scheduler service file
  template:
    src: librenms-scheduler.service.j2
    dest: /etc/systemd/system/librenms-scheduler.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart LibreNMS scheduler timer
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'

- name: Deploy scheduler timer file
  template:
    src: librenms-scheduler.timer.j2
    dest: /etc/systemd/system/librenms-scheduler.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart LibreNMS scheduler timer
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'

- name: Deploy daily maintenance service file
  template:
    src: librenms-daily.service.j2
    dest: /etc/systemd/system/librenms-daily.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart LibreNMS daily maintenance timer
  when:
    - librenms_manage_daily_maintenance | bool
    - ansible_service_mgr == 'systemd'

- name: Deploy daily maintenance timer file
  template:
    src: librenms-daily.timer.j2
    dest: /etc/systemd/system/librenms-daily.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart LibreNMS daily maintenance timer
  when:
    - librenms_manage_daily_maintenance | bool
    - ansible_service_mgr == 'systemd'

- name: Deploy LibreNMS dispatcher service file
  copy:
    remote_src: true
    src: "{{ librenms_install_dir }}/misc/librenms.service"
    dest: /etc/systemd/system/librenms.service
    owner: root
    group: root
    mode: "0644"
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'

- name: Reload systemd for LibreNMS services
  systemd:
    daemon_reload: true
  when: ansible_service_mgr == 'systemd'

- name: Enable and start scheduler timer
  service:
    name: librenms-scheduler.timer
    state: "{{ 'started' if librenms_bootstrap_completed_effective | bool else 'stopped' }}"
    enabled: "{{ librenms_bootstrap_completed_effective | bool }}"
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'

- name: Enable and start daily maintenance timer
  service:
    name: librenms-daily.timer
    state: "{{ 'started' if librenms_bootstrap_completed_effective | bool else 'stopped' }}"
    enabled: "{{ librenms_bootstrap_completed_effective | bool }}"
  when:
    - librenms_manage_daily_maintenance | bool
    - ansible_service_mgr == 'systemd'

- name: Enable and start dispatcher service
  service:
    name: librenms.service
    state: "{{ 'started' if librenms_bootstrap_completed_effective | bool else 'stopped' }}"
    enabled: "{{ librenms_bootstrap_completed_effective | bool }}"
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'

- name: Remove legacy cron file
  file:
    path: /etc/cron.d/librenms
    state: absent

- name: Read current SNMP community config
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:get
      - snmp.community
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_snmp_community_current
  changed_when: false
  failed_when: false
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Read current SNMPv3 config
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:get
      - snmp.v3
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_snmp_v3_current
  changed_when: false
  failed_when: false
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Set global SNMP version order
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - snmp.version
      - "{{ librenms_snmp_version_order | to_json }}"
  become: true
  become_user: "{{ librenms_user }}"
  changed_when: true
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Add SNMP communities after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - snmp.community.+
      - "{{ item }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)
    - item not in (librenms_snmp_community_current.stdout | default(''))
  loop: "{{ ([librenms_snmp_v2c_community] + librenms_snmp_communities) | reject('equalto', '') | list }}"

- name: Add SNMPv3 credentials after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - snmp.v3.+
      - "{{ item | to_json }}"
  become: true
  become_user: "{{ librenms_user }}"
  no_log: true
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)
    - item.username not in (librenms_snmp_v3_current.stdout | default(''))
  loop: "{{ librenms_snmp_v3_users }}"

- name: Determine effective SNMP version for cluster device seeding
  set_fact:
    librenms_seed_cluster_device_snmp_version_effective: >-
      {{
        (
          'v3'
          if (
            'v3' in librenms_snmp_versions_enabled
            and (librenms_snmp_v3_users | length) > 0
          )
          else (
            'v2c'
            if 'v2c' in librenms_snmp_versions_enabled
            else (
              'v1'
              if 'v1' in librenms_snmp_versions_enabled
              else ''
            )
          )
        )
        if (librenms_seed_cluster_device_snmp_version | lower) == 'auto'
        else (librenms_seed_cluster_device_snmp_version | lower)
      }}
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Validate SNMP credentials for cluster device seeding
  assert:
    that:
      - librenms_seed_cluster_device_snmp_version_effective in ['v1', 'v2c', 'v3']
      - >-
        librenms_seed_cluster_device_snmp_version_effective != 'v3'
        or (librenms_snmp_v3_users | length) > 0
      - >-
        librenms_seed_cluster_device_snmp_version_effective != 'v3'
        or ((librenms_snmp_v3_users | first).username | default('') | length) > 0
      - >-
        librenms_seed_cluster_device_snmp_version_effective != 'v3'
        or ((librenms_snmp_v3_users | first).auth_password | default('') | length) > 0
      - >-
        librenms_seed_cluster_device_snmp_version_effective == 'v3'
        or (librenms_snmp_v2c_community | length) > 0
    fail_msg: >-
      Cluster device seeding is enabled, but no usable SNMP credentials are
      configured. Set librenms_seed_cluster_devices: false to disable automatic
      node seeding, or configure SNMPv2c/SNMPv3 credentials.
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Check existing LibreNMS cluster node devices
  community.mysql.mysql_query:
    login_host: "{{ librenms_db_host_effective }}"
    login_port: "{{ librenms_db_port }}"
    login_user: "{{ librenms_db_user }}"
    login_password: "{{ librenms_db_password }}"
    login_db: "{{ librenms_db_name }}"
    query:
      - >-
        SELECT COUNT(*) AS device_count
        FROM `devices`
        WHERE `hostname` = '{{ seed_device_address_sql }}'
  vars:
    seed_device_address_sql: >-
      {{
        (
          hostvars[item].librenms_seed_device_address
          | default(hostvars[item].ansible_host | default(item))
        )
        | replace("'", "''")
      }}
  loop: "{{ librenms_seed_cluster_device_hosts }}"
  loop_control:
    label: "{{ item }}"
  register: librenms_seed_cluster_device_checks
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Collect failed LibreNMS cluster node device lookups
  set_fact:
    librenms_seed_cluster_device_lookup_failed_hosts: >-
      {{
        librenms_seed_cluster_device_checks.results | default([])
        | rejectattr('query_result', 'defined')
        | map(attribute='item')
        | list
      }}
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Warn when LibreNMS cluster node device lookup fails
  debug:
    msg: >-
      Skipping automatic LibreNMS device seeding for hosts whose device lookup
      failed: {{ librenms_seed_cluster_device_lookup_failed_hosts | join(', ') }}.
      Set librenms_seed_cluster_devices_required: true to make this fatal.
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - (librenms_seed_cluster_device_lookup_failed_hosts | default([]) | length) > 0
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Fail when required LibreNMS cluster node device lookup fails
  fail:
    msg: >-
      Automatic LibreNMS device seeding lookup failed for:
      {{ librenms_seed_cluster_device_lookup_failed_hosts | join(', ') }}.
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - librenms_seed_cluster_devices_required | bool
    - (librenms_seed_cluster_device_lookup_failed_hosts | default([]) | length) > 0
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Add LibreNMS cluster nodes as monitored devices
  command:
    argv: "{{ seed_device_add_argv }}"
  args:
    chdir: "{{ librenms_install_dir }}"
  vars:
    seed_device_host: "{{ item.item }}"
    seed_device_address: >-
      {{
        hostvars[seed_device_host].librenms_seed_device_address
        | default(hostvars[seed_device_host].ansible_host | default(seed_device_host))
      }}
    seed_device_display: >-
      {{
        hostvars[seed_device_host].librenms_seed_device_display
        | default(hostvars[seed_device_host].librenms_node_id | default(seed_device_host))
      }}
    seed_snmp_v3_user: "{{ librenms_snmp_v3_users | first | default({}) }}"
    seed_device_base_argv:
      - "{{ librenms_install_dir }}/lnms"
      - device:add
      - "{{ seed_device_address }}"
      - "--display-name={{ seed_device_display }}"
      - "--transport={{ librenms_seed_cluster_device_transport }}"
      - "--port={{ librenms_seed_cluster_device_port }}"
    seed_device_snmp_argv: >-
      {{
        [
          '--v3',
          '--security-name=' ~ seed_snmp_v3_user.username,
          '--auth-password=' ~ seed_snmp_v3_user.auth_password,
          '--auth-protocol=' ~ (seed_snmp_v3_user.auth_protocol | default('SHA'))
        ]
        +
        (
          [
            '--privacy-password=' ~ seed_snmp_v3_user.priv_password,
            '--privacy-protocol=' ~ (seed_snmp_v3_user.priv_protocol | default('AES'))
          ]
          if (seed_snmp_v3_user.priv_password | default('') | length) > 0
          else []
        )
        if librenms_seed_cluster_device_snmp_version_effective == 'v3'
        else
        [
          (
            '--v1'
            if librenms_seed_cluster_device_snmp_version_effective == 'v1'
            else '--v2c'
          ),
          '--community=' ~ librenms_snmp_v2c_community
        ]
      }}
    seed_device_poller_group_argv: >-
      {{
        ['--poller-group=' ~ (librenms_seed_cluster_device_poller_group | string)]
        if (librenms_seed_cluster_device_poller_group | string | length) > 0
        else []
      }}
    seed_device_add_argv: >-
      {{
        seed_device_base_argv
        + seed_device_snmp_argv
        + seed_device_poller_group_argv
      }}
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_seed_cluster_device_add
  changed_when: true
  retries: 3
  delay: 10
  until: librenms_seed_cluster_device_add.rc == 0
  loop: "{{ librenms_seed_cluster_device_checks.results | default([]) }}"
  loop_control:
    label: "{{ seed_device_display }} ({{ seed_device_address }})"
  no_log: true
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_seed_cluster_devices | bool
    - item.query_result is defined
    - (item.query_result[0][0].device_count | default(0) | int) == 0
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Enable distributed poller after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - distributed_poller
      - "true"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_mode != 'standalone'
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Set LibreNMS base_url after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - base_url
      - "{{ librenms_app_url_effective }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Set LibreNMS update channel after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - update_channel
      - "{{ librenms_update_channel }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_manage_updates | bool
    - librenms_update_channel | length > 0
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Set LibreNMS automatic update policy after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - update
      - "{{ librenms_update_enabled | bool | ternary('true', 'false') }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_manage_updates | bool
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Check LibreNMS daily maintenance bootstrap marker
  stat:
    path: "{{ librenms_daily_maintenance_bootstrap_marker }}"
  register: librenms_daily_maintenance_bootstrap_marker_stat
  when:
    - librenms_manage_daily_maintenance | bool
    - librenms_daily_run_once_after_deploy | bool
    - librenms_apply_post_bootstrap_config | bool
    - ansible_service_mgr == 'systemd'
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Run LibreNMS daily maintenance once after update policy is configured
  when:
    - librenms_manage_daily_maintenance | bool
    - librenms_daily_run_once_after_deploy | bool
    - librenms_apply_post_bootstrap_config | bool
    - ansible_service_mgr == 'systemd'
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)
    - not (librenms_daily_maintenance_bootstrap_marker_stat.stat.exists | default(false))
  block:
    - name: Trigger LibreNMS daily maintenance service once
      systemd:
        name: librenms-daily.service
        state: started
      register: librenms_daily_maintenance_bootstrap_run
      changed_when: false

    - name: Mark LibreNMS daily maintenance bootstrap run complete
      file:
        path: "{{ librenms_daily_maintenance_bootstrap_marker }}"
        state: touch
        owner: root
        group: root
        mode: "0644"

  rescue:
    - name: Capture LibreNMS daily maintenance status after failed bootstrap run
      command:
        argv:
          - systemctl
          - status
          - librenms-daily.service
          - --no-pager
          - -l
      register: librenms_daily_maintenance_bootstrap_status
      changed_when: false
      failed_when: false

    - name: Capture LibreNMS daily maintenance journal after failed bootstrap run
      command:
        argv:
          - journalctl
          - -u
          - librenms-daily.service
          - -n
          - "120"
          - --no-pager
      register: librenms_daily_maintenance_bootstrap_journal
      changed_when: false
      failed_when: false

    - name: Fail with LibreNMS daily maintenance bootstrap diagnostics
      fail:
        msg: |-
          LibreNMS daily maintenance failed on {{ inventory_hostname }}.

          systemctl status:
          {{ librenms_daily_maintenance_bootstrap_status.stdout | default('') }}
          {{ librenms_daily_maintenance_bootstrap_status.stderr | default('') }}

          journal:
          {{ librenms_daily_maintenance_bootstrap_journal.stdout | default('') }}
          {{ librenms_daily_maintenance_bootstrap_journal.stderr | default('') }}

- name: Detect local rrdtool version
  command:
    argv:
      - rrdtool
      - --version
  register: librenms_rrdtool_version_cmd
  changed_when: false
  failed_when: false
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_manage_rrdcached | bool
    - inventory_hostname == librenms_runtime_config_node_effective

- name: Set LibreNMS rrdcached endpoint after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - rrdcached
      - "{{ librenms_rrdcached_endpoint_effective }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_manage_rrdcached | bool
    - inventory_hostname == librenms_runtime_config_node_effective

- name: Set LibreNMS rrdtool version after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - rrdtool_version
      - "{{ librenms_rrdtool_version_cmd.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+') }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_manage_rrdcached | bool
    - inventory_hostname == librenms_runtime_config_node_effective
    - librenms_rrdtool_version_cmd.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+')

- name: Set dispatcher schedule types after bootstrap
  command:
    argv:
      - "{{ librenms_install_dir }}/lnms"
      - config:set
      - "{{ item.key }}"
      - "{{ item.value }}"
  loop:
    - key: "schedule_type.poller"
      value: "dispatcher"
    - key: "schedule_type.discovery"
      value: "dispatcher"
    - key: "schedule_type.services"
      value: "dispatcher"
    - key: "schedule_type.alerting"
      value: "dispatcher"
    - key: "schedule_type.billing"
      value: "dispatcher"
    - key: "service_poller_frequency"
      value: "{{ librenms_dispatcher_poller_frequency | int }}"
  become: true
  become_user: "{{ librenms_user }}"
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_mode != 'standalone'
    - inventory_hostname == (groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first)

- name: Deploy final LibreNMS runtime environment file
  template:
    src: librenms.env.j2
    dest: "{{ librenms_install_dir }}/.env"
    owner: "{{ librenms_user }}"
    group: "{{ librenms_group }}"
    mode: "0640"
  notify:
    - Clear LibreNMS bootstrap cache
    - Restart PHP-FPM
    - Restart LibreNMS dispatcher
    - Restart LibreNMS scheduler timer

- name: Wait for final LibreNMS runtime database endpoint
  when:
    - librenms_apply_post_bootstrap_config | bool
  block:
    - name: Wait for final LibreNMS runtime database TCP endpoint
      wait_for:
        host: "{{ librenms_db_host_effective }}"
        port: "{{ librenms_db_port }}"
        timeout: "{{ librenms_runtime_db_wait_timeout | int }}"
      register: librenms_runtime_db_wait
      retries: "{{ librenms_runtime_db_wait_retries | int }}"
      delay: "{{ librenms_runtime_db_wait_delay | int }}"
      until: librenms_runtime_db_wait is succeeded
  rescue:
    - name: Capture MariaDB service status after runtime DB wait failure
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_mariadb_service_name }}"
          - --no-pager
          - -l
      register: librenms_runtime_db_mariadb_status
      changed_when: false
      failed_when: false
      when:
        - librenms_db_mode in ['local', 'galera']
        - ansible_service_mgr == 'systemd'

    - name: Capture MariaDB journal after runtime DB wait failure
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_mariadb_service_name }}"
          - -n
          - "120"
          - --no-pager
      register: librenms_runtime_db_mariadb_journal
      changed_when: false
      failed_when: false
      when:
        - librenms_db_mode in ['local', 'galera']
        - ansible_service_mgr == 'systemd'

    - name: Capture TCP listeners after runtime DB wait failure
