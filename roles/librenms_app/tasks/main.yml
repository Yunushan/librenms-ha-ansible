      - package:discover
      - --no-ansi
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_package_discover
  changed_when: false
  when:
    - librenms_apply_post_bootstrap_config | bool

- name: Verify LibreNMS Laravel cache accepts writes
  command:
    argv:
      - php
      - -r
      - |-
        require __DIR__ . '/vendor/autoload.php';
        $app = require __DIR__ . '/bootstrap/app.php';
        $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
        $key = 'librenms_ansible_cache_write_check_' . gethostname();
        $lock = Illuminate\Support\Facades\Cache::lock($key . '_lock', 30);
        $lockAcquired = false;
        try {
            $lockAcquired = $lock->get();
            if (! $lockAcquired) {
                fwrite(STDERR, 'LibreNMS cache lock acquisition failed.' . PHP_EOL);
                exit(1);
            }
            Illuminate\Support\Facades\Cache::put($key, 'ok', 60);
            if (Illuminate\Support\Facades\Cache::get($key) !== 'ok') {
                fwrite(STDERR, 'LibreNMS cache write readback failed.' . PHP_EOL);
                exit(1);
            }
        } finally {
            if ($lockAcquired) {
                $lock->release();
            }
        }
        echo 'ok' . PHP_EOL;
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_laravel_cache_write_check
  changed_when: false
  retries: "{{ librenms_redis_sentinel_consensus_retries | int if librenms_redis_mode == 'sentinel' else 3 }}"
  delay: "{{ librenms_redis_sentinel_consensus_delay | int if librenms_redis_mode == 'sentinel' else 3 }}"
  until: librenms_laravel_cache_write_check.rc == 0
  when:
    - librenms_apply_post_bootstrap_config | bool

- name: Ensure scheduler timer is active after cache validation
  systemd:
    name: librenms-scheduler.timer
    daemon_reload: true
    state: started
    enabled: true
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool

- name: Run LibreNMS scheduler service once after cache validation
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool
  block:
    - name: Trigger LibreNMS scheduler service
      systemd:
        name: librenms-scheduler.service
        state: started
      register: librenms_scheduler_service_run
      changed_when: false

  rescue:
    - name: Capture scheduler service status after failed run
      command:
        argv:
          - systemctl
          - status
          - librenms-scheduler.service
          - --no-pager
      register: librenms_scheduler_service_status
      changed_when: false
      failed_when: false

    - name: Capture scheduler service journal after failed run
      command:
        argv:
          - journalctl
          - -u
          - librenms-scheduler.service
          - -n
          - "100"
          - --no-pager
      register: librenms_scheduler_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with scheduler service diagnostics
      fail:
        msg: |-
          LibreNMS scheduler service failed on {{ inventory_hostname }}.

          systemctl status:
          {{ librenms_scheduler_service_status.stdout | default('') }}
          {{ librenms_scheduler_service_status.stderr | default('') }}

          journal:
          {{ librenms_scheduler_service_journal.stdout | default('') }}

- name: Seed LibreNMS scheduler health marker after cache validation
  command:
    argv:
      - php
      - -r
      - |-
        require __DIR__ . '/vendor/autoload.php';
        $app = require __DIR__ . '/bootstrap/app.php';
        $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
        Illuminate\Support\Facades\Cache::put('scheduler_working', now(), now()->addMinutes(6));
        echo 'ok' . PHP_EOL;
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_scheduler_health_marker
  changed_when: false
  when:
    - librenms_manage_scheduler | bool
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool

- name: Verify LibreNMS scheduler health marker is visible
  command:
    argv:
      - php
      - -r
      - |-
        require __DIR__ . '/vendor/autoload.php';
        $app = require __DIR__ . '/bootstrap/app.php';
        $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
        if (! Illuminate\Support\Facades\Cache::has('scheduler_working')) {
            fwrite(STDERR, 'LibreNMS scheduler health marker is missing.' . PHP_EOL);
            exit(1);
        }
        echo 'ok' . PHP_EOL;
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_scheduler_health_marker_check
  changed_when: false
  retries: 3
  delay: 2
  until: librenms_scheduler_health_marker_check.rc == 0
  when:
    - librenms_manage_scheduler | bool
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool

- name: Queue dispatcher restart after final cache validation
  debug:
    msg: Restarting LibreNMS dispatcher after final Laravel cache validation.
  changed_when: true
  notify: Restart LibreNMS dispatcher
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Flush dispatcher restart after final cache validation
  meta: flush_handlers
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Verify final LibreNMS Redis Sentinel runtime health
  when:
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool
    - librenms_redis_runtime_healthcheck_enabled | bool
  block:
    - name: Validate final LibreNMS Redis Sentinel runtime connectivity
      include_tasks: redis_runtime_health.yml
  rescue:
    - name: Capture LibreNMS dispatcher service status after Redis runtime health failure
      command:
        argv:
          - systemctl
          - status
