    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Queue dispatcher restart after final runtime configuration
  debug:
    msg: Restarting LibreNMS dispatcher after Redis Sentinel/runtime convergence.
  changed_when: true
  notify: Restart LibreNMS dispatcher
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
