    - librenms_apply_post_bootstrap_config | bool

- name: Ensure scheduler timer is active after final runtime configuration
  service:
    name: librenms-scheduler.timer
    state: started
    enabled: true
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Trigger scheduler once after final runtime configuration
  systemd:
    name: librenms-scheduler.service
    state: started
  register: librenms_scheduler_trigger
  changed_when: false
  failed_when: false
  when:
