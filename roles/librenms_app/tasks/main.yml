      failed_when: false
      no_log: true

    - name: Fail with LibreNMS dispatcher registration diagnostics
      fail:
        msg: |-
          LibreNMS dispatcher did not register an active poller row on {{ inventory_hostname }}.

          systemctl status:
          {{ librenms_dispatcher_registration_status.stdout | default('') }}
          {{ librenms_dispatcher_registration_status.stderr | default('') }}

          journal:
          {{ librenms_dispatcher_registration_journal.stdout | default('') }}

          librenms.log:
          {{ librenms_dispatcher_registration_app_log.stdout | default('') }}

          poller_cluster:
          {{ librenms_dispatcher_registration_table_state.query_result | default([]) }}

- name: Queue PHP-FPM restart after final runtime validation
  debug:
    msg: Restarting PHP-FPM after final Redis/cache validation.
  changed_when: true
  notify: Restart PHP-FPM
  when:
    - librenms_manage_php_fpm | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool

- name: Flush PHP-FPM restart after final runtime validation
  meta: flush_handlers
  when:
    - librenms_manage_php_fpm | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool

- name: Recover PHP-FPM endpoint before final LibreNMS web probe
  when:
    - librenms_manage_nginx | bool
    - librenms_manage_php_fpm | bool
    - librenms_apply_post_bootstrap_config | bool
  block:
    - name: Probe PHP-FPM ping endpoint
      uri:
        url: >-
          http://{{
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
          }}{{ librenms_php_fpm_ping_path }}
        headers:
          Host: "{{ librenms_haproxy_web_check_host_effective }}"
        method: GET
        return_content: true
        status_code: 200
      register: librenms_php_fpm_ping
      failed_when: false
      retries: 6
      delay: 5
      until:
        - librenms_php_fpm_ping.status | default(0) == 200
        - "'pong' in (librenms_php_fpm_ping.content | default(''))"
  rescue:
    - name: Restart PHP-FPM after failed ping probe
      service:
        name: "{{ librenms_php_fpm_service_effective }}"
        state: restarted

    - name: Restart nginx after failed ping probe
      service:
        name: "{{ librenms_nginx_service_name }}"
        state: restarted

    - name: Wait for LibreNMS PHP-FPM socket after failed ping probe
      wait_for:
        path: "{{ librenms_php_fpm_socket }}"
        state: present
        timeout: 30

    - name: Re-probe PHP-FPM ping endpoint after service restart
      uri:
        url: >-
          http://{{
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
          }}{{ librenms_php_fpm_ping_path }}
        headers:
          Host: "{{ librenms_haproxy_web_check_host_effective }}"
        method: GET
        return_content: true
        status_code: 200
      register: librenms_php_fpm_ping_retry
      failed_when: false
      retries: 6
      delay: 5
      until:
        - librenms_php_fpm_ping_retry.status | default(0) == 200
        - "'pong' in (librenms_php_fpm_ping_retry.content | default(''))"
      ignore_errors: true

- name: Verify LibreNMS application endpoint responds on each web node
  when:
    - librenms_manage_nginx | bool
    - librenms_manage_php_fpm | bool
    - librenms_apply_post_bootstrap_config | bool
  block:
    - name: Probe LibreNMS application endpoint
      vars:
        librenms_web_probe_url: >-
          http://{{
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
          }}{{ librenms_app_probe_path }}
      uri:
        url: "{{ librenms_web_probe_url }}"
        headers:
          Host: "{{ librenms_haproxy_web_check_host_effective }}"
        method: GET
        return_content: false
        status_code: "{{ librenms_app_probe_success_statuses }}"
        timeout: "{{ librenms_app_probe_timeout | int }}"
      register: librenms_web_probe
      changed_when: false
      retries: >-
        {{
          ((librenms_app_probe_retries | int) + 1)
          if librenms_app_probe_fail_deployment | bool
          else 1
        }}
      delay: "{{ librenms_app_probe_delay | int }}"
      until:
        - >-
          (librenms_web_probe.status | default(0) | int)
          in librenms_app_probe_success_statuses
      failed_when: >-
        librenms_app_probe_fail_deployment | bool
        and (librenms_web_probe.status | default(0) | int)
        not in librenms_app_probe_success_statuses
  rescue:
    - name: Restart PHP-FPM after failed LibreNMS web probe
      service:
        name: "{{ librenms_php_fpm_service_effective }}"
        state: restarted

    - name: Restart nginx after failed LibreNMS web probe
      service:
        name: "{{ librenms_nginx_service_name }}"
        state: restarted

    - name: Wait for LibreNMS PHP-FPM socket after service restart
      wait_for:
        path: "{{ librenms_php_fpm_socket }}"
        state: present
        timeout: 30

    - name: Re-probe LibreNMS application endpoint after service restart
      vars:
        librenms_web_probe_url: >-
          http://{{
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
          }}{{ librenms_app_probe_path }}
      uri:
        url: "{{ librenms_web_probe_url }}"
        headers:
          Host: "{{ librenms_haproxy_web_check_host_effective }}"
        method: GET
        return_content: false
        status_code: "{{ librenms_app_probe_success_statuses }}"
        timeout: "{{ librenms_app_probe_timeout | int }}"
      register: librenms_web_probe_retry
      changed_when: false
      retries: "{{ (librenms_app_probe_retries | int) + 1 }}"
      delay: "{{ librenms_app_probe_delay | int }}"
      until:
        - >-
          (librenms_web_probe_retry.status | default(0) | int)
          in librenms_app_probe_success_statuses
      failed_when: false

    - name: Capture PHP-FPM service status after failed LibreNMS web probe
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_php_fpm_service_effective }}"
          - --no-pager
      register: librenms_php_fpm_probe_status
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture PHP-FPM journal after failed LibreNMS web probe
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_php_fpm_service_effective }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_php_fpm_probe_journal
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture nginx service status after failed LibreNMS web probe
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_nginx_service_name }}"
          - --no-pager
      register: librenms_nginx_probe_status
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture nginx journal after failed LibreNMS web probe
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_nginx_service_name }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_nginx_probe_journal
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture nginx error log after failed LibreNMS web probe
      command:
        argv:
          - tail
          - -n
          - "100"
          - /var/log/nginx/error.log
      register: librenms_nginx_error_log
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture UNIX socket listeners after failed LibreNMS web probe
      command:
        argv:
          - ss
          - -xlpn
      register: librenms_php_fpm_probe_sockets
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture LibreNMS PHP-FPM error log after failed LibreNMS web probe
      command:
        argv:
          - tail
          - -n
          - "100"
          - "{{ librenms_install_dir }}/logs/php-fpm-error.log"
      register: librenms_php_fpm_error_log
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Capture LibreNMS application log after failed LibreNMS web probe
      command:
        argv:
          - tail
          - -n
          - "100"
          - "{{ librenms_install_dir }}/logs/librenms.log"
      register: librenms_application_log
      changed_when: false
      failed_when: false
      when: (librenms_web_probe_retry.rc | default(1)) != 0

    - name: Fail with LibreNMS web probe diagnostics
      fail:
        msg: |-
          LibreNMS web endpoint did not become healthy on {{ inventory_hostname }}.

          initial probe:
          rc={{ '0' if (librenms_web_probe.status | default(0) | int) in librenms_app_probe_success_statuses else '1' }}
          status={{ librenms_web_probe.status | default('n/a') }}
          msg={{ librenms_web_probe.msg | default('') }}

          probe after service restart:
          rc={{ '0' if (librenms_web_probe_retry.status | default(0) | int) in librenms_app_probe_success_statuses else '1' }}
          status={{ librenms_web_probe_retry.status | default('n/a') }}
          msg={{ librenms_web_probe_retry.msg | default('') }}

          php-fpm systemctl status:
          {{ librenms_php_fpm_probe_status.stdout | default('') }}

          php-fpm journal:
          {{ librenms_php_fpm_probe_journal.stdout | default('') }}

          nginx systemctl status:
          {{ librenms_nginx_probe_status.stdout | default('') }}

          nginx journal:
          {{ librenms_nginx_probe_journal.stdout | default('') }}

          nginx error log:
          {{ librenms_nginx_error_log.stdout | default('') }}

          unix socket listeners:
          {{ librenms_php_fpm_probe_sockets.stdout | default('') }}

          php-fpm error log:
          {{ librenms_php_fpm_error_log.stdout | default('') }}

          librenms application log:
          {{ librenms_application_log.stdout | default('') }}
      when: (librenms_web_probe_retry.rc | default(1)) != 0

- name: Report non-blocking LibreNMS application endpoint probe result
  debug:
    msg: >-
      LibreNMS application endpoint probe returned HTTP status
      {{ librenms_web_probe.status | default('000') }} on {{ inventory_hostname }}.
      Deployment continues because PHP-FPM/nginx health checks already passed.
      Enable librenms_app_probe_fail_deployment to make this probe strict.
  when:
    - librenms_manage_nginx | bool
    - librenms_manage_php_fpm | bool
    - librenms_apply_post_bootstrap_config | bool
    - not librenms_app_probe_fail_deployment | bool
    - librenms_web_probe is defined
    - >-
      (librenms_web_probe.status | default(0) | int)
      not in librenms_app_probe_success_statuses

- name: Reconcile final LibreNMS dispatcher validation state after serial app convergence
  include_tasks: dispatcher_registration.yml
  vars:
    librenms_dispatcher_registration_nodes_input: "{{ librenms_dispatcher_registration_nodes }}"
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool
    - inventory_hostname == (ansible_play_hosts_all | last)
