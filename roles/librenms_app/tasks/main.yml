          - --no-pager
          - -l
      register: librenms_redis_runtime_dispatcher_status
      changed_when: false
      failed_when: false
      when: ansible_service_mgr == 'systemd'

    - name: Capture LibreNMS dispatcher journal after Redis runtime health failure
      command:
        argv:
          - journalctl
          - -u
          - librenms.service
          - -n
          - "120"
          - --no-pager
      register: librenms_redis_runtime_dispatcher_journal
      changed_when: false
      failed_when: false
      when: ansible_service_mgr == 'systemd'

    - name: Capture local Redis service status after Redis runtime health failure
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_redis_service_name }}"
          - --no-pager
          - -l
      register: librenms_redis_runtime_local_redis_status
      changed_when: false
      failed_when: false
      when:
        - ansible_service_mgr == 'systemd'
        - inventory_hostname in librenms_active_redis_nodes

    - name: Capture local Redis Sentinel service status after Redis runtime health failure
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_redis_sentinel_service_name_effective }}"
          - --no-pager
          - -l
      register: librenms_redis_runtime_local_sentinel_status
      changed_when: false
      failed_when: false
      when:
        - ansible_service_mgr == 'systemd'
        - inventory_hostname in librenms_active_redis_nodes

    - name: Capture listening TCP sockets after Redis runtime health failure
      command:
        argv:
          - ss
          - -ltnp
      register: librenms_redis_runtime_tcp_listeners
      changed_when: false
      failed_when: false

    - name: Fail with LibreNMS Redis Sentinel runtime diagnostics
      fail:
        msg: |-
          LibreNMS Redis Sentinel runtime health validation failed on {{ inventory_hostname }}.

          Sentinel endpoints:
          {{ librenms_redis_sentinel_effective }}

          Health check result:
          rc={{ librenms_redis_runtime_healthcheck.rc | default('unknown') }}
          stdout={{ librenms_redis_runtime_healthcheck.stdout | default('') }}
          stderr={{ librenms_redis_runtime_healthcheck.stderr | default('') }}

          Dispatcher status:
          {{ librenms_redis_runtime_dispatcher_status.stdout | default('') }}
          {{ librenms_redis_runtime_dispatcher_status.stderr | default('') }}

          Dispatcher journal:
          {{ librenms_redis_runtime_dispatcher_journal.stdout | default('') }}
          {{ librenms_redis_runtime_dispatcher_journal.stderr | default('') }}

          Local Redis status:
          {{ librenms_redis_runtime_local_redis_status.stdout | default('') }}
          {{ librenms_redis_runtime_local_redis_status.stderr | default('') }}

          Local Redis Sentinel status:
          {{ librenms_redis_runtime_local_sentinel_status.stdout | default('') }}
          {{ librenms_redis_runtime_local_sentinel_status.stderr | default('') }}

          TCP listeners:
          {{ librenms_redis_runtime_tcp_listeners.stdout | default('') }}
          {{ librenms_redis_runtime_tcp_listeners.stderr | default('') }}

- name: Verify LibreNMS dispatcher poller registration
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
    - librenms_apply_post_bootstrap_config | bool
    - librenms_bootstrap_completed_effective | bool
  block:
    - name: Converge local LibreNMS dispatcher registration state
      include_tasks: dispatcher_registration.yml
      vars:
        librenms_dispatcher_registration_nodes_input:
          - "{{ inventory_hostname }}"
  rescue:
    - name: Capture LibreNMS dispatcher service status
      command:
        argv:
          - systemctl
          - status
          - librenms.service
          - --no-pager
          - -l
      register: librenms_dispatcher_registration_status
      changed_when: false
      failed_when: false

    - name: Capture LibreNMS dispatcher journal
      command:
        argv:
          - journalctl
          - -u
          - librenms.service
          - -n
          - "120"
          - --no-pager
      register: librenms_dispatcher_registration_journal
      changed_when: false
      failed_when: false

    - name: Capture LibreNMS application log
      command:
        argv:
          - tail
          - -n
          - "120"
          - "{{ librenms_install_dir }}/logs/librenms.log"
      register: librenms_dispatcher_registration_app_log
      changed_when: false
      failed_when: false

    - name: Capture LibreNMS dispatcher table state
      community.mysql.mysql_query:
        login_host: "{{ librenms_db_host_effective }}"
        login_port: "{{ librenms_db_port }}"
        login_user: "{{ librenms_db_user }}"
        login_password: "{{ librenms_db_password }}"
        login_db: "{{ librenms_db_name }}"
        query:
          - >-
            SELECT `id`, `node_id`, `poller_name`, `poller_version`,
            `poller_groups`, `last_report`, `master`, `poller_frequency`
            FROM `poller_cluster`
            ORDER BY `node_id`
      register: librenms_dispatcher_registration_table_state
