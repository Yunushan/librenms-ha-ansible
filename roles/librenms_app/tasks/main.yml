    - name: Capture Galera status after runtime DB wait failure
      command:
        argv:
          - mysql
          - --protocol=socket
          - "--socket={{ librenms_mariadb_socket }}"
          - -Nse
          - >-
            SHOW GLOBAL STATUS WHERE Variable_name IN
            ('wsrep_cluster_status','wsrep_ready','wsrep_connected','wsrep_local_state_comment');
      register: librenms_runtime_db_galera_status
      changed_when: false
      failed_when: false
      when:
        - librenms_db_mode == 'galera'

    - name: Fail with LibreNMS runtime database diagnostics
      fail:
        msg: |-
          LibreNMS runtime database endpoint did not become reachable on {{ inventory_hostname }}.

          endpoint:
          {{ librenms_db_host_effective }}:{{ librenms_db_port }}

          MariaDB systemctl status:
          {{ librenms_runtime_db_mariadb_status.stdout | default('') }}
          {{ librenms_runtime_db_mariadb_status.stderr | default('') }}

          MariaDB journal:
          {{ librenms_runtime_db_mariadb_journal.stdout | default('') }}
          {{ librenms_runtime_db_mariadb_journal.stderr | default('') }}

          TCP listeners:
          {{ librenms_runtime_db_tcp_listeners.stdout | default('') }}
          {{ librenms_runtime_db_tcp_listeners.stderr | default('') }}

          Galera status:
          {{ librenms_runtime_db_galera_status.stdout | default('') }}
          {{ librenms_runtime_db_galera_status.stderr | default('') }}

- name: Verify final LibreNMS runtime database login
