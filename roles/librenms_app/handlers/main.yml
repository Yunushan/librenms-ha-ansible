---
- name: Discover LibreNMS bootstrap cache files
  find:
    paths: "{{ librenms_install_dir }}/bootstrap/cache"
    file_type: file
    excludes: ".gitignore"
  register: librenms_handler_bootstrap_cache_files
  listen: Clear LibreNMS bootstrap cache

- name: Remove LibreNMS bootstrap cache files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ librenms_handler_bootstrap_cache_files.files | default([]) }}"
  listen: Clear LibreNMS bootstrap cache

- name: Restart PHP-FPM
  service:
    name: "{{ librenms_php_fpm_service_effective }}"
    state: restarted

- name: Validate nginx configuration before restart
  command:
    argv:
      - nginx
      - -t
  changed_when: false
  listen: Restart nginx

- name: Restart nginx
  service:
    name: "{{ librenms_nginx_service_name }}"
    state: restarted

- name: Restart rrdcached
  service:
    name: "{{ librenms_rrdcached_service_name }}"
    state: restarted

- name: Restart LibreNMS dispatcher
  service:
    name: librenms.service
    state: restarted
  when:
    - librenms_manage_dispatcher | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Restart LibreNMS scheduler timer
  service:
    name: librenms-scheduler.timer
    state: restarted
    enabled: true
  when:
    - librenms_manage_scheduler | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool

- name: Restart LibreNMS daily maintenance timer
  service:
    name: librenms-daily.timer
    state: restarted
    enabled: true
  when:
    - librenms_manage_daily_maintenance | bool
    - ansible_service_mgr == 'systemd'
    - librenms_bootstrap_completed_effective | bool
