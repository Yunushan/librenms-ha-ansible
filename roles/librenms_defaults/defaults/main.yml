---
librenms_repo_url: https://github.com/librenms/librenms.git
librenms_version: master

librenms_mode: standalone
librenms_install_profile: full

librenms_install_dir: /opt/librenms
librenms_user: librenms
librenms_group: librenms
librenms_shell: /bin/bash
librenms_fqdn: librenms.example.com
librenms_default_fqdn_placeholder: librenms.example.com
librenms_app_url: ""
librenms_app_key: CHANGE_ME

librenms_timezone: Etc/UTC
librenms_web_server: nginx

librenms_bootstrap_completed: false
librenms_bootstrap_auto_complete: true
librenms_bootstrap_completed_effective: "{{ librenms_bootstrap_completed | bool or librenms_bootstrap_auto_complete | bool }}"
librenms_apply_post_bootstrap_config: "{{ librenms_bootstrap_completed_effective | bool }}"

librenms_manage_validation_schema_fixes: true
librenms_manage_bash_completion: true
librenms_manage_logrotate: true
librenms_bash_completion_dir: /etc/bash_completion.d
librenms_logrotate_path: /etc/logrotate.d/librenms
librenms_nginx_server_aliases: []

librenms_initial_admin_username: ""
librenms_initial_admin_password: ""
librenms_initial_admin_email: ""
librenms_initial_admin_role: admin
librenms_manage_initial_admin: "{{ librenms_initial_admin_username | length > 0 and librenms_initial_admin_password | length > 0 }}"

librenms_db_mode: local
librenms_db_host: ""
librenms_db_port: 3306
librenms_db_name: librenms
librenms_db_user: librenms
librenms_db_password: CHANGE_ME_DB_PASSWORD
librenms_db_bind_address: 0.0.0.0
librenms_db_user_host: "%"
librenms_db_bootstrap_host: "{{ (groups.get('librenms_db', [inventory_hostname]) | first) }}"

librenms_galera_cluster_name: librenms_cluster
librenms_galera_sst_method: rsync
librenms_galera_bootstrap_marker: /var/lib/librenms-ha-ansible/galera_bootstrapped

librenms_redis_mode: local
librenms_redis_username: ""
librenms_redis_password: CHANGE_ME_REDIS_PASSWORD
librenms_redis_sentinel_password: CHANGE_ME_SENTINEL_PASSWORD
librenms_redis_sentinel_username: ""
librenms_redis_master_host: "{{ (groups.get('librenms_redis', [inventory_hostname]) | first) }}"
librenms_redis_sentinel_service: mymaster
librenms_redis_external_host: ""
librenms_redis_external_port: 6379
librenms_redis_db: 0
librenms_redis_cache_db: 1
librenms_redis_session_db: 0
librenms_redis_timeout: 60
librenms_redis_quorum: 2

librenms_rrd_mode: local
librenms_gluster_bootstrap_host: "{{ (groups.get('gluster_nodes', [inventory_hostname]) | first) }}"
librenms_gluster_volume_name: librenms-rrd
librenms_gluster_brick_path: /gluster/brick1/librenms-rrd
librenms_gluster_mountpoint: /opt/librenms/rrd
librenms_gluster_manage_brick_device: false
librenms_gluster_brick_device: ""
librenms_gluster_brick_fstype: xfs
librenms_gluster_replica_count: "{{ (librenms_active_gluster_nodes | default(groups.get('gluster_nodes', [])) | length) | int }}"
librenms_glusterd_vol_path: /etc/glusterfs/glusterd.vol
librenms_gluster_transport_address_family: ""
librenms_gluster_bind_address: ""
librenms_manage_gluster_hosts_entries: true
librenms_gluster_manage_firewall: true
librenms_gluster_firewall_ports:
  - 24007
  - 24008
  - 24009
librenms_gluster_firewall_port_ranges:
  - 49152:49251

librenms_vip_enabled: false
librenms_vip_ip: ""
librenms_vip_cidr: 24
librenms_vip_interface: eth0
librenms_keepalived_auth_pass: CHANGE_ME_VRRP_PASSWORD
librenms_keepalived_vrid: 51
librenms_keepalived_priority: 100
librenms_haproxy_web_port: 80
librenms_haproxy_db_port: 3306
librenms_haproxy_web_check_path: /healthz
librenms_haproxy_stats_enabled: false
librenms_haproxy_stats_bind: 127.0.0.1:8404

librenms_manage_local_snmpd: true
librenms_snmp_versions_enabled:
  - v2c
  - v3
librenms_snmp_version_order:
  - v3
  - v2c
  - v1
librenms_snmp_v2c_community: public
librenms_snmp_communities: []
librenms_snmp_v3_users: []
librenms_snmp_syslocation: LibreNMS Node
librenms_snmp_syscontact: noc@example.com
librenms_snmp_agent_address: "udp:161,udp6:[::1]:161"
librenms_net_snmp_config_binary: /usr/bin/net-snmp-config

librenms_manage_dispatcher: true
librenms_manage_scheduler: true
librenms_manage_rrdcached: "{{ librenms_mode != 'standalone' }}"
librenms_rrdcached_bind_port: 42217
librenms_rrdcached_endpoint: ""
librenms_rrdcached_socket: /run/rrdcached.sock
librenms_rrdcached_journal_path: /var/lib/rrdcached/journal
librenms_rrdcached_default_config_path: /etc/default/rrdcached
librenms_rrdcached_service_name: rrdcached
librenms_rrdcached_base_path: >-
  {{
    librenms_gluster_mountpoint
    if librenms_rrd_mode == 'glusterfs'
    else (librenms_install_dir ~ '/rrd')
  }}
librenms_manage_nginx: "{{ librenms_install_profile in ['full', 'web'] }}"
librenms_manage_php_fpm: "{{ librenms_install_profile in ['full', 'web'] }}"
librenms_manage_lnms_symlink: true

librenms_enable_extra_repos: true
librenms_redhat_enable_epel: true
librenms_redhat_enable_remi: false
librenms_redhat_php_stream: "remi-8.2"
librenms_common_extra_packages: []

librenms_remove_install_dir: false
librenms_remove_data_dirs: false

librenms_allowed_os_families:
  - Debian
  - RedHat
  - Archlinux
  - Alpine
  - Gentoo

librenms_support_tier_map:
  Ubuntu: primary
  Debian: primary
  Linux Mint: primary-ish
  AlmaLinux: strong-best-effort
  Rocky: strong-best-effort
  Fedora: strong-best-effort
  CentOS: best-effort
  Archlinux: best-effort
  Alpine: best-effort
  Gentoo: best-effort
