---
librenms_repo_url: https://github.com/librenms/librenms.git
librenms_version: latest-stable
librenms_manage_updates: true
librenms_update_channel: release
librenms_update_enabled: false
librenms_manage_daily_maintenance: true
librenms_daily_timer_on_calendar: "*-*-* 00:19:00"
librenms_daily_timer_randomized_delay: 45min
librenms_daily_run_once_after_deploy: true
librenms_daily_maintenance_bootstrap_marker: /var/lib/librenms-ha-ansible/daily_maintenance_bootstrapped

librenms_autodiscovery_manage: "{{ librenms_mode == 'ha' }}"
librenms_autodiscovery_xdp: true
librenms_autodiscovery_arp: true
librenms_autodiscovery_arp_table: true
librenms_autodiscovery_by_ip: "{{ librenms_autodiscovery_manage | bool }}"
librenms_autodiscovery_mydomain: ""
librenms_autodiscovery_nets: []
librenms_autodiscovery_include_primary_subnet: "{{ librenms_mode == 'ha' }}"
librenms_autodiscovery_snmp_scan_enabled: "{{ librenms_autodiscovery_manage | bool }}"
librenms_autodiscovery_force_cycle_after_deploy: "{{ librenms_autodiscovery_manage | bool }}"
librenms_autodiscovery_run_once_after_deploy: true
librenms_autodiscovery_fail_on_scan_error: false
librenms_autodiscovery_fail_on_cycle_error: false
librenms_autodiscovery_bootstrap_marker: /var/lib/librenms-ha-ansible/autodiscovery_bootstrapped

librenms_mode: standalone
librenms_install_profile: full
librenms_inactive_inventory_nodes: >-
  {{
    groups.get('decommission_nodes', [])
    + groups.get('maintenance_nodes', [])
  }}

librenms_install_dir: /opt/librenms
librenms_user: librenms
librenms_group: librenms
librenms_uid: ""
librenms_gid: ""
librenms_identity_uid_search_start: 60000
librenms_identity_uid_search_end: 60999
librenms_identity_gid_search_start: 60000
librenms_identity_gid_search_end: 60999
librenms_shell: /bin/bash
librenms_ansible_remote_tmp: "{{ librenms_install_dir }}/.ansible/tmp"
librenms_composer_install_timeout: 900
librenms_composer_process_timeout: 300
librenms_artisan_package_discover_timeout: 180
librenms_fqdn: librenms.example.com
librenms_default_fqdn_placeholder: librenms.example.com
librenms_app_url: ""
librenms_app_key: CHANGE_ME

librenms_timezone: Etc/UTC
librenms_web_server: nginx

librenms_bootstrap_completed: false
librenms_bootstrap_auto_complete: true
librenms_bootstrap_completed_effective: "{{ librenms_bootstrap_completed | bool or librenms_bootstrap_auto_complete | bool }}"
librenms_apply_post_bootstrap_config: "{{ librenms_bootstrap_completed_effective | bool }}"

librenms_manage_validation_schema_fixes: true
librenms_schema_recover_galera_backends: true
librenms_schema_galera_backend_wait_timeout: 30
librenms_manage_web_validation_json_filter: true
librenms_web_validation_json_filter_path: /etc/librenms/web-validation-json-filter.php
librenms_manage_bash_completion: true
librenms_manage_logrotate: true
librenms_bash_completion_dir: /etc/bash_completion.d
librenms_logrotate_path: /etc/logrotate.d/librenms
librenms_nginx_server_aliases: []

librenms_initial_admin_username: ""
librenms_initial_admin_password: ""
librenms_initial_admin_email: ""
librenms_initial_admin_role: admin
librenms_manage_initial_admin: "{{ librenms_initial_admin_username | length > 0 and librenms_initial_admin_password | length > 0 }}"

librenms_db_mode: local
librenms_db_host: ""
librenms_db_port: 3306
librenms_db_name: librenms
librenms_db_user: librenms
librenms_db_password: CHANGE_ME_DB_PASSWORD
librenms_db_bind_address: 0.0.0.0
librenms_mariadb_log_warnings: 1
librenms_db_user_host: "%"
librenms_db_bootstrap_host: "{{ (groups.get('librenms_db', [inventory_hostname]) | first) }}"
librenms_runtime_db_prefer_local_galera: false
librenms_runtime_db_wait_timeout: 120
librenms_runtime_db_wait_retries: 3
librenms_runtime_db_wait_delay: 5

librenms_galera_cluster_name: librenms_cluster
librenms_galera_sst_method: rsync
librenms_galera_pc_recovery: true
librenms_galera_bootstrap_marker: /var/lib/librenms-ha-ansible/galera_bootstrapped
librenms_galera_wait_timeout: 120
librenms_galera_auto_recover_unsafe_bootstrap: true
librenms_galera_recovery_tie_breaker: first
librenms_galera_stop_timeout: 60
librenms_galera_bootstrap_timeout: 180
librenms_galera_force_kill_stale_mariadb: true
librenms_galera_quiesce_librenms_services: true
librenms_galera_clear_joiner_state: true
librenms_galera_clear_joiner_cache: true

librenms_redis_mode: local
librenms_redis_runtime_user: redis
librenms_redis_runtime_group: redis
librenms_redis_data_dir: /var/lib/redis
librenms_redis_server_binary: /usr/bin/redis-server
librenms_redis_restart_sec: 3
librenms_redis_custom_conf_path: "{{ librenms_redis_data_dir }}/librenms-redis.conf"
librenms_redis_conf_path_effective: >-
  {{
    librenms_redis_custom_conf_path
    if ansible_service_mgr == 'systemd' and librenms_redis_mode == 'sentinel'
    else librenms_redis_conf_path
  }}
librenms_redis_systemd_override_dir: >-
  /etc/systemd/system/{{ librenms_redis_service_name }}.service.d
librenms_redis_systemd_override_path: >-
  {{ librenms_redis_systemd_override_dir }}/librenms-ha.conf
librenms_redis_username: ""
librenms_redis_password: CHANGE_ME_REDIS_PASSWORD
librenms_redis_sentinel_password: CHANGE_ME_SENTINEL_PASSWORD
librenms_redis_sentinel_username: ""
librenms_redis_master_host: "{{ (groups.get('librenms_redis', [inventory_hostname]) | first) }}"
librenms_redis_sentinel_service: mymaster
librenms_redis_external_host: ""
librenms_redis_external_port: 6379
librenms_redis_db: 0
librenms_redis_cache_db: 1
librenms_redis_session_db: 0
librenms_redis_timeout: 5
librenms_redis_sentinel_timeout: 30
librenms_redis_timeout_effective: >-
  {{
    librenms_redis_sentinel_timeout
    if librenms_redis_mode == 'sentinel'
    else librenms_redis_timeout
  }}
librenms_redis_runtime_healthcheck_enabled: "{{ librenms_redis_mode == 'sentinel' }}"
librenms_redis_runtime_healthcheck_retries: 6
librenms_redis_runtime_healthcheck_delay: 5
librenms_redis_runtime_healthcheck_timeout: 5
librenms_redis_runtime_healthcheck_connect_timeout: 3
librenms_redis_runtime_healthcheck_key_ttl: 30
librenms_redis_runtime_healthcheck_blocking_timeout: 3
librenms_redis_quorum: 2
librenms_redis_sentinel_down_after_milliseconds: 5000
librenms_redis_sentinel_failover_timeout: 30000
librenms_redis_sentinel_parallel_syncs: 1
librenms_redis_sentinel_restart_sec: 3
librenms_redis_sentinel_enforce_configured_master: true
librenms_redis_sentinel_write_check_retries: 6
librenms_redis_sentinel_write_check_delay: 5
librenms_redis_sentinel_consensus_retries: 12
librenms_redis_sentinel_consensus_delay: 5
librenms_redis_config_rewrite_retries: 6
librenms_redis_config_rewrite_delay: 5
librenms_redis_sentinel_custom_service_name: librenms-redis-sentinel
librenms_redis_sentinel_custom_conf_path: "{{ librenms_redis_data_dir }}/librenms-sentinel.conf"
librenms_redis_sentinel_service_name_effective: "{{ librenms_redis_sentinel_native_service_name }}"
librenms_redis_sentinel_conf_path_effective: >-
  {{
    librenms_redis_sentinel_custom_conf_path
    if ansible_service_mgr == 'systemd'
    else librenms_redis_sentinel_conf_path
  }}
librenms_redis_sentinel_systemd_override_dir: >-
  /etc/systemd/system/{{ librenms_redis_sentinel_native_service_name }}.service.d
librenms_redis_sentinel_systemd_override_path: >-
  {{ librenms_redis_sentinel_systemd_override_dir }}/librenms-ha.conf
librenms_redis_sentinel_flushconfig_retries: 6
librenms_redis_sentinel_flushconfig_delay: 5

librenms_rrd_mode: local
librenms_gluster_bootstrap_host: "{{ (groups.get('gluster_nodes', [inventory_hostname]) | first) }}"
librenms_gluster_volume_name: librenms-rrd
librenms_gluster_brick_path: /gluster/brick1/librenms-rrd
librenms_gluster_mountpoint: /opt/librenms/rrd
librenms_gluster_manage_brick_device: false
librenms_gluster_brick_device: ""
librenms_gluster_brick_fstype: xfs
librenms_gluster_replica_count: "{{ (librenms_active_gluster_nodes | default(groups.get('gluster_nodes', [])) | length) | int }}"
librenms_glusterd_vol_path: /etc/glusterfs/glusterd.vol
librenms_gluster_transport_address_family: ""
librenms_gluster_bind_address: ""
librenms_manage_gluster_hosts_entries: true
librenms_gluster_manage_firewall: true
librenms_gluster_firewall_ports:
  - 24007
  - 24008
  - 24009
librenms_gluster_firewall_port_ranges:
  - 49152:49251
librenms_gluster_repair_rrd_permissions: true
librenms_gluster_repair_rrd_acls: true

librenms_vip_enabled: false
librenms_vip_ip: ""
librenms_vip_cidr: 24
librenms_vip_interface: ""
librenms_keepalived_auth_pass: CHANGE_ME_VRRP_PASSWORD
librenms_keepalived_vrid: 51
librenms_keepalived_priority: 100
librenms_keepalived_track_haproxy_interval: 1
librenms_keepalived_advert_interval: 1
librenms_keepalived_garp_master_delay: 0
librenms_keepalived_garp_master_repeat: 5
librenms_keepalived_garp_master_refresh: 10
librenms_keepalived_garp_master_refresh_repeat: 2
librenms_haproxy_web_port: 80
librenms_haproxy_https_port: 443
librenms_haproxy_tls_enabled: false
librenms_haproxy_http_redirect_to_https: "{{ librenms_haproxy_tls_enabled | bool }}"
librenms_haproxy_tls_cert_dir: /etc/haproxy/certs
librenms_haproxy_tls_cert_path: "{{ librenms_haproxy_tls_cert_dir }}/librenms.pem"
librenms_haproxy_tls_manage_cert: false
librenms_haproxy_tls_pem_src: ""
librenms_haproxy_tls_pem_content: ""
librenms_haproxy_tls_bind_options: alpn h2,http/1.1
librenms_letsencrypt_enabled: false
librenms_letsencrypt_install_certbot: true
librenms_letsencrypt_packages:
  - certbot
librenms_letsencrypt_email: ""
librenms_letsencrypt_domains:
  - "{{ librenms_fqdn }}"
librenms_letsencrypt_live_name: "{{ librenms_fqdn }}"
librenms_letsencrypt_fullchain_path: "/etc/letsencrypt/live/{{ librenms_letsencrypt_live_name }}/fullchain.pem"
librenms_letsencrypt_key_path: "/etc/letsencrypt/live/{{ librenms_letsencrypt_live_name }}/privkey.pem"
librenms_letsencrypt_certbot_extra_args: []
librenms_letsencrypt_manage_deploy_hook: true
librenms_letsencrypt_deploy_hook_path: /etc/letsencrypt/renewal-hooks/deploy/librenms-haproxy-pem.sh
librenms_haproxy_db_port: 3306
librenms_haproxy_web_check_host: ""
librenms_nginx_health_check_path: /healthz
librenms_php_fpm_ping_path: /php-fpm-ping
librenms_haproxy_web_check_path: "{{ librenms_php_fpm_ping_path }}"
librenms_nginx_redirect_unmatched_hosts: "{{ librenms_vip_enabled | bool }}"
librenms_haproxy_db_mysql_check_enabled: true
librenms_haproxy_db_health_user: haproxy_check
librenms_haproxy_db_health_user_host: "%"
librenms_haproxy_recover_galera_backends: true
librenms_haproxy_galera_backend_wait_timeout: 30
librenms_haproxy_timeout_connect: 1s
librenms_haproxy_timeout_check: 1s
librenms_haproxy_timeout_client: 180s
librenms_haproxy_timeout_server: 180s
librenms_haproxy_retries: 2
librenms_haproxy_redispatch: true
librenms_haproxy_web_check_interval: 1s
librenms_haproxy_web_check_fall: 2
librenms_haproxy_web_check_rise: 1
librenms_haproxy_db_check_interval: 1s
librenms_haproxy_db_check_fall: 2
librenms_haproxy_db_check_rise: 1
librenms_haproxy_rrdcached_enabled: >-
  {{
    librenms_manage_rrdcached | bool
    and librenms_rrdcached_endpoint_strategy == 'vip_tcp'
  }}
librenms_haproxy_rrdcached_check_interval: 1s
librenms_haproxy_rrdcached_check_fall: 2
librenms_haproxy_rrdcached_check_rise: 1
librenms_haproxy_rrdcached_port: "{{ (librenms_rrdcached_bind_port | int) + 1 }}"
librenms_app_probe_path: /
librenms_app_probe_success_statuses:
  - 200
  - 301
  - 302
  - 303
  - 307
  - 308
librenms_app_probe_retries: 3
librenms_app_probe_delay: 3
librenms_app_probe_timeout: 3
librenms_app_probe_fail_deployment: false
librenms_vip_app_probe_enabled: true
librenms_vip_app_probe_fail_deployment: true
librenms_vip_app_probe_validate_certs: false
librenms_nginx_fastcgi_connect_timeout: 30s
librenms_nginx_fastcgi_send_timeout: 180s
librenms_nginx_fastcgi_read_timeout: 180s
librenms_haproxy_stats_enabled: false
librenms_haproxy_stats_bind: 127.0.0.1:8404

librenms_manage_local_snmpd: true
librenms_snmp_versions_enabled:
  - v2c
  - v3
librenms_snmp_version_order:
  - v3
  - v2c
  - v1
librenms_snmp_v2c_community: public
librenms_snmp_communities: []
librenms_snmp_v3_users: []
librenms_snmp_syslocation: LibreNMS Node
librenms_snmp_syscontact: noc@example.com
librenms_snmp_agent_address: "udp:161,udp6:[::1]:161"
librenms_net_snmp_config_binary: /usr/bin/net-snmp-config
librenms_seed_cluster_devices: "{{ librenms_manage_local_snmpd | bool }}"
librenms_seed_cluster_devices_required: false
librenms_seed_cluster_device_hosts: >-
  {{
    groups.get('librenms_nodes', [])
    | difference(librenms_inactive_inventory_nodes)
  }}
librenms_seed_cluster_device_snmp_version: auto
librenms_seed_cluster_device_transport: udp
librenms_seed_cluster_device_port: 161
librenms_seed_cluster_device_poller_group: ""

librenms_manage_dispatcher: true
librenms_manage_scheduler: true
librenms_manage_rrdcached: "{{ librenms_mode != 'standalone' }}"
librenms_dispatcher_runtime_wait_enabled: "{{ librenms_mode != 'standalone' }}"
librenms_dispatcher_runtime_wait_path: /usr/local/sbin/librenms-ha-runtime-wait
librenms_dispatcher_runtime_wait_timeout: 240
librenms_dispatcher_runtime_wait_delay: 5
librenms_dispatcher_runtime_wait_command_timeout: 4
librenms_dispatcher_runtime_wait_db: true
librenms_dispatcher_runtime_wait_redis: true
librenms_dispatcher_runtime_wait_rrd: true
librenms_dispatcher_restart_sec: 15
librenms_dispatcher_systemd_override_dir: /etc/systemd/system/librenms.service.d
librenms_dispatcher_systemd_override_path: >-
  {{ librenms_dispatcher_systemd_override_dir }}/librenms-ha.conf
librenms_startup_repair_enabled: "{{ librenms_mode != 'standalone' }}"
librenms_startup_repair_path: /usr/local/sbin/librenms-ha-startup-repair
librenms_rrd_permission_repair_path: /usr/local/sbin/librenms-ha-rrd-permission-repair
librenms_startup_repair_interval: 30s
librenms_startup_repair_gluster_mount_wait: 180
librenms_startup_repair_runtime_retries: 18
librenms_startup_repair_runtime_delay: 10
librenms_startup_repair_fix_git_rrd_placeholder: true
librenms_startup_repair_fix_writable_ownership: true
librenms_startup_repair_service_recovery_enabled: true
librenms_startup_repair_service_recovery_timeout: 180
librenms_startup_repair_service_recovery_delay: 5
librenms_startup_repair_service_recovery_units:
  - >-
    {{
      librenms_glusterd_service_name
      if librenms_rrd_mode == 'glusterfs'
      else ''
    }}
  - >-
    {{
      librenms_mariadb_service_name
      if librenms_db_mode == 'galera'
      else ''
    }}
  - >-
    {{
      librenms_redis_service_name
      if librenms_redis_mode == 'sentinel'
      else ''
    }}
  - >-
    {{
      librenms_redis_sentinel_service_name_effective
      if librenms_redis_mode == 'sentinel'
      else ''
    }}
  - >-
    {{
      librenms_rrdcached_service_name
      if librenms_manage_rrdcached | bool
      else ''
    }}
  - >-
    {{
      librenms_haproxy_service_name
      if librenms_vip_enabled | bool
      else ''
    }}
  - >-
    {{
      librenms_keepalived_service_name
      if librenms_vip_enabled | bool
      else ''
    }}
librenms_dispatcher_registration_retries: 20
librenms_dispatcher_registration_delay: 3
librenms_dispatcher_registration_window: 300
librenms_dispatcher_poller_frequency: "{{ librenms_dispatcher_registration_window }}"
librenms_dispatcher_prune_unmanaged_nodes: true
librenms_dispatcher_restart_before_registration: false
librenms_dispatcher_watchdog_enabled: true
librenms_dispatcher_failover_recovery_enabled: true
librenms_dispatcher_failover_recovery_interval: 15s
librenms_dispatcher_failover_tcp_timeout: 1
librenms_dispatcher_failover_db_timeout: 3
librenms_dispatcher_failover_restart_timeout: 20
librenms_dispatcher_failover_prune_unreachable_nodes: true
librenms_dispatcher_failover_refresh_local_registration: true
librenms_dispatcher_registration_nodes: >-
  {{
    librenms_active_web_nodes
    | default(groups.get('librenms_nodes', []))
    | difference(librenms_inactive_inventory_nodes)
  }}
librenms_rrdcached_bind_port: 42217
librenms_rrdcached_daemon_path: /usr/bin/rrdcached
librenms_rrdcached_endpoint: ""
librenms_rrdcached_endpoint_strategy: >-
  {{
    'vip_tcp'
    if (
      librenms_rrd_mode == 'glusterfs'
      and librenms_vip_enabled | bool
      and librenms_vip_ip | length > 0
    )
    else 'primary_tcp'
  }}
librenms_rrdcached_scope: "{{ 'all' if librenms_rrdcached_endpoint_strategy == 'vip_tcp' else 'primary' }}"
librenms_rrdcached_network_enabled: "{{ librenms_rrdcached_endpoint_strategy != 'unix' }}"
librenms_rrdcached_network_bind_address: >-
  {{
    ansible_host
    | default(ansible_default_ipv4.address | default(inventory_hostname))
  }}
librenms_rrdcached_socket: /run/rrdcached.sock
librenms_rrdcached_socket_mode: "0660"
librenms_rrdcached_pidfile: /run/rrdcached.pid
librenms_rrdcached_write_timeout: 1800
librenms_rrdcached_write_jitter: 1800
librenms_rrdcached_write_threads: 4
librenms_rrdcached_journal_path: /var/lib/rrdcached/journal
librenms_rrdcached_default_config_path: /etc/default/rrdcached
librenms_rrdcached_service_name: rrdcached
librenms_manage_rrdcached_systemd_override: "{{ ansible_service_mgr == 'systemd' }}"
librenms_rrdcached_systemd_override_dir: >-
  /etc/systemd/system/{{ librenms_rrdcached_service_name }}.service.d
librenms_rrdcached_systemd_override_path: >-
  {{ librenms_rrdcached_systemd_override_dir }}/librenms-ha.conf
librenms_rrdcached_base_path: >-
  {{
    librenms_gluster_mountpoint
    if librenms_rrd_mode == 'glusterfs'
    else (librenms_install_dir ~ '/rrd')
  }}
librenms_manage_nginx: "{{ librenms_install_profile in ['full', 'web'] }}"
librenms_manage_php_fpm: "{{ librenms_install_profile in ['full', 'web'] }}"
librenms_php_fpm_socket: /run/php-fpm-librenms.sock
librenms_manage_lnms_symlink: true

librenms_enable_extra_repos: true
librenms_redhat_enable_epel: true
librenms_redhat_enable_remi: false
librenms_redhat_php_stream: "remi-8.2"
librenms_common_extra_packages: []

librenms_remove_install_dir: false
librenms_remove_data_dirs: false

librenms_allowed_os_families:
  - Debian
  - RedHat
  - Archlinux
  - Alpine
  - Gentoo

librenms_support_tier_map:
  Ubuntu: primary
  Debian: primary
  Linux Mint: primary-ish
  AlmaLinux: strong-best-effort
  Rocky: strong-best-effort
  Fedora: strong-best-effort
  CentOS: best-effort
  Archlinux: best-effort
  Alpine: best-effort
  Gentoo: best-effort
