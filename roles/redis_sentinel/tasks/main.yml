---
- name: Install Redis packages
  package:
    name: "{{ librenms_redis_packages }}"
    state: present
  when: librenms_redis_mode in ['local', 'sentinel', 'external']

- name: Ensure Redis config parent directory exists when needed
  file:
    path: "{{ librenms_redis_conf_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure custom config directory exists
  file:
    path: /etc/librenms
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Redis data directory exists on Debian-family systems
  file:
    path: /var/lib/redis
    state: directory
    owner: redis
    group: redis
    mode: "0750"
  when:
    - librenms_redis_mode in ['local', 'sentinel']
    - ansible_os_family == 'Debian'

- name: Ensure Redis data directory contents are owned by redis on Debian-family systems
  file:
    path: /var/lib/redis
    state: directory
    owner: redis
    group: redis
    recurse: true
  when:
    - librenms_redis_mode in ['local', 'sentinel']
    - ansible_os_family == 'Debian'

- name: Deploy Redis server config
  template:
    src: redis.conf.j2
    dest: "{{ librenms_redis_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Redis
  when: librenms_redis_mode in ['local', 'sentinel']

- name: Enable and start Redis server
  when: librenms_redis_mode in ['local', 'sentinel']
  block:
    - name: Enable and start Redis server service
      service:
        name: "{{ librenms_redis_service_name }}"
        state: started
        enabled: true
  rescue:
    - name: Capture Redis service status during enable/start
      command: "systemctl status {{ librenms_redis_service_name }} --no-pager -l"
      register: redis_start_service_status
      changed_when: false
      failed_when: false

    - name: Capture Redis service journal during enable/start
      command: "journalctl -u {{ librenms_redis_service_name }} -n 50 --no-pager"
      register: redis_start_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with Redis enable/start diagnostics
      fail:
        msg: |-
          Failed to enable/start {{ librenms_redis_service_name }}.

          systemctl status:
          {{ redis_start_service_status.stdout | default('') }}
          {{ redis_start_service_status.stderr | default('') }}

          journalctl:
          {{ redis_start_service_journal.stdout | default('') }}
          {{ redis_start_service_journal.stderr | default('') }}

- name: Apply Redis config changes before configuring Sentinel
  meta: flush_handlers
  when: librenms_redis_mode == 'sentinel'

- name: Query local Redis replication state
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 6379 INFO replication
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: librenms_redis_replication_state
  changed_when: false
  when:
    - librenms_redis_mode == 'sentinel'
    - librenms_redis_sentinel_enforce_configured_master | bool

- name: Promote configured Redis master when needed
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 6379 REPLICAOF NO ONE
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: librenms_redis_promote_configured_master
  changed_when: (librenms_redis_promote_configured_master.stdout | default('') | trim) == 'OK'
  when:
    - librenms_redis_mode == 'sentinel'
    - librenms_redis_sentinel_enforce_configured_master | bool
    - inventory_hostname == librenms_redis_master_host
    - (librenms_redis_replication_state.stdout | default('')) is not search('role:master')

- name: Point Redis replicas at the configured master
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 6379
    REPLICAOF {{ hostvars[librenms_redis_master_host].ansible_host | default(librenms_redis_master_host) | quote }} 6379
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: librenms_redis_follow_configured_master
  changed_when: (librenms_redis_follow_configured_master.stdout | default('') | trim) == 'OK'
  when:
    - librenms_redis_mode == 'sentinel'
    - librenms_redis_sentinel_enforce_configured_master | bool
    - inventory_hostname != librenms_redis_master_host
    - >-
      (librenms_redis_replication_state.stdout | default('')) is not search('role:slave')
      or
      (librenms_redis_replication_state.stdout | default('')) is not search(
        'master_host:' ~ (hostvars[librenms_redis_master_host].ansible_host | default(librenms_redis_master_host))
      )

- name: Deploy Redis Sentinel config
  template:
    src: sentinel.conf.j2
    dest: "{{ librenms_redis_sentinel_conf_path }}"
    owner: "{{ 'redis' if ansible_os_family == 'Debian' else 'root' }}"
    group: "{{ 'redis' if ansible_os_family == 'Debian' else 'root' }}"
    mode: "0640"
  notify: Restart Redis Sentinel
  when: librenms_redis_mode == 'sentinel'

- name: Deploy systemd unit for Redis Sentinel
  template:
    src: librenms-redis-sentinel.service.j2
    dest: /etc/systemd/system/librenms-redis-sentinel.service
    owner: root
    group: root
    mode: "0644"
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Reload systemd after sentinel unit changes
  systemd:
    daemon_reload: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Enable and start Redis Sentinel via systemd
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'
  block:
    - name: Enable and start Redis Sentinel systemd service
      service:
        name: librenms-redis-sentinel
        state: started
        enabled: true
  rescue:
    - name: Capture Redis Sentinel systemd status during enable/start
      command: "systemctl status librenms-redis-sentinel --no-pager -l"
      register: redis_sentinel_start_service_status
      changed_when: false
      failed_when: false

    - name: Capture Redis Sentinel systemd journal during enable/start
      command: "journalctl -u librenms-redis-sentinel -n 50 --no-pager"
      register: redis_sentinel_start_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with Redis Sentinel systemd enable/start diagnostics
      fail:
        msg: |-
          Failed to enable/start librenms-redis-sentinel.

          systemctl status:
          {{ redis_sentinel_start_service_status.stdout | default('') }}
          {{ redis_sentinel_start_service_status.stderr | default('') }}

          journalctl:
          {{ redis_sentinel_start_service_journal.stdout | default('') }}
          {{ redis_sentinel_start_service_journal.stderr | default('') }}

- name: Enable and start Redis Sentinel via native service
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr != 'systemd' or ansible_os_family == 'Debian'
  block:
    - name: Enable and start Redis Sentinel native service
      service:
        name: "{{ librenms_redis_sentinel_native_service_name }}"
        state: started
        enabled: true
  rescue:
    - name: Capture Redis Sentinel native status during enable/start
      command: "systemctl status {{ librenms_redis_sentinel_native_service_name }} --no-pager -l"
      register: redis_sentinel_native_start_service_status
      changed_when: false
      failed_when: false

    - name: Capture Redis Sentinel native journal during enable/start
      command: "journalctl -u {{ librenms_redis_sentinel_native_service_name }} -n 50 --no-pager"
      register: redis_sentinel_native_start_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with Redis Sentinel native enable/start diagnostics
      fail:
        msg: |-
          Failed to enable/start {{ librenms_redis_sentinel_native_service_name }}.

          systemctl status:
          {{ redis_sentinel_native_start_service_status.stdout | default('') }}
          {{ redis_sentinel_native_start_service_status.stderr | default('') }}

          journalctl:
          {{ redis_sentinel_native_start_service_journal.stdout | default('') }}
          {{ redis_sentinel_native_start_service_journal.stderr | default('') }}

- name: Apply Redis Sentinel config changes before validation
  meta: flush_handlers
  when: librenms_redis_mode == 'sentinel'

- name: Reset Redis Sentinel state for the managed service
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 26379
    {% if librenms_redis_sentinel_username | length > 0 %}
    --user {{ librenms_redis_sentinel_username | quote }}
    {% endif %}
    SENTINEL reset {{ librenms_redis_sentinel_service | quote }}
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_sentinel_password }}"
  register: librenms_redis_sentinel_reset
  changed_when: (librenms_redis_sentinel_reset.stdout | default('0') | int) > 0
  failed_when: false
  when:
    - librenms_redis_mode == 'sentinel'
    - librenms_redis_sentinel_enforce_configured_master | bool

- name: Query Redis Sentinel for the current master endpoint
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 26379
    {% if librenms_redis_sentinel_username | length > 0 %}
    --user {{ librenms_redis_sentinel_username | quote }}
    {% endif %}
    SENTINEL get-master-addr-by-name {{ librenms_redis_sentinel_service | quote }}
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_sentinel_password }}"
  register: librenms_redis_sentinel_master_query
  changed_when: false
  failed_when: false
  retries: 12
  delay: 5
  until:
    - librenms_redis_sentinel_master_query.rc == 0
    - (librenms_redis_sentinel_master_query.stdout_lines | default([]) | length) >= 2
  when: librenms_redis_mode == 'sentinel'

- name: Set discovered Redis Sentinel master endpoint
  set_fact:
    librenms_redis_sentinel_master_host_effective: >-
      {{ (librenms_redis_sentinel_master_query.stdout_lines | default([]))[0] | default('') }}
    librenms_redis_sentinel_master_port_effective: >-
      {{ (librenms_redis_sentinel_master_query.stdout_lines | default([]))[1] | default('6379') }}
  when: librenms_redis_mode == 'sentinel'

- name: Verify Redis Sentinel discovered a master endpoint
  assert:
    that:
      - librenms_redis_sentinel_master_host_effective | length > 0
      - librenms_redis_sentinel_master_port_effective | string | length > 0
    fail_msg: >-
      Redis Sentinel did not return a master endpoint for
      {{ librenms_redis_sentinel_service }} on {{ inventory_hostname }}.
  when: librenms_redis_mode == 'sentinel'

- name: Verify Redis Sentinel master accepts cache writes
  no_log: true
  command: >-
    redis-cli
    -h {{ librenms_redis_sentinel_master_host_effective | quote }}
    -p {{ librenms_redis_sentinel_master_port_effective | quote }}
    {% if librenms_redis_username | length > 0 %}
    --user {{ librenms_redis_username | quote }}
    {% endif %}
    SET librenms:sentinel-write-check {{ inventory_hostname | quote }} EX 30
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: librenms_redis_sentinel_write_check
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until:
    - librenms_redis_sentinel_write_check.rc == 0
    - (librenms_redis_sentinel_write_check.stdout | default('') | trim) == 'OK'
  when: librenms_redis_mode == 'sentinel'

- name: Confirm Redis Sentinel writable master
  debug:
    msg: >-
      Redis Sentinel {{ librenms_redis_sentinel_service }} reports writable
      master {{ librenms_redis_sentinel_master_host_effective }}:{{
      librenms_redis_sentinel_master_port_effective }} on {{ inventory_hostname }}.
  when: librenms_redis_mode == 'sentinel'

- name: Query all Redis Sentinels for a shared master endpoint
  no_log: true
  command: >-
    redis-cli
    -h {{ hostvars[item].ansible_host | default(item) | quote }}
    -p 26379
    {% if librenms_redis_sentinel_username | length > 0 %}
    --user {{ librenms_redis_sentinel_username | quote }}
    {% endif %}
    SENTINEL get-master-addr-by-name {{ librenms_redis_sentinel_service | quote }}
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_sentinel_password }}"
  loop: "{{ librenms_active_redis_nodes }}"
  register: librenms_redis_sentinel_consensus_queries
  changed_when: false
  failed_when: false
  retries: "{{ librenms_redis_sentinel_consensus_retries | int }}"
  delay: "{{ librenms_redis_sentinel_consensus_delay | int }}"
  until:
    - librenms_redis_sentinel_consensus_queries.rc == 0
    - (librenms_redis_sentinel_consensus_queries.stdout_lines | default([]) | length) >= 2
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)

- name: Determine Redis Sentinel consensus master
  set_fact:
    librenms_redis_sentinel_consensus_masters: >-
      {{
        librenms_redis_sentinel_consensus_queries.results
        | map(attribute='stdout_lines')
        | map('join', ':')
        | unique
        | list
      }}
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)

- name: Verify Redis Sentinels agree on one master
  assert:
    that:
      - librenms_redis_sentinel_consensus_masters | length == 1
      - librenms_redis_sentinel_consensus_masters | first | length > 0
      - "':' in (librenms_redis_sentinel_consensus_masters | first)"
    fail_msg: >-
      Redis Sentinels do not agree on the current master for
      {{ librenms_redis_sentinel_service }}. Reported masters:
      {{ librenms_redis_sentinel_consensus_masters | default([]) | join(', ') }}.
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)

- name: Set Redis Sentinel consensus endpoint
  set_fact:
    librenms_redis_sentinel_consensus_master_host: >-
      {{ (librenms_redis_sentinel_consensus_masters | first).split(':')[0] }}
    librenms_redis_sentinel_consensus_master_port: >-
      {{ (librenms_redis_sentinel_consensus_masters | first).split(':')[1] }}
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)

- name: Verify Redis Sentinel consensus master accepts cache writes
  no_log: true
  command: >-
    redis-cli
    -h {{ librenms_redis_sentinel_consensus_master_host | quote }}
    -p {{ librenms_redis_sentinel_consensus_master_port | quote }}
    {% if librenms_redis_username | length > 0 %}
    --user {{ librenms_redis_username | quote }}
    {% endif %}
    SET librenms:sentinel-consensus-write-check {{ inventory_hostname | quote }} EX 30
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: librenms_redis_sentinel_consensus_write_check
  changed_when: false
  failed_when: false
  retries: "{{ librenms_redis_sentinel_consensus_retries | int }}"
  delay: "{{ librenms_redis_sentinel_consensus_delay | int }}"
  until:
    - librenms_redis_sentinel_consensus_write_check.rc == 0
    - (librenms_redis_sentinel_consensus_write_check.stdout | default('') | trim) == 'OK'
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)

- name: Confirm Redis Sentinel consensus writable master
  debug:
    msg: >-
      All Redis Sentinels agree that {{ librenms_redis_sentinel_service }}
      writes should go to {{ librenms_redis_sentinel_consensus_master_host }}:{{
      librenms_redis_sentinel_consensus_master_port }}.
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname == (librenms_active_redis_nodes | last)
