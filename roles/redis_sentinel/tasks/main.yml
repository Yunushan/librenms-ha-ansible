---
- name: Install Redis packages
  package:
    name: "{{ librenms_redis_packages }}"
    state: present
  when: librenms_redis_mode in ['local', 'sentinel', 'external']

- name: Ensure Redis config parent directory exists when needed
  file:
    path: "{{ librenms_redis_conf_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure custom config directory exists
  file:
    path: /etc/librenms
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Redis data directory exists on Debian-family systems
  file:
    path: /var/lib/redis
    state: directory
    owner: redis
    group: redis
    mode: "0750"
  when:
    - librenms_redis_mode in ['local', 'sentinel']
    - ansible_os_family == 'Debian'

- name: Deploy Redis server config
  template:
    src: redis.conf.j2
    dest: "{{ librenms_redis_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Redis
  when: librenms_redis_mode in ['local', 'sentinel']

- name: Enable and start Redis server
  service:
    name: "{{ librenms_redis_service_name }}"
    state: started
    enabled: true
  when: librenms_redis_mode in ['local', 'sentinel']

- name: Apply Redis config changes before configuring Sentinel
  meta: flush_handlers
  when: librenms_redis_mode == 'sentinel'

- name: Deploy Redis Sentinel config
  template:
    src: sentinel.conf.j2
    dest: "{{ librenms_redis_sentinel_conf_path }}"
    owner: root
    group: root
    mode: "0640"
  notify: Restart Redis Sentinel
  when: librenms_redis_mode == 'sentinel'

- name: Deploy systemd unit for Redis Sentinel
  template:
    src: librenms-redis-sentinel.service.j2
    dest: /etc/systemd/system/librenms-redis-sentinel.service
    owner: root
    group: root
    mode: "0644"
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Reload systemd after sentinel unit changes
  systemd:
    daemon_reload: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Enable and start Redis Sentinel via systemd
  service:
    name: librenms-redis-sentinel
    state: started
    enabled: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Enable and start Redis Sentinel via native service
  service:
    name: "{{ librenms_redis_sentinel_native_service_name }}"
    state: started
    enabled: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr != 'systemd' or ansible_os_family == 'Debian'
