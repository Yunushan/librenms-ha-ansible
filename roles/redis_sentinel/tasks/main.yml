---
- name: Install Redis packages
  package:
    name: "{{ librenms_redis_packages }}"
    state: present
  when: librenms_redis_mode in ['local', 'sentinel', 'external']

- name: Ensure Redis config parent directory exists when needed
  file:
    path: "{{ librenms_redis_conf_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure custom config directory exists
  file:
    path: /etc/librenms
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Redis data directory exists on Debian-family systems
  file:
    path: /var/lib/redis
    state: directory
    owner: redis
    group: redis
    mode: "0750"
  when:
    - librenms_redis_mode in ['local', 'sentinel']
    - ansible_os_family == 'Debian'

- name: Manage Redis server config on Debian-family systems
  blockinfile:
    path: "{{ librenms_redis_conf_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK librenms-ha-ansible"
    block: |
      daemonize no
      supervised systemd
      logfile ""
      pidfile /run/redis/redis-server.pid
      bind 127.0.0.1{% if librenms_redis_mode == 'sentinel' %} {{ ansible_host | default(inventory_hostname) }}{% endif %}
      protected-mode yes
      port 6379
      dir /var/lib/redis
      dbfilename dump.rdb
      appendonly yes
      requirepass {{ librenms_redis_password | to_json }}
      masterauth {{ librenms_redis_password | to_json }}
      {% if librenms_redis_mode == 'sentinel' and inventory_hostname != librenms_redis_master_host %}
      replicaof {{ hostvars[librenms_redis_master_host].ansible_host | default(librenms_redis_master_host) }} 6379
      {% endif %}
  notify: Restart Redis
  when:
    - librenms_redis_mode in ['local', 'sentinel']
    - ansible_os_family == 'Debian'

- name: Deploy Redis server config on non-Debian systems
  template:
    src: redis.conf.j2
    dest: "{{ librenms_redis_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Redis
  when: ansible_os_family != 'Debian' and librenms_redis_mode in ['local', 'sentinel']

- name: Enable and start Redis server
  service:
    name: "{{ librenms_redis_service_name }}"
    state: started
    enabled: true
  when: librenms_redis_mode in ['local', 'sentinel']

- name: Manage Redis Sentinel config on Debian-family systems
  vars:
    redis_name: "{{ librenms_redis_sentinel_service }}"
    redis_quorum: "{{ librenms_redis_quorum }}"
    redis_master_host: >-
      {{
        hostvars[librenms_redis_master_host].ansible_host
        | default(librenms_redis_master_host)
      }}
  blockinfile:
    path: "{{ librenms_redis_sentinel_conf_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK librenms-ha-ansible"
    block: |
      daemonize no
      supervised systemd
      logfile ""
      port 26379
      bind 127.0.0.1 {{ ansible_host | default(inventory_hostname) }}
      protected-mode yes
      dir /var/lib/redis
      sentinel monitor {{ redis_name }} {{ redis_master_host }} 6379 {{ redis_quorum }}
      sentinel auth-pass {{ librenms_redis_sentinel_service }} {{ librenms_redis_password | to_json }}
      sentinel down-after-milliseconds {{ librenms_redis_sentinel_service }} 10000
      sentinel failover-timeout {{ librenms_redis_sentinel_service }} 60000
      sentinel parallel-syncs {{ librenms_redis_sentinel_service }} 1
      requirepass {{ librenms_redis_sentinel_password | to_json }}
  notify: Restart Redis Sentinel
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_os_family == 'Debian'

- name: Deploy Redis Sentinel config on non-Debian systems
  template:
    src: sentinel.conf.j2
    dest: "{{ librenms_redis_sentinel_conf_path }}"
    owner: root
    group: root
    mode: "0640"
  notify: Restart Redis Sentinel
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_os_family != 'Debian'

- name: Deploy systemd unit for Redis Sentinel
  template:
    src: librenms-redis-sentinel.service.j2
    dest: /etc/systemd/system/librenms-redis-sentinel.service
    owner: root
    group: root
    mode: "0644"
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Reload systemd after sentinel unit changes
  systemd:
    daemon_reload: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Enable and start Redis Sentinel via systemd
  service:
    name: librenms-redis-sentinel
    state: started
    enabled: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr == 'systemd'
    - ansible_os_family != 'Debian'

- name: Enable and start Redis Sentinel via native service
  service:
    name: "{{ librenms_redis_sentinel_native_service_name }}"
    state: started
    enabled: true
  when:
    - librenms_redis_mode == 'sentinel'
    - ansible_service_mgr != 'systemd' or ansible_os_family == 'Debian'
