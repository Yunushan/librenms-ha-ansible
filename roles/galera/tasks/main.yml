---
- name: Install Galera packages
  package:
    name: "{{ librenms_galera_packages }}"
    state: present
  when: librenms_db_mode == 'galera'

- name: Deploy Galera config
  template:
    src: galera.cnf.j2
    dest: "{{ librenms_galera_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  register: librenms_galera_config_deploy
  notify: Restart MariaDB
  when: librenms_db_mode == 'galera'

- name: Check Galera bootstrap marker
  stat:
    path: "{{ librenms_galera_bootstrap_marker }}"
  register: librenms_galera_marker
  when: librenms_db_mode == 'galera'

- name: Probe Galera nodes for an existing primary component
  command:
    argv:
      - mysql
      - --protocol=socket
      - "--socket={{ librenms_mariadb_socket }}"
      - -Nse
      - "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready');"
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_component_probe
  failed_when: false
  changed_when: false
  when: librenms_db_mode == 'galera'

- name: Determine whether Galera bootstrap is required
  set_fact:
    librenms_galera_cluster_has_live_member: >-
      {{
        (
          librenms_galera_component_probe.results
          | selectattr('stdout', 'search', 'wsrep_cluster_status\\s+Primary')
          | selectattr('stdout', 'search', 'wsrep_ready\\s+ON')
          | list
          | length
        ) > 0
      }}
  when: librenms_db_mode == 'galera'

- name: Read Galera saved bootstrap state on database nodes
  command:
    argv:
      - awk
      - "-F: *"
      - >-
        /^safe_to_bootstrap:/ { safe=$2 }
        /^seqno:/ { seqno=$2 }
        /^uuid:/ { uuid=$2 }
        END {
          if (safe != "" || seqno != "" || uuid != "") {
            printf "safe_to_bootstrap=%s seqno=%s uuid=%s\n", safe, seqno, uuid
          }
        }
      - /var/lib/mysql/grastate.dat
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_saved_state
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool

- name: Determine Galera safe bootstrap hosts
  set_fact:
    librenms_galera_safe_bootstrap_hosts: >-
      {{
        librenms_galera_saved_state.results | default([])
        | selectattr('stdout', 'search', 'safe_to_bootstrap=1')
        | map(attribute='item')
        | list
      }}
  when: librenms_db_mode == 'galera'

- name: Recover Galera positions when no node is marked safe to bootstrap
  shell: |-
    set -o pipefail
    galera_recovery 2>&1 | awk '
      /Recovered position/ {
        pos=$NF
        gsub(/[;,]/, "", pos)
      }
      END {
        if (pos == "") {
          exit 1
        }
        split(pos, parts, ":")
        printf "{\"uuid\":\"%s\",\"seqno\":%d}\n", parts[1], parts[2]
      }'
  args:
    executable: /bin/bash
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_recovered_state
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - librenms_galera_auto_recover_unsafe_bootstrap | bool

- name: Build Galera recovered position list
  set_fact:
    librenms_galera_recovered_positions: >-
      {{
        (librenms_galera_recovered_positions | default([]))
        + [
          {
            'host': item.item,
            'uuid': (item.stdout | from_json).uuid,
            'seqno': (item.stdout | from_json).seqno | int
          }
        ]
      }}
  loop: "{{ librenms_galera_recovered_state.results | default([]) }}"
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - librenms_galera_auto_recover_unsafe_bootstrap | bool
    - item.rc == 0
    - item.stdout is search('^\\{')

- name: Determine highest Galera recovered seqno
  set_fact:
    librenms_galera_max_recovered_seqno: >-
      {{
        librenms_galera_recovered_positions
        | map(attribute='seqno')
        | max
      }}
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - (librenms_galera_recovered_positions | default([]) | length) > 0

- name: Determine Galera recovered bootstrap candidates
  set_fact:
    librenms_galera_recovered_bootstrap_candidates: >-
      {{
        librenms_galera_recovered_positions | default([])
        | selectattr('seqno', 'equalto', librenms_galera_max_recovered_seqno | int)
        | list
      }}
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - librenms_galera_max_recovered_seqno is defined

- name: Determine Galera recovered bootstrap host
  set_fact:
    librenms_galera_recovered_bootstrap_host: >-
      {{
        librenms_galera_recovered_bootstrap_candidates[0].host
        if (librenms_galera_recovered_bootstrap_candidates | default([]) | length) == 1
        else
        (
          librenms_db_bootstrap_host
          if (
            librenms_galera_recovery_tie_breaker == 'configured_bootstrap'
            and librenms_db_bootstrap_host in (
              librenms_galera_recovered_bootstrap_candidates | default([])
              | map(attribute='host')
              | list
            )
          )
          else
          (
            (
              librenms_galera_recovered_bootstrap_candidates | default([])
              | map(attribute='host')
              | list
              | first
            )
            if librenms_galera_recovery_tie_breaker == 'first'
            else ''
          )
        )
      }}
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - librenms_galera_max_recovered_seqno is defined

- name: Fail when Galera bootstrap host cannot be selected safely
  fail:
    msg: |-
      No live Galera primary component was found and no node has safe_to_bootstrap: 1.
      Automatic recovery could not select a safe bootstrap host from galera_recovery.

      Recovered positions:
      {{ librenms_galera_recovered_positions | default([]) }}

      Recovered bootstrap candidates:
      {{ librenms_galera_recovered_bootstrap_candidates | default([]) }}

      Recovery tie breaker:
      {{ librenms_galera_recovery_tie_breaker }}

      Stop MariaDB on all DB nodes, run galera_recovery on each node, choose the
      node with the highest seqno, set safe_to_bootstrap: 1 on only that node,
      then rerun the playbook.
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) == 0
    - librenms_galera_auto_recover_unsafe_bootstrap | bool
    - >-
      (
        (librenms_galera_max_recovered_seqno | default(-1) | int) < 0
        or (librenms_galera_recovered_bootstrap_host | default('') | length) == 0
      )

- name: Determine effective Galera bootstrap host
  set_fact:
    librenms_galera_bootstrap_effective_host: >-
      {{
        (librenms_galera_safe_bootstrap_hosts | first)
        if (
          not librenms_galera_cluster_has_live_member | bool
          and (librenms_galera_safe_bootstrap_hosts | length) > 0
        )
        else
        (
          librenms_galera_recovered_bootstrap_host
          if (
            not librenms_galera_cluster_has_live_member | bool
            and (librenms_galera_safe_bootstrap_hosts | length) == 0
            and (librenms_galera_recovered_bootstrap_host | default('') | length) > 0
            and (librenms_galera_max_recovered_seqno | default(-1) | int) >= 0
          )
          else librenms_db_bootstrap_host
        )
      }}
  when: librenms_db_mode == 'galera'

- name: Determine whether Galera bootstrap host came from recovery
  set_fact:
    librenms_galera_bootstrap_selected_from_recovery: >-
      {{
        not librenms_galera_cluster_has_live_member | bool
        and (librenms_galera_safe_bootstrap_hosts | length) == 0
        and (librenms_galera_recovered_bootstrap_host | default('') | length) > 0
        and librenms_galera_bootstrap_effective_host == librenms_galera_recovered_bootstrap_host
      }}
  when: librenms_db_mode == 'galera'

- name: Report Galera bootstrap host selected from saved state
  debug:
    msg: >-
      Galera will bootstrap from {{ librenms_galera_bootstrap_effective_host }}
      because that node is marked safe_to_bootstrap in grastate.dat.
  when:
    - librenms_db_mode == 'galera'
    - not librenms_galera_cluster_has_live_member | bool
    - (librenms_galera_safe_bootstrap_hosts | length) > 0
    - librenms_galera_bootstrap_effective_host != librenms_db_bootstrap_host
    - inventory_hostname == (librenms_active_db_nodes | first)

- name: Report Galera bootstrap host selected from recovered seqno
  debug:
    msg: >-
      Galera will bootstrap from {{ librenms_galera_bootstrap_effective_host }}
      because galera_recovery reported the highest recovered seqno
      ({{ librenms_galera_max_recovered_seqno }}).
  when:
    - librenms_db_mode == 'galera'
    - librenms_galera_bootstrap_selected_from_recovery | default(false)
    - inventory_hostname == (librenms_active_db_nodes | first)

- name: Stop MariaDB before Galera bootstrap on non-bootstrap database nodes
  service:
    name: "{{ librenms_mariadb_service_name }}"
    state: stopped
  loop: "{{ librenms_active_db_nodes | difference([librenms_galera_bootstrap_effective_host]) }}"
  delegate_to: "{{ item }}"
  ignore_errors: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool

- name: Stop MariaDB before Galera bootstrap on the effective bootstrap host
  service:
    name: "{{ librenms_mariadb_service_name }}"
    state: stopped
  delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
  ignore_errors: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool

- name: Wait for MariaDB processes to stop before Galera bootstrap
  shell: |-
    seconds=0
    while pgrep -x mariadbd >/dev/null; do
      if [ "${seconds}" -ge "{{ librenms_galera_stop_timeout | int }}" ]; then
        exit 0
      fi
      seconds=$((seconds + 1))
      sleep 1
    done

    exit 1
  args:
    executable: /bin/bash
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_stop_process_check
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool

- name: Force kill stale MariaDB processes before Galera bootstrap
  command:
    argv:
      - pkill
      - -KILL
      - -x
      - mariadbd
  loop: >-
    {{
      librenms_galera_stop_process_check.results | default([])
      | selectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list
    }}
  delegate_to: "{{ item }}"
  register: librenms_galera_force_kill_mariadb
  changed_when: librenms_galera_force_kill_mariadb.rc == 0
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool
    - librenms_galera_force_kill_stale_mariadb | bool

- name: Reset MariaDB unit state after force kill
  command:
    argv:
      - systemctl
      - reset-failed
      - "{{ librenms_mariadb_service_name }}"
  loop: >-
    {{
      librenms_galera_force_kill_mariadb.results | default([])
      | selectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list
    }}
  delegate_to: "{{ item }}"
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool
    - librenms_galera_force_kill_stale_mariadb | bool

- name: Clear stuck MariaDB systemd jobs before Galera bootstrap # noqa: command-instead-of-module
  shell: |-
    set -euo pipefail
    timeout 20 systemctl stop "{{ librenms_mariadb_service_name }}" >/dev/null 2>&1 || true
    systemctl kill --kill-who=all --signal=KILL "{{ librenms_mariadb_service_name }}" >/dev/null 2>&1 || true
    pkill -KILL -x mariadbd >/dev/null 2>&1 || true
    systemctl reset-failed "{{ librenms_mariadb_service_name }}" >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_clear_stuck_jobs
  changed_when: librenms_galera_clear_stuck_jobs.rc == 0
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool
    - librenms_galera_force_kill_stale_mariadb | bool

- name: Confirm MariaDB processes are stopped before Galera bootstrap
  shell: |-
    seconds=0
    while pgrep -x mariadbd >/dev/null; do
      if [ "${seconds}" -ge 10 ]; then
        exit 0
      fi
      seconds=$((seconds + 1))
      sleep 1
    done

    exit 1
  args:
    executable: /bin/bash
  loop: "{{ librenms_active_db_nodes }}"
  delegate_to: "{{ item }}"
  register: librenms_galera_final_stop_process_check
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool

- name: Fail when MariaDB remains stuck before Galera bootstrap
  fail:
    msg: |-
      MariaDB did not stop cleanly before Galera bootstrap.

      Process checks:
      {{ librenms_galera_final_stop_process_check.results | default([]) }}

      Refusing to run galera_new_cluster while a stale mariadbd process is still
      running. Stop the stuck MariaDB process on the listed node, then rerun the
      playbook.
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool
    - >-
      (
        librenms_galera_final_stop_process_check.results | default([])
        | selectattr('rc', 'equalto', 0)
        | list
        | length
      ) > 0

- name: Mark recovered Galera bootstrap host safe to bootstrap
  replace:
    path: /var/lib/mysql/grastate.dat
    regexp: '^safe_to_bootstrap:.*$'
    replace: 'safe_to_bootstrap: 1'
  delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - librenms_galera_bootstrap_selected_from_recovery | default(false)

- name: Bootstrap Galera cluster on the effective bootstrap host
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool
  block:
    - name: Run Galera bootstrap command # noqa: command-instead-of-module
      shell: |-
        set -euo pipefail

        cleanup() {
          systemctl unset-environment MYSQLD_OPTS _WSREP_NEW_CLUSTER || true
        }
        trap cleanup EXIT

        systemctl reset-failed "{{ librenms_mariadb_service_name }}"
        systemctl unset-environment MYSQLD_OPTS _WSREP_NEW_CLUSTER || true
        systemctl set-environment MYSQLD_OPTS='--wsrep-cluster-address=gcomm://'
        systemctl set-environment _WSREP_NEW_CLUSTER='--wsrep-new-cluster'
        systemctl start "{{ librenms_mariadb_service_name }}"
      args:
        executable: /bin/bash
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
      register: librenms_galera_bootstrap_command
      changed_when: librenms_galera_bootstrap_command.rc == 0
      async: "{{ librenms_galera_bootstrap_timeout | int }}"
      poll: 5

    - name: Wait for MariaDB socket on the Galera bootstrap host
      wait_for:
        path: "{{ librenms_mariadb_socket }}"
        timeout: "{{ librenms_galera_wait_timeout | int }}"
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"

    - name: Verify Galera bootstrap host formed a primary component
      command:
        argv:
          - mysql
          - --protocol=socket
          - "--socket={{ librenms_mariadb_socket }}"
          - -Nse
          - "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready');"
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
      register: librenms_galera_bootstrap_status_check
      changed_when: false
      retries: 24
      delay: 5
      until:
        - librenms_galera_bootstrap_status_check.stdout is search('wsrep_cluster_status\\s+Primary')
        - librenms_galera_bootstrap_status_check.stdout is search('wsrep_ready\\s+ON')
  rescue:
    - name: Capture MariaDB status after failed Galera bootstrap
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_mariadb_service_name }}"
          - --no-pager
          - -l
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
      register: librenms_galera_bootstrap_status
      changed_when: false
      failed_when: false

    - name: Capture MariaDB journal after failed Galera bootstrap
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_mariadb_service_name }}"
          - -n
          - "100"
          - --no-pager
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
      register: librenms_galera_bootstrap_journal
      changed_when: false
      failed_when: false

    - name: Capture Galera saved state after failed bootstrap
      command:
        argv:
          - cat
          - /var/lib/mysql/grastate.dat
      delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
      register: librenms_galera_bootstrap_grastate
      changed_when: false
      failed_when: false

    - name: Fail with Galera bootstrap diagnostics
      fail:
        msg: |-
          Failed to bootstrap Galera on {{ librenms_galera_bootstrap_effective_host }}.

          Selected safe bootstrap hosts:
          {{ librenms_galera_safe_bootstrap_hosts | default([]) }}

          systemctl status:
          {{ librenms_galera_bootstrap_status.stdout | default('') }}
          {{ librenms_galera_bootstrap_status.stderr | default('') }}

          journal:
          {{ librenms_galera_bootstrap_journal.stdout | default('') }}

          grastate.dat:
          {{ librenms_galera_bootstrap_grastate.stdout | default('') }}

          If no node has safe_to_bootstrap: 1, recover Galera manually by selecting
          the node with the highest recovered seqno, then rerun the playbook.

- name: Mark Galera cluster bootstrapped in this run
  set_fact:
    librenms_galera_cluster_bootstrapped_this_run: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - not librenms_galera_cluster_has_live_member | bool

- name: Write Galera bootstrap marker
  file:
    path: "{{ librenms_galera_bootstrap_marker }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - librenms_galera_cluster_bootstrapped_this_run | default(false)

- name: Wait for the Galera bootstrap host to accept connections
  wait_for:
    host: >-
      {{
        hostvars[librenms_galera_bootstrap_effective_host].ansible_host
        | default(librenms_galera_bootstrap_effective_host)
      }}
    port: "{{ librenms_db_port }}"
    timeout: "{{ librenms_galera_wait_timeout | int }}"
  register: librenms_galera_bootstrap_tcp_wait
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)

- name: Capture bootstrap host listener diagnostics
  shell: |-
    set -o pipefail
    {
      echo "--- systemctl ---"
      systemctl status "{{ librenms_mariadb_service_name }}" --no-pager -l || true
      echo "--- listeners ---"
      ss -ltnp || true
      echo "--- wsrep ---"
      mysql --protocol=socket --socket="{{ librenms_mariadb_socket }}" -Nse \
        "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready','wsrep_local_state_comment');" || true
      echo "--- journal ---"
      journalctl -u "{{ librenms_mariadb_service_name }}" -n 80 --no-pager || true
    }
  args:
    executable: /bin/bash
  delegate_to: "{{ librenms_galera_bootstrap_effective_host }}"
  register: librenms_galera_bootstrap_listener_diagnostics
  changed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - librenms_galera_bootstrap_tcp_wait.msg | default('') is search('Timeout')

- name: Fail when the Galera bootstrap host does not accept TCP connections
  fail:
    msg: |-
      Galera bootstrap host {{ librenms_galera_bootstrap_effective_host }} did
      not accept TCP connections on port {{ librenms_db_port }}.

      wait_for:
      {{ librenms_galera_bootstrap_tcp_wait }}

      diagnostics from {{ librenms_galera_bootstrap_effective_host }}:
      {{ librenms_galera_bootstrap_listener_diagnostics.stdout | default('') }}
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == (librenms_active_db_nodes | first)
    - librenms_galera_bootstrap_tcp_wait.msg | default('') is search('Timeout')

- name: Check local Galera readiness before service convergence
  command:
    argv:
      - mysql
      - --protocol=socket
      - "--socket={{ librenms_mariadb_socket }}"
      - -Nse
      - "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready');"
  register: librenms_galera_pre_start_status
  failed_when: false
  changed_when: false
  when: librenms_db_mode == 'galera'

- name: Ensure MariaDB service is enabled and started on Galera nodes
  service:
    name: "{{ librenms_mariadb_service_name }}"
    state: >-
      {{
        'restarted'
        if (
          (librenms_galera_config_deploy.changed | default(false))
          or not (
            (librenms_galera_pre_start_status.stdout | default('')) is search('wsrep_cluster_status\\s+Primary')
            and (librenms_galera_pre_start_status.stdout | default('')) is search('wsrep_ready\\s+ON')
          )
        )
        else 'started'
      }}
    enabled: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname != librenms_galera_bootstrap_effective_host or librenms_galera_cluster_has_live_member | bool

- name: Wait for local MariaDB socket on Galera nodes
  wait_for:
    path: "{{ librenms_mariadb_socket }}"
    timeout: "{{ librenms_galera_wait_timeout | int }}"
  when: librenms_db_mode == 'galera'

- name: Wait for Galera node TCP listener
  wait_for:
    host: "{{ ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname)) }}"
    port: "{{ librenms_db_port }}"
    timeout: "{{ librenms_galera_wait_timeout | int }}"
  when: librenms_db_mode == 'galera'

- name: Verify local Galera node is ready
  command:
    argv:
      - mysql
      - --protocol=socket
      - "--socket={{ librenms_mariadb_socket }}"
      - -Nse
      - "SHOW GLOBAL STATUS WHERE Variable_name IN ('wsrep_cluster_status','wsrep_ready');"
  register: librenms_galera_local_status
  changed_when: false
  when: librenms_db_mode == 'galera'

- name: Assert local Galera node joined the primary component
  assert:
    that:
      - librenms_galera_local_status.stdout is search('wsrep_cluster_status\\s+Primary')
      - librenms_galera_local_status.stdout is search('wsrep_ready\\s+ON')
    fail_msg: >-
      {{ inventory_hostname }} MariaDB is running, but it has not joined the Galera primary component.
      Status output: {{ librenms_galera_local_status.stdout | default('') }}
  when: librenms_db_mode == 'galera'

- name: Create LibreNMS database in Galera mode
  community.mysql.mysql_db:
    name: "{{ librenms_db_name }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_unix_socket: "{{ librenms_mariadb_socket }}"
    check_implicit_admin: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == librenms_galera_bootstrap_effective_host

- name: Create LibreNMS database user in Galera mode
  community.mysql.mysql_user:
    name: "{{ librenms_db_user }}"
    password: "{{ librenms_db_password }}"
    host: "%"
    priv: "{{ librenms_db_name }}.*:ALL"
    state: present
    login_unix_socket: "{{ librenms_mariadb_socket }}"
    check_implicit_admin: true
  no_log: true
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname == librenms_galera_bootstrap_effective_host

- name: Create HAProxy Galera health-check user
  no_log: true
  community.mysql.mysql_user:
    name: "{{ librenms_haproxy_db_health_user }}"
    password: ""
    host: "{{ librenms_haproxy_db_health_user_host }}"
    priv: "*.*:USAGE"
    state: present
    login_unix_socket: "{{ librenms_mariadb_socket }}"
    check_implicit_admin: true
  when:
    - librenms_db_mode == 'galera'
    - librenms_haproxy_db_mysql_check_enabled | bool
    - inventory_hostname == librenms_galera_bootstrap_effective_host
