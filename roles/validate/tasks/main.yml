---
- name: Run LibreNMS validator on app nodes
  command:
    argv:
      - php
      - validate.php
  args:
    chdir: "{{ librenms_install_dir }}"
  become: true
  become_user: "{{ librenms_user }}"
  register: librenms_validate_result
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups.get('librenms_nodes', [])

- name: Show LibreNMS validator summary
  debug:
    msg: "{{ librenms_validate_result.stdout_lines | default(['validate.php did not run']) }}"
  when:
    - inventory_hostname in groups.get('librenms_nodes', [])
    - librenms_validate_result is defined

- name: Check Galera cluster size
  shell: mysql -Nse "SHOW GLOBAL STATUS LIKE 'wsrep_cluster_size';"
  register: galera_cluster_size
  changed_when: false
  failed_when: false
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname in groups.get('librenms_db', [])

- name: Show Galera cluster size
  debug:
    msg: "{{ galera_cluster_size.stdout | default('Galera status unavailable') }}"
  when:
    - librenms_db_mode == 'galera'
    - inventory_hostname in groups.get('librenms_db', [])
    - galera_cluster_size is defined

- name: Check Redis Sentinel master endpoint
  no_log: true
  command: >-
    redis-cli -h 127.0.0.1 -p 26379
    {% if librenms_redis_sentinel_username | length > 0 %}
    --user {{ librenms_redis_sentinel_username | quote }}
    {% endif %}
    SENTINEL get-master-addr-by-name {{ librenms_redis_sentinel_service | quote }}
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_sentinel_password }}"
  register: redis_sentinel_status
  changed_when: false
  failed_when: false
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname in groups.get('librenms_redis', [])

- name: Set Redis Sentinel validation master endpoint
  set_fact:
    redis_sentinel_master_host: "{{ (redis_sentinel_status.stdout_lines | default([]))[0] | default('') }}"
    redis_sentinel_master_port: "{{ (redis_sentinel_status.stdout_lines | default([]))[1] | default('6379') }}"
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname in groups.get('librenms_redis', [])

- name: Check Redis Sentinel master write path
  no_log: true
  command: >-
    redis-cli
    -h {{ redis_sentinel_master_host | quote }}
    -p {{ redis_sentinel_master_port | quote }}
    {% if librenms_redis_username | length > 0 %}
    --user {{ librenms_redis_username | quote }}
    {% endif %}
    SET librenms:validate-write-check {{ inventory_hostname | quote }} EX 30
  environment:
    REDISCLI_AUTH: "{{ librenms_redis_password }}"
  register: redis_sentinel_write_check
  changed_when: false
  failed_when: false
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname in groups.get('librenms_redis', [])
    - redis_sentinel_master_host | length > 0

- name: Show Redis Sentinel validation summary
  debug:
    msg: >-
      Redis Sentinel {{ librenms_redis_sentinel_service }} on {{ inventory_hostname }}
      reports {{ redis_sentinel_master_host | default('unknown') }}:{{
      redis_sentinel_master_port | default('unknown') }} as master; write check
      {{
        'passed'
        if (((redis_sentinel_write_check | default({})).stdout | default('') | trim) == 'OK')
        else 'failed'
      }}.
  when:
    - librenms_redis_mode == 'sentinel'
    - inventory_hostname in groups.get('librenms_redis', [])

- name: Check Gluster volume status on bootstrap host
  command:
    argv:
      - gluster
      - volume
      - status
      - "{{ librenms_gluster_volume_name }}"
  register: gluster_volume_status
  changed_when: false
  failed_when: false
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host

- name: Show Gluster volume status summary
  debug:
    msg: "{{ gluster_volume_status.stdout_lines | default(['Gluster volume status unavailable']) }}"
  when:
    - librenms_rrd_mode == 'glusterfs'
    - inventory_hostname == librenms_gluster_bootstrap_host
    - gluster_volume_status is defined
