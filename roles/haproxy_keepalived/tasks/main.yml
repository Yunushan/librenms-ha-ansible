---
- name: Install HAProxy and Keepalived packages
  package:
    name: "{{ librenms_lb_packages }}"
    state: present

- name: Determine effective VIP interface
  set_fact:
    librenms_vip_interface_effective: >-
      {{
        librenms_vip_interface
        if (librenms_vip_interface | default('') | trim | length > 0)
        else (ansible_default_ipv4.interface | default(''))
      }}
  when: librenms_vip_enabled | bool

- name: Validate effective VIP interface
  assert:
    that:
      - librenms_vip_interface_effective | length > 0
      - librenms_vip_interface_effective in ansible_interfaces
    fail_msg: >-
      VIP interface '{{ librenms_vip_interface_effective | default('') }}' is not available on {{ inventory_hostname }}.
      Set librenms_vip_interface to an existing interface, or leave it empty to use the default route interface.
      Available interfaces: {{ ansible_interfaces | default([]) | join(', ') }}.
  when: librenms_vip_enabled | bool

- name: Allow HAProxy to bind the VIP before Keepalived owns it
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: "1"
    state: present
    reload: true
  when: librenms_vip_enabled | bool

- name: Deploy HAProxy config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Restart HAProxy

- name: Validate HAProxy configuration
  command:
    argv:
      - haproxy
      - -c
      - -f
      - /etc/haproxy/haproxy.cfg
  register: librenms_haproxy_config_check
  changed_when: false

- name: Rebind nginx on co-located web and load balancer nodes before HAProxy startup
  when:
    - librenms_manage_nginx | bool
    - inventory_hostname in groups.get('librenms_nodes', [])
  block:
    - name: Validate nginx configuration before HAProxy startup
      command:
        argv:
          - nginx
          - -t
      register: librenms_nginx_pre_haproxy_check
      changed_when: false

    - name: Restart nginx before HAProxy startup
      service:
        name: "{{ librenms_nginx_service_name }}"
        state: restarted

    - name: Verify nginx health endpoint before HAProxy startup
      uri:
        url: >-
          http://{{
            ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))
          }}{{ librenms_nginx_health_check_path }}
        method: GET
        status_code: 200
  rescue:
    - name: Capture nginx service status before HAProxy startup
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_nginx_service_name }}"
          - --no-pager
      register: librenms_nginx_pre_haproxy_status
      changed_when: false
      failed_when: false

    - name: Capture nginx journal before HAProxy startup
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_nginx_service_name }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_nginx_pre_haproxy_journal
      changed_when: false
      failed_when: false

    - name: Capture nginx full configuration before HAProxy startup
      command:
        argv:
          - nginx
          - -T
      register: librenms_nginx_pre_haproxy_config
      changed_when: false
      failed_when: false

    - name: Capture listening sockets before HAProxy startup
      command:
        argv:
          - ss
          - -ltnp
      register: librenms_nginx_pre_haproxy_sockets
      changed_when: false
      failed_when: false

    - name: Fail with nginx pre-HAProxy diagnostics
      fail:
        msg: |-
          Nginx failed to converge before HAProxy startup on {{ inventory_hostname }}.

          nginx -t:
          {{ librenms_nginx_pre_haproxy_check.stdout | default('') }}
          {{ librenms_nginx_pre_haproxy_check.stderr | default('') }}

          systemctl status:
          {{ librenms_nginx_pre_haproxy_status.stdout | default('') }}

          journalctl:
          {{ librenms_nginx_pre_haproxy_journal.stdout | default('') }}

          nginx -T:
          {{ librenms_nginx_pre_haproxy_config.stdout | default('') }}
          {{ librenms_nginx_pre_haproxy_config.stderr | default('') }}

          listening sockets:
          {{ librenms_nginx_pre_haproxy_sockets.stdout | default('') }}

- name: Ensure HAProxy service is enabled and started
  block:
    - name: Start and enable HAProxy service
      service:
        name: "{{ librenms_haproxy_service_name }}"
        state: started
        enabled: true
  rescue:
    - name: Capture HAProxy service status
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_haproxy_service_name }}"
          - --no-pager
      register: librenms_haproxy_status
      changed_when: false
      failed_when: false

    - name: Capture HAProxy service journal
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_haproxy_service_name }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_haproxy_journal
      changed_when: false
      failed_when: false

    - name: Capture listening sockets for HAProxy diagnostics
      command:
        argv:
          - ss
          - -ltnp
      register: librenms_haproxy_sockets
      changed_when: false
      failed_when: false

    - name: Capture nginx full configuration for HAProxy diagnostics
      command:
        argv:
          - nginx
          - -T
      register: librenms_haproxy_nginx_config
      changed_when: false
      failed_when: false

    - name: Fail with HAProxy startup diagnostics
      fail:
        msg: |-
          HAProxy failed to start on {{ inventory_hostname }}.

          haproxy -c:
          {{ librenms_haproxy_config_check.stdout | default('') }}
          {{ librenms_haproxy_config_check.stderr | default('') }}

          systemctl status:
          {{ librenms_haproxy_status.stdout | default('') }}

          journalctl:
          {{ librenms_haproxy_journal.stdout | default('') }}

          listening sockets:
          {{ librenms_haproxy_sockets.stdout | default('') }}

          nginx -T:
          {{ librenms_haproxy_nginx_config.stdout | default('') }}
          {{ librenms_haproxy_nginx_config.stderr | default('') }}

- name: Deploy Keepalived config when VIP is enabled
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0640"
  when: librenms_vip_enabled | bool
  notify: Restart Keepalived

- name: Validate Keepalived configuration when VIP is enabled
  command:
    argv:
      - keepalived
      - -t
      - -f
      - /etc/keepalived/keepalived.conf
  register: librenms_keepalived_config_check
  changed_when: false
  when: librenms_vip_enabled | bool

- name: Ensure Keepalived service is enabled and started when VIP is enabled
  when: librenms_vip_enabled | bool
  block:
    - name: Start and enable Keepalived service
      service:
        name: "{{ librenms_keepalived_service_name }}"
        state: started
        enabled: true
  rescue:
    - name: Capture Keepalived service status
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_keepalived_service_name }}"
          - --no-pager
      register: librenms_keepalived_status
      changed_when: false
      failed_when: false

    - name: Capture Keepalived service journal
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_keepalived_service_name }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_keepalived_journal
      changed_when: false
      failed_when: false

    - name: Capture Keepalived configuration
      command:
        argv:
          - cat
          - /etc/keepalived/keepalived.conf
      register: librenms_keepalived_config
      changed_when: false
      failed_when: false

    - name: Capture network interfaces for Keepalived diagnostics
      command:
        argv:
          - ip
          - -brief
          - addr
      register: librenms_keepalived_interfaces
      changed_when: false
      failed_when: false

    - name: Capture routing table for Keepalived diagnostics
      command:
        argv:
          - ip
          - route
      register: librenms_keepalived_routes
      changed_when: false
      failed_when: false

    - name: Fail with Keepalived startup diagnostics
      fail:
        msg: |-
          Keepalived failed to start on {{ inventory_hostname }}.

          effective VIP interface:
          {{ librenms_vip_interface_effective | default('') }}

          keepalived -t:
          {{ librenms_keepalived_config_check.stdout | default('') }}
          {{ librenms_keepalived_config_check.stderr | default('') }}

          systemctl status:
          {{ librenms_keepalived_status.stdout | default('') }}
          {{ librenms_keepalived_status.stderr | default('') }}

          journalctl:
          {{ librenms_keepalived_journal.stdout | default('') }}

          keepalived.conf:
          {{ librenms_keepalived_config.stdout | default('') }}

          interfaces:
          {{ librenms_keepalived_interfaces.stdout | default('') }}

          routes:
          {{ librenms_keepalived_routes.stdout | default('') }}

- name: Apply load balancer handler changes before VIP probes
  meta: flush_handlers
  when:
    - librenms_vip_enabled | bool
    - librenms_vip_app_probe_enabled | bool

- name: Verify LibreNMS PHP-FPM ping through the VIP
  uri:
    url: "http://{{ librenms_vip_ip }}{{ librenms_php_fpm_ping_path }}"
    headers:
      Host: "{{ librenms_haproxy_web_check_host_effective }}"
    method: GET
    return_content: true
    status_code: 200
    timeout: 10
  register: librenms_vip_php_fpm_ping
  failed_when: false
  retries: 6
  delay: 5
  until:
    - librenms_vip_php_fpm_ping.status | default(0) == 200
    - "'pong' in (librenms_vip_php_fpm_ping.content | default(''))"
  run_once: true
  when:
    - librenms_vip_enabled | bool
    - librenms_vip_app_probe_enabled | bool

- name: Determine primary web node for VIP probe diagnostics
  vars:
    librenms_vip_probe_primary_web_candidate: >-
      {{ groups.get('librenms_primary', groups.get('librenms_nodes', [inventory_hostname])) | first }}
  set_fact:
    librenms_vip_probe_primary_web: "{{ librenms_vip_probe_primary_web_candidate }}"
    librenms_vip_probe_php_fpm_service: >-
      {{
        hostvars[librenms_vip_probe_primary_web_candidate].librenms_php_fpm_service_effective
        | default(
          librenms_php_fpm_service_name
          if (librenms_php_fpm_service_name | default('') | length > 0)
          else 'php-fpm'
        )
      }}
  run_once: true
  when:
    - librenms_vip_enabled | bool
    - librenms_vip_app_probe_enabled | bool

- name: Verify LibreNMS application through the VIP
  when:
    - librenms_vip_enabled | bool
    - librenms_vip_app_probe_enabled | bool
  run_once: true
  block:
    - name: Probe LibreNMS VIP application endpoint
      uri:
        url: "http://{{ librenms_vip_ip }}{{ librenms_app_probe_path }}"
        headers:
          Host: "{{ librenms_haproxy_web_check_host_effective }}"
        method: GET
        return_content: false
        status_code: "{{ librenms_app_probe_success_statuses }}"
        timeout: "{{ librenms_app_probe_timeout | int }}"
      register: librenms_vip_app_probe
      changed_when: false
      retries: "{{ (librenms_app_probe_retries | int) + 1 }}"
      delay: "{{ librenms_app_probe_delay | int }}"
      until:
        - >-
          (librenms_vip_app_probe.status | default(0) | int)
          in librenms_app_probe_success_statuses
      failed_when: >-
        librenms_vip_app_probe_fail_deployment | bool
        and (librenms_vip_app_probe.status | default(0) | int)
        not in librenms_app_probe_success_statuses
  rescue:
    - name: Capture HAProxy status after failed VIP application probe
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_haproxy_service_name }}"
          - --no-pager
          - -l
      register: librenms_vip_probe_haproxy_status
      changed_when: false
      failed_when: false

    - name: Capture HAProxy journal after failed VIP application probe
      command:
        argv:
          - journalctl
          - -u
          - "{{ librenms_haproxy_service_name }}"
          - -n
          - "100"
          - --no-pager
      register: librenms_vip_probe_haproxy_journal
      changed_when: false
      failed_when: false

    - name: Capture VIP owner network state after failed VIP application probe
      command:
        argv:
          - ip
          - -brief
          - addr
      register: librenms_vip_probe_ip_addr
      changed_when: false
      failed_when: false

    - name: Capture listening TCP sockets after failed VIP application probe
      command:
        argv:
          - ss
          - -ltnp
      register: librenms_vip_probe_sockets
      changed_when: false
      failed_when: false

    - name: Capture primary web PHP-FPM status after failed VIP application probe
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_vip_probe_php_fpm_service }}"
          - --no-pager
          - -l
      register: librenms_vip_probe_php_fpm_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ librenms_vip_probe_primary_web }}"

    - name: Capture primary web nginx status after failed VIP application probe
      command:
        argv:
          - systemctl
          - status
          - "{{ librenms_nginx_service_name }}"
          - --no-pager
          - -l
      register: librenms_vip_probe_nginx_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ librenms_vip_probe_primary_web }}"

    - name: Capture primary web LibreNMS environment summary after failed VIP application probe
      shell: |
        awk -F= '
          BEGIN {
            keys["APP_URL"]
            keys["APP_TRUSTED_PROXIES"]
            keys["DB_HOST"]
            keys["DB_PORT"]
            keys["DB_DATABASE"]
            keys["DB_USERNAME"]
            keys["REDIS_SENTINEL_HOSTS"]
            keys["REDIS_SENTINEL_SERVICE"]
            keys["REDIS_SENTINEL"]
            keys["REDIS_TIMEOUT"]
            keys["REDIS_DB"]
            keys["REDIS_CACHE_DB"]
            keys["REDIS_SESSION_DB"]
            keys["CACHE_DRIVER"]
            keys["QUEUE_CONNECTION"]
            keys["SESSION_DRIVER"]
            keys["SESSION_CONNECTION"]
          }
          $1 in keys {
            print
          }
        ' {{ librenms_install_dir }}/.env \
        | sed -E 's/(password=)[^,&]*/\1REDACTED/g'
      args:
        executable: /bin/bash
      register: librenms_vip_probe_env_summary
      changed_when: false
      failed_when: false
      delegate_to: "{{ librenms_vip_probe_primary_web }}"

    - name: Capture primary web LibreNMS application log after failed VIP application probe
      command:
        argv:
          - tail
          - -n
          - "120"
          - "{{ librenms_install_dir }}/logs/librenms.log"
      register: librenms_vip_probe_application_log
      changed_when: false
      failed_when: false
      delegate_to: "{{ librenms_vip_probe_primary_web }}"

    - name: Fail with LibreNMS VIP application probe diagnostics
      fail:
        msg: |-
          LibreNMS VIP application endpoint did not become healthy.

          VIP probe:
          rc={{ '0' if (librenms_vip_app_probe.status | default(0) | int) in librenms_app_probe_success_statuses else '1' }}
          status={{ librenms_vip_app_probe.status | default('n/a') }}
          msg={{ librenms_vip_app_probe.msg | default('') }}

          HAProxy status:
          {{ librenms_vip_probe_haproxy_status.stdout | default('') }}

          HAProxy journal:
          {{ librenms_vip_probe_haproxy_journal.stdout | default('') }}

          VIP node addresses:
          {{ librenms_vip_probe_ip_addr.stdout | default('') }}

          listening sockets:
          {{ librenms_vip_probe_sockets.stdout | default('') }}

          primary web PHP-FPM status:
          {{ librenms_vip_probe_php_fpm_status.stdout | default('') }}

          primary web nginx status:
          {{ librenms_vip_probe_nginx_status.stdout | default('') }}

          primary web LibreNMS environment summary:
          {{ librenms_vip_probe_env_summary.stdout | default('') }}

          primary web LibreNMS application log:
          {{ librenms_vip_probe_application_log.stdout | default('') }}

- name: Report non-blocking LibreNMS VIP application probe result
  debug:
    msg: >-
      LibreNMS VIP application endpoint probe returned HTTP status
      {{ librenms_vip_app_probe.status | default('000') }}.
      Deployment continues because librenms_vip_app_probe_fail_deployment is false.
  when:
    - librenms_vip_enabled | bool
    - librenms_vip_app_probe_enabled | bool
    - not librenms_vip_app_probe_fail_deployment | bool
    - librenms_vip_app_probe is defined
    - >-
      (librenms_vip_app_probe.status | default(0) | int)
      not in librenms_app_probe_success_statuses
