---
repos:
  - repo: local
    hooks:
      - id: python-smoke
        name: Python smoke checks
        entry: python scripts/ci-python-smoke.py
        language: system
        pass_filenames: false
        files: >-
          (?x)^(
            scripts/.*\.py|
            .*\.ya?ml|
            .*\.md
          )$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.36.0
    hooks:
      - id: yamllint

  - repo: https://github.com/ansible/ansible-lint
    rev: v24.9.2
    hooks:
      - id: ansible-lint
