---
librenms_mode: ha
librenms_install_profile: full

librenms_fqdn: librenms.example.com
librenms_timezone: Etc/UTC

librenms_app_key: CHANGE_ME_USE_GENERATE_SECRETS

librenms_db_mode: galera
librenms_db_name: librenms
librenms_db_user: librenms
librenms_db_password: CHANGE_ME_DB_PASSWORD
librenms_db_bootstrap_host: lnms1

librenms_galera_cluster_name: librenms_cluster

librenms_redis_mode: sentinel
librenms_redis_master_host: lnms1
librenms_redis_password: CHANGE_ME_REDIS_PASSWORD
librenms_redis_sentinel_password: CHANGE_ME_SENTINEL_PASSWORD
librenms_redis_sentinel_service: mymaster

librenms_rrd_mode: glusterfs
librenms_gluster_bootstrap_host: lnms1
librenms_gluster_volume_name: librenms-rrd
librenms_gluster_brick_path: /gluster/brick1/librenms-rrd
librenms_gluster_mountpoint: /opt/librenms/rrd
librenms_gluster_manage_brick_device: false
librenms_gluster_brick_device: /dev/sdb1

librenms_vip_enabled: true
librenms_vip_ip: 10.10.10.10
librenms_vip_cidr: 24
librenms_vip_interface: ""
librenms_keepalived_auth_pass: CHANGE_ME_VRRP_PASSWORD
librenms_keepalived_vrid: 51

librenms_bootstrap_completed: false
librenms_manage_local_snmpd: true
# Auto-add hosts in librenms_nodes as monitored LibreNMS devices after bootstrap.
librenms_seed_cluster_devices: "{{ librenms_manage_local_snmpd | bool }}"

# Operational runbook toggles and examples.
# Leave these commented until you need the specific workflow.

# Enable live TCP listener checks for the HA network matrix during doctor runs:
# ansible-playbook -i inventories/ha/hosts.yml playbooks/doctor.yml \
#   --ask-become-pass \
#   -e librenms_doctor_network_tcp_checks_enabled=true
#
# librenms_doctor_network_tcp_checks_enabled: false
# librenms_doctor_network_check_gluster_brick_ports: false

# Fail the HA status playbook when any HA layer is degraded. This is useful for
# AWX schedules, monitoring hooks, and pre-maintenance gates.
#
# librenms_status_alert_fail_on_degraded: true
# librenms_status_alerts_enabled: false
# librenms_status_alert_webhook_url: ""
# librenms_status_alert_webhook_headers: {}

# Target optional failover drills. Empty values let the role choose safe
# defaults from the current inventory.
#
# librenms_failover_test_cases:
#   - web_backend
#   - keepalived_vip
#   - haproxy_service
#   - dispatcher_service
# librenms_failover_test_web_backend_host: lnms2
# librenms_failover_test_haproxy_host: lnms2
# librenms_failover_test_dispatcher_host: lnms2
# librenms_failover_test_redis_query_host: lnms2
# librenms_failover_test_galera_host: lnms3

# Diagnostics bundle tuning for incident capture. Keep fetch enabled for normal
# controller-side archives; use keep_remote when controller fetch is unreliable.
#
# librenms_diagnostics_local_dir: diagnostics
# librenms_diagnostics_journal_lines: 500
# librenms_diagnostics_log_lines: 1000
# librenms_diagnostics_keep_remote: false
# librenms_diagnostics_fetch: true

# Restore-test input. Set this to a backup directory created by backup.yml when
# running playbooks/restore-test.yml.
#
# librenms_restore_test_backup_dir: /var/backups/librenms-ha/<timestamp>
# librenms_restore_test_host: ""
# librenms_restore_test_require_rrd: false

# Galera recovery guard. Set both values only when there is no Galera Primary
# component and galera-recover.yml has reported the selected bootstrap host.
#
# librenms_galera_recover_confirm: false
# librenms_galera_recover_bootstrap_host: lnms2
# librenms_galera_recover_tie_breaker: manual

# Optional AWX controller deployment. See docs/awx-controller.md.
awx_controller_enabled: false

librenms_snmp_versions_enabled:
  - v1
  - v2c
  - v3

librenms_snmp_version_order:
  - v3
  - v2c
  - v1

librenms_snmp_v2c_community: CHANGE_ME_COMMUNITY

librenms_snmp_v3_users:
  - username: lnmsv3
    auth_protocol: SHA
    auth_password: CHANGE_ME_AUTH_PASSWORD
    priv_protocol: AES
    priv_password: CHANGE_ME_PRIV_PASSWORD
    access: ro

# Device map locations come from SNMP sysLocation or LibreNMS location maps.
# Use a real address, or provide fixed coordinates to avoid external geocoding.
#
# librenms_snmp_syslocation: "Istanbul, Turkiye"
# librenms_snmp_syslocation_latitude: "41.0082"
# librenms_snmp_syslocation_longitude: "28.9784"
#
# Optional external geocoder for devices that expose real postal addresses.
# Add a real key here; the role enables geoloc.engine=google automatically
# when this value is set.
librenms_geolocation_api_key: ""
# librenms_geolocation_engine: google

# Optional sysLocation rewrite maps. These let LibreNMS convert vague SNMP
# locations into full addresses or fixed coordinates before geocoding.
librenms_location_map: {}
librenms_location_map_regex: {}
librenms_location_map_regex_sub: {}
# Example:
# librenms_location_map:
#   "LibreNMS Node": "Istanbul, Turkiye [41.0082, 28.9784]"
# librenms_location_map_regex_sub:
#   "/DC1-Rack([0-9]+)/": "DC1 Rack $1, Istanbul, Turkiye [41.0082, 28.9784]"

# Topology map inputs. LibreNMS can only draw links discovered from LLDP/CDP/FDP
# or from MAC/ARP data exposed by monitored network devices.
librenms_network_map_show_on_worldmap: true
librenms_network_map_worldmap_show_disabled_alerts: true
librenms_network_map_worldmap_link_type: xdp
# librenms_network_map_items:
#   - mac
#   - xdp
