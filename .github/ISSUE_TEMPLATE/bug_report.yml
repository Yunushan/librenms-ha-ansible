---
name: Bug report
description: Report a repeatable deployment, role, or documentation bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this for repeatable bugs that are not specifically HA failover or
        LibreNMS validation failures. For HA outage behavior, use the HA
        failure template. For `/validate`, use the validation template.
  - type: dropdown
    id: topology
    attributes:
      label: Topology
      options:
        - Standalone
        - Distributed poller
        - Full HA
        - Docker HA example
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected.
      placeholder: The playbook failed during ..., expected ...
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Repository revision
      description: Commit SHA, tag, branch, or release used.
      placeholder: main @ abc1234
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command or Make target.
      render: shell
      placeholder: ansible-playbook -i inventories/ha/hosts.yml playbooks/cluster.yml --ask-become-pass
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste the failed task, stderr, and nearby play recap.
      render: text
    validations:
      required: true
  - type: textarea
    id: inventory
    attributes:
      label: Inventory shape
      description: Redact secrets, but keep groups, hostnames, IPs, modes, and changed variables.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS versions, Ansible version, Python version, and LibreNMS version if known.
      placeholder: Ubuntu 24.04, ansible-core ..., Python ..., LibreNMS ...
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks already run
      description: Include smoke, lint, syntax, doctor, status, or validate results.
      render: text
