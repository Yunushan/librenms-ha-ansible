---
name: lint

"on":
  push:
  pull_request:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml -p ~/.ansible/collections

      - name: Run Python smoke checks
        run: python scripts/ci-python-smoke.py

      - name: Run yamllint
        run: yamllint .

      - name: Run Ansible syntax checks
        run: python scripts/ci-ansible-syntax-check.py

      - name: Run ansible-lint
        run: ansible-lint
