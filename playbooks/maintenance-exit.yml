---
- name: Rejoin one LibreNMS HA node after planned maintenance
  hosts: librenms_nodes:librenms_db:librenms_redis:lb_nodes:gluster_nodes:!maintenance_nodes
  become: true
  gather_facts: true
  roles:
    - role: maintenance
      vars:
        librenms_maintenance_action: exit
    - role: ha_status
      vars:
        librenms_status_alert_fail_on_degraded: >-
          {{ librenms_maintenance_fail_on_degraded_after_exit | default(true) | bool }}
